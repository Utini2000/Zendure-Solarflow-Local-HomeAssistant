################################################################################
# ZENDURE & ENERGY MANAGEMENT – GESAMT-KONFIGURATION
# Datei:   secrets.yaml
# Version: v8.5.8
#
# ─────────────────────────────────────────────────────────────────────────────
# CHANGELOG v8.5.8 (gegenüber v8.5.7):
#   [BAT-1] BLOCKER FIX: Battery-Topics waren falsch formatiert.
#           ALT (falsch):  "Zendure/sensor/HUB1_SERIAL_NUMBER_BAT1_SERIAL_NUMBER_power"
#                          → Hub-ID + Underscore + Batt-ID als ein Pfadelement
#                            (existiert nicht im MQTT-Broker)
#           NEU (richtig): "Zendure/sensor/BAT1_SERIAL_NUMBER/BAT1_SERIAL_NUMBER_power"
#                          → Batt-ID als Topic-Pfad + Batt-ID als Suffix
#           Beweis aus MQTT-Listen-Test: Nachrichten kommen unter
#           Zendure/sensor/BAT1_SERIAL_NUMBER/BAT1_SERIAL_NUMBER_minVol → 3.3V
#           Folge: cell_min_vol war "unknown" → ZC-Plausibilität fail
#                  → Output bleibt 0W → Hub regelt nicht.
#           Gleicher Fix für BATT2.
#
# CHANGELOG v8.5.7:
#   [TEL-3] BLOCKER: telegram_chat_id_main von String auf Integer geändert.
#
# CHANGELOG v8.5.5:
#   [SEC-1] Alle ZC-Template-Keys ergänzt (BAT2, U1/U2 chargeMaxLimit/
#           minSoc/outputLimit/gridInputPower/gridOffPower/heatState/
#           hyperTmp/packState/pass/smartMode_set, gridoffmode_entity).
#
# CHANGELOG v8.5.4:
#   [ENT-1] epex_price_current: _total_price_2 → _total_price.
# ─────────────────────────────────────────────────────────────────────────────

# ==============================================================================
# TELEGRAM & SYSTEM-BENACHRICHTIGUNG
# ==============================================================================
telegram_id1: "notify.telegram_bot_YOUR_TELEGRAM_SERVICE"
telegram_id2: "notify.telegram_bot_YOUR_TELEGRAM_SERVICE"
telegram_chat_id_main: 12345678

# ==============================================================================
# SHELLY PRO 3EM: NETZANSCHLUSSPUNKT (ID: SHELLY_ID)
# ==============================================================================
shelly_total_power: "sensor.shellypro3em_SHELLY_ID_total_active_power"
shelly_total_energy_import: "sensor.shellypro3em_SHELLY_ID_total_active_energy"
shelly_total_energy_export: "sensor.shellypro3em_SHELLY_ID_total_active_returned_energy"
power_meter_total_consumption: "sensor.shellypro3em_SHELLY_ID_total_active_power"

# ==============================================================================
# EPEX SPOT & SOLAR FORECAST
# ==============================================================================
#epex_price_current: "sensor.epex_spot_data_total_price"
#epex_lowest_price_today: "sensor.epex_spot_data_lowest_price_2"
solar_forecast_today_s1: "sensor.energy_production_today"
solar_forecast_today_s2: "sensor.energy_production_today_2"

