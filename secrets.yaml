zendure_topic_u1_sensor_outputHomePower:   "Zendure/sensor/HUB1_SERIAL_NUMBER/outputHomePower"
zendure_topic_u1_sensor_gridInputPower:    "Zendure/sensor/HUB1_SERIAL_NUMBER/gridInputPower"
zendure_topic_u1_sensor_gridOffPower:      "Zendure/sensor/HUB1_SERIAL_NUMBER/gridOffPower"
zendure_topic_u1_sensor_heatState:         "Zendure/sensor/HUB1_SERIAL_NUMBER/heatState"
