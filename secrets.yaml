zendure_topic_u1_select_gridOffMode_set:   "Zendure/select/HUB1_SERIAL_NUMBER/gridOffMode/set"
zendure_topic_u1_switch_smartMode_set:     "Zendure/switch/HUB1_SERIAL_NUMBER/smartMode/set"

