# ==============================================================================
# UNIT 2: BATTERIE 2 (Seriennummer: BAT2_SERIAL_NUMBER)
# Topics korrigiert v8.5.8: Batt-ID statt Hub-ID_Batt-ID
# HINWEIS: Die zweite Batterie an Hub 1 wird NICHT separat
#          eingetragen. ZC interpretiert "battery2" als Batterie von Hub 2,
#          nicht als zweite Batterie an Hub 1. Beide Batterien an Hub 1 sind
#          elektrisch parallel (gleiche Spannung), ZC nutzt nur battery1.
# ==============================================================================
