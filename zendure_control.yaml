# ==============================================================================
# 3. HELPER SENSOREN (MIT PLAUSIBILITÄTS- UND FRESHNESS-FILTER)
# ==============================================================================
template:
  - sensor:
      - name: "SolarFlow 1 Battery Level"
        unique_id: solarflow_1_battery_level
        default_entity_id: sensor.solarflow_1_battery_level
        device_class: battery
        state_class: measurement
        unit_of_measurement: "%"
        availability: >
          {% set hb = states.sensor.solarflow_1_status_raw %}
          {% set hb_ok = hb is not none and hb.state|upper not in ['UNAVAILABLE','UNKNOWN','FAULT','ERROR'] and (as_timestamp(now()) - as_timestamp(hb.last_reported, 0)) < 300 %}
          {% set soc_ok = has_value('sensor.solarflow_1_battery_level_hub') %}
          {% set vmin_ok = has_value('sensor.solarflow_1_cell_min_vol') %}
          {% set vol = states('sensor.solarflow_1_cell_min_vol') | float(0) if vmin_ok else 0 %}
          {% set bt = states.sensor.solarflow_1_batt_max_temp %}
          {% set ht = states.sensor.solarflow_1_temp %}
          {% set have_temp = (bt is not none and is_number(bt.state)) or (ht is not none and is_number(ht.state)) %}
          {% set t = states('sensor.solarflow_1_batt_max_temp') | float(states('sensor.solarflow_1_temp') | float(999)) %}
          {% set temp_mode_ok_u1 = have_temp and t >= 0 and t <= 52 and not is_state('sensor.solarflow_1_heizung', 'Aktiv') %}
          {{ hb_ok and soc_ok and vmin_ok and vol > 2.0 and temp_mode_ok_u1 }}
        state: >
          {{ states('sensor.solarflow_1_battery_level_hub') | int(0) }}

      - name: "SolarFlow 2 Battery Level"
        unique_id: solarflow_2_battery_level
        default_entity_id: sensor.solarflow_2_battery_level
        device_class: battery
        state_class: measurement
        unit_of_measurement: "%"
        availability: >
          {% set hb = states.sensor.solarflow_2_status_raw %}
          {% set hb_ok = hb is not none and hb.state|upper not in ['UNAVAILABLE','UNKNOWN','FAULT','ERROR'] and (as_timestamp(now()) - as_timestamp(hb.last_reported, 0)) < 300 %}
          {% set soc_ok = has_value('sensor.solarflow_2_battery_level_hub') %}
          {% set vmin_ok = has_value('sensor.solarflow_2_cell_min_vol') %}
          {% set vol = states('sensor.solarflow_2_cell_min_vol') | float(0) if vmin_ok else 0 %}
          {% set bt = states.sensor.solarflow_2_batt_max_temp %}
          {% set ht = states.sensor.solarflow_2_temp %}
          {% set have_temp = (bt is not none and is_number(bt.state)) or (ht is not none and is_number(ht.state)) %}
          {% set t = states('sensor.solarflow_2_batt_max_temp') | float(states('sensor.solarflow_2_temp') | float(999)) %}
          {% set temp_mode_ok_u2 = have_temp and t >= 0 and t <= 52 and not is_state('sensor.solarflow_2_heizung', 'Aktiv') %}
          {{ hb_ok and soc_ok and vmin_ok and vol > 2.0 and temp_mode_ok_u2 }}
        state: >
          {{ states('sensor.solarflow_2_battery_level_hub') | int(0) }}

      - name: "SolarFlow Total Solar Input"
        unique_id: solarflow_total_solar_input
        default_entity_id: sensor.solarflow_total_solar_input
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        state: >
          {% set on1 = states('sensor.solarflow_1_status_raw')|upper not in ['UNAVAILABLE','UNKNOWN','FAULT','ERROR'] %}
          {% set on2 = states('sensor.solarflow_2_status_raw')|upper not in ['UNAVAILABLE','UNKNOWN','FAULT','ERROR'] %}
          {% set v1 = states('sensor.solarflow_1_solar_input') | float(0) if (on1 and is_number(states('sensor.solarflow_1_solar_input'))) else 0 %}
          {% set v2 = states('sensor.solarflow_2_solar_input') | float(0) if (on2 and is_number(states('sensor.solarflow_2_solar_input'))) else 0 %}

          {{ (v1 + v2) | int }}

      - name: "SolarFlow Total Grid Input"
        unique_id: solarflow_total_grid_input
        default_entity_id: sensor.solarflow_total_grid_input
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        state: >
          {% set on1 = states('sensor.solarflow_1_status_raw')|upper not in ['UNAVAILABLE','UNKNOWN','FAULT','ERROR'] %}
          {% set on2 = states('sensor.solarflow_2_status_raw')|upper not in ['UNAVAILABLE','UNKNOWN','FAULT','ERROR'] %}
          {% set v1 = states('sensor.solarflow_1_grid_input_power') | float(0) if (on1 and is_number(states('sensor.solarflow_1_grid_input_power'))) else 0 %}
          {% set v2 = states('sensor.solarflow_2_grid_input_power') | float(0) if (on2 and is_number(states('sensor.solarflow_2_grid_input_power'))) else 0 %}

          {{ (v1 + v2) | int }}

      - name: "SolarFlow System Total Output"
        unique_id: solarflow_system_total_output
        default_entity_id: sensor.solarflow_system_total_output
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        state: >
          {% set on1 = states('sensor.solarflow_1_status_raw')|upper not in ['UNAVAILABLE','UNKNOWN','FAULT','ERROR'] %}
          {% set on2 = states('sensor.solarflow_2_status_raw')|upper not in ['UNAVAILABLE','UNKNOWN','FAULT','ERROR'] %}
          {% set v1 = states('sensor.solarflow_1_output_power') | float(0) if (on1 and is_number(states('sensor.solarflow_1_output_power'))) else 0 %}
          {% set v2 = states('sensor.solarflow_2_output_power') | float(0) if (on2 and is_number(states('sensor.solarflow_2_output_power'))) else 0 %}

          {{ (v1 + v2) | int }}

      - name: "SolarFlow System Battery Level"
        unique_id: solarflow_system_battery_level
        default_entity_id: sensor.solarflow_system_battery_level
        unit_of_measurement: "%"
        device_class: battery
        state_class: measurement
        availability: >
          {% set s1 = states('sensor.solarflow_1_battery_level') | float(-1) %}
          {% set s2 = states('sensor.solarflow_2_battery_level') | float(-1) %}
          {{ s1 >= 0 or s2 >= 0 }}
        state: >
          {% set s1 = states('sensor.solarflow_1_battery_level') | float(-1) %}
          {% set s2 = states('sensor.solarflow_2_battery_level') | float(-1) %}
          {% set ns = namespace(sum=0, count=0) %}
          {% if s1 >= 0 %}{% set ns.sum = ns.sum + s1 %}{% set ns.count = ns.count + 1 %}{% endif %}
          {% if s2 >= 0 %}{% set ns.sum = ns.sum + s2 %}{% set ns.count = ns.count + 1 %}{% endif %}
          {{ (ns.sum / ns.count) | round(0) if ns.count > 0 else 0 }}

      - name: "SolarFlow 1 Cell Imbalance"
        unique_id: solarflow_1_cell_imbalance
        default_entity_id: sensor.solarflow_1_cell_imbalance
        unit_of_measurement: "V"
        device_class: voltage
        state_class: measurement
        availability: >
          {% set hb = states.sensor.solarflow_1_status_raw %}
          {% set hb_ok = hb is not none and hb.state|upper not in ['UNAVAILABLE','UNKNOWN','FAULT','ERROR'] and (as_timestamp(now()) - as_timestamp(hb.last_reported, 0)) < 300 %}
          {{ hb_ok and is_number(states('sensor.solarflow_1_cell_min_vol')) and is_number(states('sensor.solarflow_1_cell_max_vol')) }}
        state: >
          {% set min_v = states('sensor.solarflow_1_cell_min_vol') | float(0) %}
          {% set max_v = states('sensor.solarflow_1_cell_max_vol') | float(0) %}
          {{ [ (max_v - min_v) | round(3), 0 ] | max }}

      - name: "SolarFlow 2 Cell Imbalance"
        unique_id: solarflow_2_cell_imbalance
        default_entity_id: sensor.solarflow_2_cell_imbalance
        unit_of_measurement: "V"
        device_class: voltage
        state_class: measurement
        availability: >
          {% set hb = states.sensor.solarflow_2_status_raw %}
          {% set hb_ok = hb is not none and hb.state|upper not in ['UNAVAILABLE','UNKNOWN','FAULT','ERROR'] and (as_timestamp(now()) - as_timestamp(hb.last_reported, 0)) < 300 %}
          {{ hb_ok and is_number(states('sensor.solarflow_2_cell_min_vol')) and is_number(states('sensor.solarflow_2_cell_max_vol')) }}
        state: >
          {% set min_v = states('sensor.solarflow_2_cell_min_vol') | float(0) %}
          {% set max_v = states('sensor.solarflow_2_cell_max_vol') | float(0) %}
          {{ [ (max_v - min_v) | round(3), 0 ] | max }}

      - name: "SolarFlow 1 Output Block Reason"
        unique_id: solarflow_1_output_block_reason
        default_entity_id: sensor.solarflow_1_output_block_reason
        icon: mdi:shield-alert
        state: >
          {% set status = states('sensor.solarflow_1_status_raw') | upper %}
          {% set hb = states.sensor.solarflow_1_status_raw %}
          {% set hb_fresh = hb is not none and (as_timestamp(now()) - as_timestamp(hb.last_reported, 0)) < 300 %}
          {% set soc = states('sensor.solarflow_1_battery_level') | float(-1) %}
          {% set soc_off = states('input_number.zendure_conf_soc_off') | float(20) %}
          {% set vmin = states('sensor.solarflow_1_cell_min_vol') | float(0) %}
          {% set t1 = states('sensor.solarflow_1_batt_max_temp') | float(states('sensor.solarflow_1_temp')|float(99)) %}
          {% if status in ['UNAVAILABLE','UNKNOWN','FAULT','ERROR'] %} status_offline
          {% elif not hb_fresh %} heartbeat_stale
          {% elif is_state('input_boolean.zendure_vguard_u1','on') %} vguard_latch
          {% elif is_state('input_boolean.zendure_emergency_u1','on') %} emergency_charge
          {% elif is_state('input_boolean.zendure_calib_mode_u1','on') %} calibration_mode
          {% elif soc < 0 %} soc_invalid
          {% elif soc <= soc_off %} soc_off_guard
          {% elif is_state('input_boolean.zendure_bypass_u1','on') %} bypass_mode
          {% elif vmin <= 0 %} vmin_invalid
          {% elif vmin < 3.00 %} vmin_hard_guard
          {% elif vmin < 3.05 %} vmin_softcap_deep
          {% elif vmin < 3.10 %} vmin_softcap_active
          {% elif t1 < 0 or t1 > 52 %} temp_guard
          {% else %} freigegeben {% endif %}

      - name: "SolarFlow 2 Output Block Reason"
        unique_id: solarflow_2_output_block_reason
        default_entity_id: sensor.solarflow_2_output_block_reason
        icon: mdi:shield-alert
        state: >
          {% set status = states('sensor.solarflow_2_status_raw') | upper %}
          {% set hb = states.sensor.solarflow_2_status_raw %}
          {% set hb_fresh = hb is not none and (as_timestamp(now()) - as_timestamp(hb.last_reported, 0)) < 300 %}
          {% set soc = states('sensor.solarflow_2_battery_level') | float(-1) %}
          {% set soc_off = states('input_number.zendure_conf_soc_off') | float(20) %}
          {% set vmin = states('sensor.solarflow_2_cell_min_vol') | float(0) %}
          {% set t2 = states('sensor.solarflow_2_batt_max_temp') | float(states('sensor.solarflow_2_temp')|float(99)) %}
          {% if status in ['UNAVAILABLE','UNKNOWN','FAULT','ERROR'] %} status_offline
          {% elif not hb_fresh %} heartbeat_stale
          {% elif is_state('input_boolean.zendure_vguard_u2','on') %} vguard_latch
          {% elif is_state('input_boolean.zendure_emergency_u2','on') %} emergency_charge
          {% elif is_state('input_boolean.zendure_calib_mode_u2','on') %} calibration_mode
          {% elif soc < 0 %} soc_invalid
          {% elif soc <= soc_off %} soc_off_guard
          {% elif is_state('input_boolean.zendure_bypass_u2','on') %} bypass_mode
          {% elif vmin <= 0 %} vmin_invalid
          {% elif vmin < 3.00 %} vmin_hard_guard
          {% elif vmin < 3.05 %} vmin_softcap_deep
          {% elif vmin < 3.10 %} vmin_softcap_active
          {% elif t2 < 0 or t2 > 52 %} temp_guard
          {% else %} freigegeben {% endif %}

      - name: "SolarFlow System Total Charge Power V24"
        unique_id: solarflow_system_total_charge_power_v24
        default_entity_id: sensor.solarflow_system_total_charge_power_v24
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        state: >
          {% set solar = states('sensor.solarflow_total_solar_input') | float(0) %}
          {% set grid_in = states('sensor.solarflow_total_grid_input') | float(0) %}
          {% set output = states('sensor.solarflow_system_total_output') | float(0) %}
          {% set total_in = solar + grid_in %}
          {% set diff = total_in - output %}
          {{ diff if diff > 0 else 0 }}

      - name: "SolarFlow System Total Discharge Power V24"
        unique_id: solarflow_system_total_discharge_power_v24
        default_entity_id: sensor.solarflow_system_total_discharge_power_v24
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        state: >
          {% set solar = states('sensor.solarflow_total_solar_input') | float(0) %}
          {% set grid_in = states('sensor.solarflow_total_grid_input') | float(0) %}
          {% set output = states('sensor.solarflow_system_total_output') | float(0) %}
          {% set total_in = solar + grid_in %}
          {% set diff = output - total_in %}
          {{ diff if diff > 0 else 0 }}

# ==============================================================================
# 4. ENERGY SENSORS (RIEMANN SUM)
# ==============================================================================
sensor:
  - platform: integration
    source: sensor.solarflow_total_solar_input
    name: "SolarFlow System Solar Yield Total"
    unit_prefix: k
    method: left
    max_sub_interval:
      minutes: 1

  - platform: integration
    source: sensor.solarflow_system_total_charge_power_v24
    name: "SolarFlow System Battery In Total V24"
    unit_prefix: k
    method: left
    max_sub_interval:
      minutes: 1

  - platform: integration
    source: sensor.solarflow_system_total_discharge_power_v24
    name: "SolarFlow System Battery Out Total V24"
    unit_prefix: k
    method: left
    max_sub_interval:
      minutes: 1

  - platform: statistics
    entity_id: !secret power_meter_total_consumption
    name: "Zendure P1 Mean 30s"
    unique_id: zendure_p1_mean_30s
    state_characteristic: mean
    sampling_size: 8
    max_age:
      seconds: 30

  - platform: statistics
    entity_id: !secret power_meter_total_consumption
    name: "Zendure P1 Stddev 30s"
    unique_id: zendure_p1_stddev_30s
    state_characteristic: standard_deviation
    sampling_size: 8
    max_age:
      seconds: 30

# ==============================================================================
# 5. SCRIPTS (RESET/SAFETY HELPERS)
# ==============================================================================
script:
  zendure_set_u1_outputlimit_zero:
    alias: "Zendure: U1 OutputLimit -> 0W"
    mode: restart
    sequence:
      - action: script.zendure_dispatch_u1_output
        data:
          power: 0
          ensure_output_mode: false

  zendure_set_u2_outputlimit_zero:
    alias: "Zendure: U2 OutputLimit -> 0W"
    mode: restart
    sequence:
      - action: script.zendure_dispatch_u2_output
        data:
          power: 0
          ensure_output_mode: false

  zendure_dispatch_u1_output:
    alias: "Zendure: Dispatch U1 Output Command"
    mode: queued
    fields:
      power:
        description: "Target output power in W"
      ensure_output_mode:
        description: "If true, enforce output mode before sending output limit"
    sequence:
      - variables:
          target: "{{ [0, [power | int(0), 800] | min] | max }}"
          ensure_mode: "{{ ensure_output_mode | default(true) }}"
          base: "{{ states('input_number.zendure_last_sent_1') | int(0) }}"
          ts_cmd: "{{ as_timestamp(states.input_number.zendure_last_sent_1.last_updated, 0) }}"
          since_cmd: "{{ as_timestamp(now()) - ts_cmd }}"
          cmd_ok: "{{ since_cmd > 1.5 }}"
          ts_mode: "{{ as_timestamp(states.input_text.zendure_ac_mode_u1.last_updated, 0) }}"
          since_mode: "{{ as_timestamp(now()) - ts_mode }}"
          mode_ok: "{{ since_mode > 10 }}"
          mode_mismatch: "{{ states('sensor.solarflow_1_ac_mode') != 'Output mode' or states('input_text.zendure_ac_mode_u1') != 'Output mode' }}"
      - if:
          - condition: template
            value_template: "{{ ensure_mode and mode_mismatch and mode_ok }}"
        then:
          - action: input_text.set_value
            target: { entity_id: input_text.zendure_ac_mode_u1 }
            data: { value: "Output mode" }
          - action: mqtt.publish
            data: { topic: !secret zendure_topic_u1_select_acMode_set, payload: "Output mode", qos: 1 }
      - if:
          - condition: template
            value_template: "{{ target != base and cmd_ok }}"
        then:
          - action: mqtt.publish
            data: { topic: !secret zendure_topic_u1_number_outputLimit_set, payload: "{{ target }}", qos: 1 }
          - action: input_number.set_value
            target: { entity_id: input_number.zendure_last_sent_1 }
            data: { value: "{{ target }}" }

  zendure_dispatch_u2_output:
    alias: "Zendure: Dispatch U2 Output Command"
    mode: queued
    fields:
      power:
        description: "Target output power in W"
      ensure_output_mode:
        description: "If true, enforce output mode before sending output limit"
    sequence:
      - variables:
          target: "{{ [0, [power | int(0), 800] | min] | max }}"
          ensure_mode: "{{ ensure_output_mode | default(true) }}"
          base: "{{ states('input_number.zendure_last_sent_2') | int(0) }}"
          ts_cmd: "{{ as_timestamp(states.input_number.zendure_last_sent_2.last_updated, 0) }}"
          since_cmd: "{{ as_timestamp(now()) - ts_cmd }}"
          cmd_ok: "{{ since_cmd > 1.5 }}"
          ts_mode: "{{ as_timestamp(states.input_text.zendure_ac_mode_u2.last_updated, 0) }}"
          since_mode: "{{ as_timestamp(now()) - ts_mode }}"
          mode_ok: "{{ since_mode > 10 }}"
          mode_mismatch: "{{ states('sensor.solarflow_2_ac_mode') != 'Output mode' or states('input_text.zendure_ac_mode_u2') != 'Output mode' }}"
      - if:
          - condition: template
            value_template: "{{ ensure_mode and mode_mismatch and mode_ok }}"
        then:
          - action: input_text.set_value
            target: { entity_id: input_text.zendure_ac_mode_u2 }
            data: { value: "Output mode" }
          - action: mqtt.publish
            data: { topic: !secret zendure_topic_u2_select_acMode_set, payload: "Output mode", qos: 1 }
      - if:
          - condition: template
            value_template: "{{ target != base and cmd_ok }}"
        then:
          - action: mqtt.publish
            data: { topic: !secret zendure_topic_u2_number_outputLimit_set, payload: "{{ target }}", qos: 1 }
          - action: input_number.set_value
            target: { entity_id: input_number.zendure_last_sent_2 }
            data: { value: "{{ target }}" }

  zendure_dispatch_u1_ac_mode:
    alias: "Zendure: Dispatch U1 AC Mode"
    mode: queued
    fields:
      mode:
        description: "Input mode oder Output mode"
      force:
        description: "Ignoriere Cooldown bei Notfällen"
    sequence:
      - variables:
          target_mode: "{{ mode | default('Output mode') }}"
          force_mode: "{{ force | default(false) }}"
          ts_mode: "{{ as_timestamp(states.input_text.zendure_ac_mode_u1.last_updated, 0) }}"
          since_mode: "{{ as_timestamp(now()) - ts_mode }}"
          mode_ok: "{{ since_mode > 20 }}"
          mode_mismatch: "{{ states('sensor.solarflow_1_ac_mode') != target_mode or states('input_text.zendure_ac_mode_u1') != target_mode }}"
      - if:
          - condition: template
            value_template: "{{ mode_mismatch and (force_mode or mode_ok) }}"
        then:
          - action: input_text.set_value
            target: { entity_id: input_text.zendure_ac_mode_u1 }
            data: { value: "{{ target_mode }}" }
          - action: mqtt.publish
            data: { topic: !secret zendure_topic_u1_select_acMode_set, payload: "{{ target_mode }}", qos: 1 }

  zendure_dispatch_u2_ac_mode:
    alias: "Zendure: Dispatch U2 AC Mode"
    mode: queued
    fields:
      mode:
        description: "Input mode oder Output mode"
      force:
        description: "Ignoriere Cooldown bei Notfällen"
    sequence:
      - variables:
          target_mode: "{{ mode | default('Output mode') }}"
          force_mode: "{{ force | default(false) }}"
          ts_mode: "{{ as_timestamp(states.input_text.zendure_ac_mode_u2.last_updated, 0) }}"
          since_mode: "{{ as_timestamp(now()) - ts_mode }}"
          mode_ok: "{{ since_mode > 20 }}"
          mode_mismatch: "{{ states('sensor.solarflow_2_ac_mode') != target_mode or states('input_text.zendure_ac_mode_u2') != target_mode }}"
      - if:
          - condition: template
            value_template: "{{ mode_mismatch and (force_mode or mode_ok) }}"
        then:
          - action: input_text.set_value
            target: { entity_id: input_text.zendure_ac_mode_u2 }
            data: { value: "{{ target_mode }}" }
          - action: mqtt.publish
            data: { topic: !secret zendure_topic_u2_select_acMode_set, payload: "{{ target_mode }}", qos: 1 }

  zendure_dispatch_u1_inputlimit:
    alias: "Zendure: Dispatch U1 InputLimit"
    mode: queued
    fields:
      power:
        description: "Target input limit in W"
    sequence:
      - variables:
          target: "{{ [0, [power | int(0), 800] | min] | max }}"
          base: "{{ states('sensor.solarflow_1_setting_chargelimit') | int(-1) }}"
          ts_base: "{{ as_timestamp(states.sensor.solarflow_1_setting_chargelimit.last_updated, 0) }}"
          since_base: "{{ as_timestamp(now()) - ts_base }}"
          cmd_ok: "{{ since_base > 2.2 }}"
      - if:
          - condition: template
            value_template: "{{ target != base and cmd_ok }}"
        then:
          - action: mqtt.publish
            data: { topic: !secret zendure_topic_u1_number_inputLimit_set, payload: "{{ target }}", qos: 1 }

  zendure_dispatch_u2_inputlimit:
    alias: "Zendure: Dispatch U2 InputLimit"
    mode: queued
    fields:
      power:
        description: "Target input limit in W"
    sequence:
      - variables:
          target: "{{ [0, [power | int(0), 800] | min] | max }}"
          base: "{{ states('sensor.solarflow_2_setting_chargelimit') | int(-1) }}"
          ts_base: "{{ as_timestamp(states.sensor.solarflow_2_setting_chargelimit.last_updated, 0) }}"
          since_base: "{{ as_timestamp(now()) - ts_base }}"
          cmd_ok: "{{ since_base > 2.2 }}"
      - if:
          - condition: template
            value_template: "{{ target != base and cmd_ok }}"
        then:
          - action: mqtt.publish
            data: { topic: !secret zendure_topic_u2_number_inputLimit_set, payload: "{{ target }}", qos: 1 }

  zendure_start_emergency_u1_manual:
    alias: "Zendure: Manual Emergency Start U1"
    mode: restart
    sequence:
      - condition: state
        entity_id: input_boolean.zendure_auto_mode
        state: "on"
      - condition: state
        entity_id: input_boolean.zendure_calib_mode_u1
        state: "off"
      - action: input_boolean.turn_off
        target: { entity_id: input_boolean.zendure_vguard_u1 }
      - action: input_boolean.turn_on
        target: { entity_id: input_boolean.zendure_emergency_u1 }
      - variables:
          t1: "{{ states('sensor.solarflow_1_batt_max_temp') | float(states('sensor.solarflow_1_temp')|float(0)) }}"
          soc1: "{{ states('sensor.solarflow_1_battery_level') | float(0) }}"
          cl1: "{{ 100 if t1 < 5 else (300 if t1 < 10 else 800) }}"
          ss1: "{{ 300 if soc1 < 12 else 800 }}"
          limit_emerg_u1: "{{ [300, cl1|int, ss1|int]|min }}"
      - action: script.zendure_dispatch_u1_ac_mode
        data:
          mode: "Input mode"
          force: true
      - action: script.zendure_set_u1_outputlimit_zero
      - action: script.zendure_dispatch_u1_inputlimit
        data:
          power: "{{ limit_emerg_u1|int }}"
      - action: input_number.set_value
        target: { entity_id: input_number.zendure_last_sent_1 }
        data: { value: 0 }
      - action: notify.send_message
        target:
          entity_id: !secret telegram_id1
        data:
          message: "🛠️ *Manuelle Notladung U1*\nGestartet (Input mode, InputLimit {{ limit_emerg_u1|int }}W)."

  zendure_start_emergency_u2_manual:
    alias: "Zendure: Manual Emergency Start U2"
    mode: restart
    sequence:
      - condition: state
        entity_id: input_boolean.zendure_auto_mode
        state: "on"
      - condition: state
        entity_id: input_boolean.zendure_calib_mode_u2
        state: "off"
      - action: input_boolean.turn_off
        target: { entity_id: input_boolean.zendure_vguard_u2 }
      - action: input_boolean.turn_on
        target: { entity_id: input_boolean.zendure_emergency_u2 }
      - variables:
          t2: "{{ states('sensor.solarflow_2_batt_max_temp') | float(states('sensor.solarflow_2_temp')|float(0)) }}"
          soc2: "{{ states('sensor.solarflow_2_battery_level') | float(0) }}"
          cl2: "{{ 100 if t2 < 5 else (300 if t2 < 10 else 800) }}"
          ss2: "{{ 300 if soc2 < 12 else 800 }}"
          limit_emerg_u2: "{{ [300, cl2|int, ss2|int]|min }}"
      - action: script.zendure_dispatch_u2_ac_mode
        data:
          mode: "Input mode"
          force: true
      - action: script.zendure_set_u2_outputlimit_zero
      - action: script.zendure_dispatch_u2_inputlimit
        data:
          power: "{{ limit_emerg_u2|int }}"
      - action: input_number.set_value
        target: { entity_id: input_number.zendure_last_sent_2 }
        data: { value: 0 }
      - action: notify.send_message
        target:
          entity_id: !secret telegram_id1
        data:
          message: "🛠️ *Manuelle Notladung U2*\nGestartet (Input mode, InputLimit {{ limit_emerg_u2|int }}W)."

  zendure_reset_u1_output_safe:
    alias: "Zendure: Reset U1 auf Output 0W"
    mode: restart
    sequence:
      - if:
          - condition: template
            value_template: "{{ states('sensor.solarflow_1_status_raw')|upper not in ['UNAVAILABLE','UNKNOWN','FAULT','ERROR'] }}"
        then:
          - action: input_text.set_value
            target: { entity_id: input_text.zendure_ac_mode_u1 }
            data: { value: "Output mode" }
          - if:
              - condition: template
                value_template: "{{ states('sensor.solarflow_1_ac_mode') != 'Output mode' }}"
            then:
              - action: script.zendure_dispatch_u1_ac_mode
                data:
                  mode: "Output mode"
                  force: true
          - action: script.zendure_set_u1_outputlimit_zero
          - if:
              - condition: template
                value_template: >
                  {% set last = states('input_number.zendure_last_sent_1')|int(0) %}
                  {% set s = states.sensor.solarflow_1_status_raw %}
                  {% set online = s.state|upper not in ['UNAVAILABLE','UNKNOWN','FAULT','ERROR'] %}
                  {% set fresh = (as_timestamp(now()) - as_timestamp(s.last_reported, default=0)) < 180 %}
                  {{ online and fresh and last > 0 }}
            then:
              - action: input_number.set_value
                target: { entity_id: input_number.zendure_last_sent_1 }
                data: { value: 0 }

  zendure_reset_u2_output_safe:
    alias: "Zendure: Reset U2 auf Output 0W"
    mode: restart
    sequence:
      - if:
          - condition: template
            value_template: "{{ states('sensor.solarflow_2_status_raw')|upper not in ['UNAVAILABLE','UNKNOWN','FAULT','ERROR'] }}"
        then:
          - action: input_text.set_value
            target: { entity_id: input_text.zendure_ac_mode_u2 }
            data: { value: "Output mode" }
          - if:
              - condition: template
                value_template: "{{ states('sensor.solarflow_2_ac_mode') != 'Output mode' }}"
            then:
              - action: script.zendure_dispatch_u2_ac_mode
                data:
                  mode: "Output mode"
                  force: true
          - action: script.zendure_set_u2_outputlimit_zero
          - if:
              - condition: template
                value_template: >
                  {% set last = states('input_number.zendure_last_sent_2')|int(0) %}
                  {% set s = states.sensor.solarflow_2_status_raw %}
                  {% set online = s.state|upper not in ['UNAVAILABLE','UNKNOWN','FAULT','ERROR'] %}
                  {% set fresh = (as_timestamp(now()) - as_timestamp(s.last_reported, default=0)) < 180 %}
                  {{ online and fresh and last > 0 }}
            then:
              - action: input_number.set_value
                target: { entity_id: input_number.zendure_last_sent_2 }
                data: { value: 0 }

# ==============================================================================
# 6. AUTOMATISIERUNGEN
# ==============================================================================
automation:
  # --- 5.1 KILL SWITCH ---
  - alias: "Zendure: Safety Kill Switch (Auto-Mode OFF)"
    id: "zendure_safety_kill_switch"
    mode: restart
    initial_state: true
    triggers:
      - trigger: state
        entity_id: input_boolean.zendure_auto_mode
        to: "off"
        id: "off"
      - trigger: state
        entity_id: input_boolean.zendure_auto_mode
        to: "on"
        id: "on"
    actions:
      - if:
          - condition: template
            value_template: "{{ trigger.id == 'on' }}"
        then:
          - stop: "Auto-Mode switched ON. Kill-Switch cancelled."

      - action: input_boolean.turn_off
        target:
          entity_id:
            - input_boolean.zendure_emergency_u1
            - input_boolean.zendure_emergency_u2
            - input_boolean.zendure_calib_mode_u1
            - input_boolean.zendure_calib_mode_u2
            - input_boolean.zendure_vguard_u1
            - input_boolean.zendure_vguard_u2

      - repeat:
          count: 3
          sequence:
            - condition: state
              entity_id: input_boolean.zendure_auto_mode
              state: "off"

            - parallel:
                - action: script.zendure_reset_u1_output_safe
                - action: script.zendure_reset_u2_output_safe
            - delay: "00:00:01"

# --- 6.0 INITIALIZATION ---
  - alias: "Zendure: Initialize Calibration Timer"
    id: "zendure_init_calib_timer"
    mode: single
    initial_state: true
    triggers:
      - trigger: homeassistant
        event: start
    actions:
      - variables:
          ts_now: "{{ as_timestamp(now()) | int(0) }}"
      - if:
          - condition: template
            value_template: >
              {{ states('input_datetime.zendure_last_full_charge_1') in ['unknown', 'unavailable', 'none'] }}
        then:
          - action: input_datetime.set_datetime
            target: { entity_id: input_datetime.zendure_last_full_charge_1 }
            data: { timestamp: "{{ ts_now }}" }
      - if:
          - condition: template
            value_template: >
              {{ states('input_datetime.zendure_last_full_charge_2') in ['unknown', 'unavailable', 'none'] }}
        then:
          - action: input_datetime.set_datetime
            target: { entity_id: input_datetime.zendure_last_full_charge_2 }
            data: { timestamp: "{{ ts_now }}" }
      - if:
          - condition: template
            value_template: >
              {{ as_timestamp(states('input_datetime.zendure_last_full_charge_1'), default=0) < 946684800 }}
        then:
          - action: input_boolean.turn_on
            target: { entity_id: input_boolean.zendure_force_calib_u1 }
          - action: input_datetime.set_datetime
            target: { entity_id: input_datetime.zendure_last_full_charge_1 }
            data: { timestamp: "{{ ts_now }}" }
      - if:
          - condition: template
            value_template: >
              {{ as_timestamp(states('input_datetime.zendure_last_full_charge_2'), default=0) < 946684800 }}
        then:
          - action: input_boolean.turn_on
            target: { entity_id: input_boolean.zendure_force_calib_u2 }
          - action: input_datetime.set_datetime
            target: { entity_id: input_datetime.zendure_last_full_charge_2 }
            data: { timestamp: "{{ ts_now }}" }
      - variables:
          soc_off: "{{ states('input_number.zendure_conf_soc_off') | float(20) }}"
          min_out: "{{ states('input_number.zendure_conf_vguard_set_min_output') | float(30) }}"
      - if:
          - condition: state
            entity_id: input_boolean.zendure_vguard_u1
            state: "on"
        then:
          - action: script.zendure_set_u1_outputlimit_zero
          - action: input_number.set_value
            target: { entity_id: input_number.zendure_last_sent_1 }
            data: { value: 0 }
      - if:
          - condition: state
            entity_id: input_boolean.zendure_vguard_u2
            state: "on"
        then:
          - action: script.zendure_set_u2_outputlimit_zero
          - action: input_number.set_value
            target: { entity_id: input_number.zendure_last_sent_2 }
            data: { value: 0 }
      - if:
          - condition: template
            value_template: >
              {% set vmin = states('sensor.solarflow_1_cell_min_vol')|float(99) %}
              {% set soc = states('sensor.solarflow_1_battery_level')|float(100) %}
              {% set out_pwr = states('sensor.solarflow_1_output_power')|float(0) %}
              {% set normal_set = (soc <= (soc_off + 8) and vmin <= 3.02 and out_pwr > min_out) %}
              {% set hard_set = (soc <= (soc_off + 4) and vmin > 2.0 and vmin <= 2.95) %}
              {{ is_state('input_boolean.zendure_auto_mode','on')
                 and states('sensor.solarflow_1_status_raw')|upper not in ['UNAVAILABLE','UNKNOWN','FAULT','ERROR']
                 and (normal_set or hard_set) }}
        then:
          - action: input_boolean.turn_on
            target: { entity_id: input_boolean.zendure_vguard_u1 }
          - action: script.zendure_set_u1_outputlimit_zero
      - if:
          - condition: template
            value_template: >
              {% set vmin = states('sensor.solarflow_2_cell_min_vol')|float(99) %}
              {% set soc = states('sensor.solarflow_2_battery_level')|float(100) %}
              {% set out_pwr = states('sensor.solarflow_2_output_power')|float(0) %}
              {% set normal_set = (soc <= (soc_off + 8) and vmin <= 3.02 and out_pwr > min_out) %}
              {% set hard_set = (soc <= (soc_off + 4) and vmin > 2.0 and vmin <= 2.95) %}
              {{ is_state('input_boolean.zendure_auto_mode','on')
                 and states('sensor.solarflow_2_status_raw')|upper not in ['UNAVAILABLE','UNKNOWN','FAULT','ERROR']
                 and (normal_set or hard_set) }}
        then:
          - action: input_boolean.turn_on
            target: { entity_id: input_boolean.zendure_vguard_u2 }
          - action: script.zendure_set_u2_outputlimit_zero

  # --- 6.1 SYNC ON STARTUP ---
  - alias: "Zendure: Sync Memory on Start"
    id: "zendure_sync_on_start"
    initial_state: true
    triggers:
      - trigger: homeassistant
        event: start
    conditions:
      - condition: state
        entity_id: input_boolean.zendure_auto_mode
        state: "on"
    actions:
      - delay: "00:00:10"
      - if:
          - condition: template
            value_template: >
              {{ is_number(states('sensor.solarflow_1_output_limit'))
                 and states('sensor.solarflow_1_status_raw')|upper not in ['UNAVAILABLE', 'UNKNOWN', 'FAULT', 'ERROR']
                 and (states('input_number.zendure_last_sent_1')|int(0) >= 0) }}
        then:
          - action: input_number.set_value
            target: { entity_id: input_number.zendure_last_sent_1 }
            data: { value: "{{ [[states('sensor.solarflow_1_output_limit')|int(0),0]|max,800]|min }}" }
      - if:
          - condition: template
            value_template: >
              {{ is_number(states('sensor.solarflow_2_output_limit'))
                 and states('sensor.solarflow_2_status_raw')|upper not in ['UNAVAILABLE', 'UNKNOWN', 'FAULT', 'ERROR']
                 and (states('input_number.zendure_last_sent_2')|int(0) >= 0) }}
        then:
          - action: input_number.set_value
            target: { entity_id: input_number.zendure_last_sent_2 }
            data: { value: "{{ [[states('sensor.solarflow_2_output_limit')|int(0),0]|max,800]|min }}" }

  # --- 6.2 ANTI-DRIFT WATCHDOG ---
  - alias: "Zendure: Anti-Drift Watchdog"
    id: "zendure_anti_drift_watchdog"
    mode: queued
    initial_state: true
    triggers:
      - trigger: template
        id: "drift_1"
        value_template: >
          {{ states('sensor.solarflow_1_status_raw')|upper not in ['UNAVAILABLE','UNKNOWN','FAULT','ERROR']
             and is_number(states('sensor.solarflow_1_output_limit'))
             and (states('sensor.solarflow_1_output_limit')|float(0) - states('input_number.zendure_last_sent_1')|float(0))|abs > 30 }}
        for: "00:01:00"
      - trigger: template
        id: "drift_2"
        value_template: >
          {{ states('sensor.solarflow_2_status_raw')|upper not in ['UNAVAILABLE','UNKNOWN','FAULT','ERROR']
             and is_number(states('sensor.solarflow_2_output_limit'))
             and (states('sensor.solarflow_2_output_limit')|float(0) - states('input_number.zendure_last_sent_2')|float(0))|abs > 30 }}
        for: "00:01:00"
    conditions:
      - condition: state
        entity_id: input_boolean.zendure_auto_mode
        state: "on"
      - condition: template
        value_template: >
          {% if trigger.id == 'drift_1' %}
            {{ states('input_number.zendure_last_sent_1')|float(0) >= 0 }}
          {% else %}
            {{ states('input_number.zendure_last_sent_2')|float(0) >= 0 }}
          {% endif %}
    actions:
      - choose:
          - conditions:
              - condition: template
                value_template: >
                  {{ trigger.id == 'drift_1'
                     and is_state('input_boolean.zendure_emergency_u1', 'off')
                     and is_state('input_boolean.zendure_calib_mode_u1', 'off') }}
            sequence:
              - action: input_number.set_value
                target: { entity_id: input_number.zendure_last_sent_1 }
                data: { value: "{{ [[states('sensor.solarflow_1_output_limit')|int(0),0]|max,800]|min }}" }
          - conditions:
              - condition: template
                value_template: >
                  {{ trigger.id == 'drift_2'
                     and is_state('input_boolean.zendure_emergency_u2', 'off')
                     and is_state('input_boolean.zendure_calib_mode_u2', 'off') }}
            sequence:
              - action: input_number.set_value
                target: { entity_id: input_number.zendure_last_sent_2 }
                data: { value: "{{ [[states('sensor.solarflow_2_output_limit')|int(0),0]|max,800]|min }}" }

  # --- 6.2b SYNC MEMORY FROM MQTT ---
  - alias: "Zendure: Sync Memory from OutputLimit"
    id: "zendure_sync_memory_from_outputlimit"
    mode: queued
    initial_state: true
    triggers:
      - trigger: state
        entity_id:
          - sensor.solarflow_1_output_limit
          - sensor.solarflow_2_output_limit
    conditions:
      - condition: template
        value_template: >
          {{ is_number(trigger.to_state.state) }}
    actions:
      - choose:
          - conditions:
              - condition: template
                value_template: >
                  {{ trigger.entity_id == 'sensor.solarflow_1_output_limit'
                     and is_state('input_boolean.zendure_emergency_u1','off')
                     and is_state('input_boolean.zendure_calib_mode_u1','off')
                     and states('sensor.solarflow_1_status_raw')|upper not in ['UNAVAILABLE','UNKNOWN','FAULT','ERROR']
                     and (states('input_number.zendure_last_sent_1')|int(0) >= 0)
                     and (trigger.to_state.state|int(0) != states('input_number.zendure_last_sent_1')|int(0)) }}
            sequence:
              - action: input_number.set_value
                target: { entity_id: input_number.zendure_last_sent_1 }
                data: { value: "{{ [[trigger.to_state.state|int(0),0]|max,800]|min }}" }
          - conditions:
              - condition: template
                value_template: >
                  {{ trigger.entity_id == 'sensor.solarflow_2_output_limit'
                     and is_state('input_boolean.zendure_emergency_u2','off')
                     and is_state('input_boolean.zendure_calib_mode_u2','off')
                     and states('sensor.solarflow_2_status_raw')|upper not in ['UNAVAILABLE','UNKNOWN','FAULT','ERROR']
                     and (states('input_number.zendure_last_sent_2')|int(0) >= 0)
                     and (trigger.to_state.state|int(0) != states('input_number.zendure_last_sent_2')|int(0)) }}
            sequence:
              - action: input_number.set_value
                target: { entity_id: input_number.zendure_last_sent_2 }
                data: { value: "{{ [[trigger.to_state.state|int(0),0]|max,800]|min }}" }

  # --- 6.3 BYPASS LATCH MANAGER ---
  - alias: "Zendure: Bypass Latch Manager"
    id: "zendure_bypass_latch_manager"
    mode: single
    initial_state: true
    triggers:
      - trigger: state
        entity_id: [sensor.solarflow_1_battery_level, sensor.solarflow_2_battery_level]
      - trigger: homeassistant
        event: start
      - trigger: state
        entity_id: input_number.zendure_conf_soc_bypass
      - trigger: state
        entity_id: input_boolean.zendure_auto_mode
    actions:
      - variables:
          soc_entry: "{{ states('input_number.zendure_conf_soc_bypass') | int(30) }}"
          soc_exit: "{{ (soc_entry | int(30)) + 1 }}"
          soc1_ok: "{{ is_number(states('sensor.solarflow_1_battery_level')) }}"
          soc2_ok: "{{ is_number(states('sensor.solarflow_2_battery_level')) }}"
          soc1: "{{ states('sensor.solarflow_1_battery_level') | float(0) }}"
          soc2: "{{ states('sensor.solarflow_2_battery_level') | float(0) }}"

      - if:
          - condition: template
            value_template: "{{ soc1_ok and soc1 <= soc_entry }}"
        then:
          - action: input_boolean.turn_on
            target: { entity_id: input_boolean.zendure_bypass_u1 }
      - if:
          - condition: template
            value_template: "{{ soc1_ok and soc1 >= soc_exit }}"
        then:
          - action: input_boolean.turn_off
            target: { entity_id: input_boolean.zendure_bypass_u1 }

      - if:
          - condition: template
            value_template: "{{ soc2_ok and soc2 <= soc_entry }}"
        then:
          - action: input_boolean.turn_on
            target: { entity_id: input_boolean.zendure_bypass_u2 }
      - if:
          - condition: template
            value_template: "{{ soc2_ok and soc2 >= soc_exit }}"
        then:
          - action: input_boolean.turn_off
            target: { entity_id: input_boolean.zendure_bypass_u2 }

  # --- 6.4 CONTROL LOOP ---
  - alias: "Zendure v132: Init Fast Gates"
    id: "zendure_v132_init_fast_gates"
    mode: single
    initial_state: true
    triggers:
      - trigger: homeassistant
        event: start
    actions:
      - variables:
          now_ts: "{{ as_timestamp(now()) | float(0) }}"
      - action: input_datetime.set_datetime
        target:
          entity_id: input_datetime.zendure_v132_zero_next
        data:
          timestamp: "{{ now_ts }}"
      - action: input_datetime.set_datetime
        target:
          entity_id: input_datetime.zendure_v132_zero_fast_until
        data:
          timestamp: "{{ now_ts }}"

  - alias: "Zendure v132: YAML Master (Stddev FastGate)"
    id: "zendure_v132_yaml_master"
    mode: restart
    initial_state: true
    max_exceeded: silent
    triggers:
      - trigger: state
        entity_id: !secret power_meter_total_consumption
        id: meter_step
      - trigger: time_pattern
        seconds: "/3"
        id: periodic
    actions:
      - if:
          - condition: state
            entity_id: input_boolean.zendure_auto_mode
            state: "off"
        then:
          - stop: "Auto mode off"

      - variables:
          now_ts: "{{ as_timestamp(now()) | float(0) }}"
          zero_next_ts: "{{ as_timestamp(states('input_datetime.zendure_v132_zero_next'), default=0) | float(0) }}"
          zero_fast_until_ts: "{{ as_timestamp(states('input_datetime.zendure_v132_zero_fast_until'), default=0) | float(0) }}"
          meter_entity: !secret power_meter_total_consumption
          grid: "{{ states(meter_entity) | float(0) }}"
          p1_mean: "{{ states('sensor.zendure_p1_mean_30s') | float(grid) }}"
          p1_stddev: "{{ states('sensor.zendure_p1_stddev_30s') | float(0) }}"
          stddev_min: 15
          stddev_factor: 3.5
          fast_threshold: "{{ (stddev_factor | float(3.5)) * ([stddev_min | float(15), p1_stddev | float(0)] | max) }}"
          jump: >-
            {% if trigger.id == 'meter_step' and trigger.from_state is not none and trigger.to_state is not none and is_number(trigger.from_state.state) and is_number(trigger.to_state.state) %}
              {{ ((trigger.to_state.state | float(0)) - (trigger.from_state.state | float(0))) | abs }}
            {% else %}
              0
            {% endif %}
          is_fast: "{{ ((grid - p1_mean) | abs) > (fast_threshold | float(0)) or (jump | float(0)) >= 30 }}"

      - if:
          - condition: template
            value_template: "{{ now_ts < zero_fast_until_ts }}"
        then:
          - stop: "Fast gate active"

      - if:
          - condition: template
            value_template: "{{ (not is_fast) and (now_ts <= zero_next_ts) }}"
        then:
          - stop: "Normal gate active"

      - variables:
          cmd1: "{{ states('input_number.zendure_last_sent_1') | int(0) }}"
          cmd2: "{{ states('input_number.zendure_last_sent_2') | int(0) }}"
          cmd_total: "{{ (cmd1 | int(0)) + (cmd2 | int(0)) }}"
          out_total: "{{ (states('sensor.solarflow_1_output_power')|int(0)) + (states('sensor.solarflow_2_output_power')|int(0)) }}"
          control_total: "{{ ((cmd_total | int(0)) * 0.75 + (out_total | int(0)) * 0.25) | int(0) }}"
          hysteresis_base: "{{ states('input_number.zendure_conf_hysteresis') | int(8) }}"
          hysteresis: "{{ [2, ((hysteresis_base | int(0)) // 2)] | max if is_fast else hysteresis_base }}"
          grid_bias: "{{ states('input_number.zendure_conf_grid_bias') | int(10) }}"
          max_total: "{{ states('input_number.zendure_conf_max_output') | int(1200) }}"
          target_raw: "{{ (control_total | int(0)) + (grid | int(0)) - (grid_bias | int(0)) }}"
          target_total: "{{ [[target_raw | int(0), 0] | max, max_total | int(0)] | min }}"
          current_target: "{{ states('input_number.zendure_target_total') | int(0) }}"

      - if:
          - condition: template
            value_template: "{{ (not is_fast) and (((target_total|int(0) - current_target|int(0)) | abs) <= (hysteresis|int(0))) }}"
        then:
          - action: input_datetime.set_datetime
            target:
              entity_id: input_datetime.zendure_v132_zero_next
            data:
              timestamp: "{{ now_ts + 4.0 }}"
          - action: input_datetime.set_datetime
            target:
              entity_id: input_datetime.zendure_v132_zero_fast_until
            data:
              timestamp: "{{ now_ts + 2.2 }}"
          - stop: "Inside deadband"

      - action: input_number.set_value
        target:
          entity_id: input_number.zendure_target_total
        data:
          value: "{{ target_total }}"

      - action: input_datetime.set_datetime
        target:
          entity_id: input_datetime.zendure_v132_zero_next
        data:
          timestamp: "{{ now_ts + 4.0 }}"
      - action: input_datetime.set_datetime
        target:
          entity_id: input_datetime.zendure_v132_zero_fast_until
        data:
          timestamp: "{{ now_ts + 2.2 }}"

  - alias: "Zendure v132: Guard Layer (v110 Advanced)"
    id: "zendure_v132_guard_layer"
    mode: restart
    initial_state: true
    max_exceeded: silent
    triggers:
      - trigger: time_pattern
        seconds: "/2"
        id: periodic
      - trigger: numeric_state
        entity_id: !secret power_meter_total_consumption
        above: 150
        for: "00:00:01"
        id: import_spike
      - trigger: numeric_state
        entity_id: !secret power_meter_total_consumption
        below: -30
        for: "00:00:01"
        id: export_spike
      - trigger: state
        entity_id: !secret power_meter_total_consumption
        id: meter_step
      - trigger: state
        entity_id:
          - input_boolean.zendure_bypass_u1
          - input_boolean.zendure_bypass_u2
        id: mode_change
      - trigger: state
        entity_id:
          - input_boolean.zendure_auto_mode
          - input_boolean.zendure_emergency_u1
          - input_boolean.zendure_emergency_u2
          - input_boolean.zendure_calib_mode_u1
          - input_boolean.zendure_calib_mode_u2
          - input_boolean.zendure_vguard_u1
          - input_boolean.zendure_vguard_u2
        id: safety_change
    actions:
      - if:
          - condition: state
            entity_id: input_boolean.zendure_auto_mode
            state: "off"
        then:
          - stop: "Auto Mode is OFF - Loop aborted."
      - variables:
          quick_jump: >-
            {% if trigger.id == 'meter_step' and trigger.from_state is not none and trigger.to_state is not none and is_number(trigger.from_state.state) and is_number(trigger.to_state.state) %}
              {{ ((trigger.to_state.state | float(0)) - (trigger.from_state.state | float(0))) | abs }}
            {% else %}
              0
            {% endif %}
      - if:
          - condition: template
            value_template: "{{ trigger.id == 'meter_step' and (quick_jump | float(0)) < 15 }}"
        then:
          - stop: "Meter step too small - skip full loop."

      - variables:
          power_meter_entity: !secret power_meter_total_consumption
          shelly_ok: >-
            {% set meter = power_meter_entity %}
            {% set s = (expand(meter) | first) if meter|length > 0 else none %}
            {% set val = s.state if s is not none else 'unknown' %}
            {% set ts_reported = as_timestamp(s.last_reported, 0) if s is not none and s.last_reported is defined else 0 %}
            {% set ts_changed = as_timestamp(s.last_changed, 0) if s is not none else 0 %}
            {% set fresh = (as_timestamp(now()) - ts_reported) < 25 or (as_timestamp(now()) - ts_changed) < 25 %}
            {{ s is not none and val|upper not in ['UNAVAILABLE','UNKNOWN','NONE'] and is_number(val) and fresh }}

          s1_fresh: >-
            {% set stat = states.sensor.solarflow_1_status_raw %}
            {% set age = (as_timestamp(now()) - as_timestamp(stat.last_reported, 0)) if stat is not none else 9999 %}
            {{ stat is not none
               and stat.state|upper not in ['UNAVAILABLE', 'UNKNOWN', 'FAULT', 'ERROR']
               and age < 300 }}

          s2_fresh: >-
            {% set stat = states.sensor.solarflow_2_status_raw %}
            {% set age = (as_timestamp(now()) - as_timestamp(stat.last_reported, 0)) if stat is not none else 9999 %}
            {{ stat is not none
               and stat.state|upper not in ['UNAVAILABLE', 'UNKNOWN', 'FAULT', 'ERROR']
               and age < 300 }}

          v1_min_ok: "{{ has_value('sensor.solarflow_1_cell_min_vol') }}"
          v2_min_ok: "{{ has_value('sensor.solarflow_2_cell_min_vol') }}"
          v1_min: "{{ states('sensor.solarflow_1_cell_min_vol') | float(0) if v1_min_ok | bool else 0 }}"
          v2_min: "{{ states('sensor.solarflow_2_cell_min_vol') | float(0) if v2_min_ok | bool else 0 }}"
          t1_raw: "{{ states('sensor.solarflow_1_batt_max_temp') | float(states('sensor.solarflow_1_temp')|float(99)) }}"
          t2_raw: "{{ states('sensor.solarflow_2_batt_max_temp') | float(states('sensor.solarflow_2_temp')|float(99)) }}"
          soc1_raw: "{{ states('sensor.solarflow_1_battery_level') | float(-1) }}"
          soc2_raw: "{{ states('sensor.solarflow_2_battery_level') | float(-1) }}"

          s1_plausible: "{{ t1_raw < 80 and v1_min_ok | bool and v1_min > 2.0 and soc1_raw >= 0 }}"
          s2_plausible: "{{ t2_raw < 80 and v2_min_ok | bool and v2_min > 2.0 and soc2_raw >= 0 }}"

          s1_ok: "{{ s1_fresh | bool and s1_plausible | bool }}"
          s2_ok: "{{ s2_fresh | bool and s2_plausible | bool }}"

          pv_u1_recent: >-
            {% set sol = states.sensor.solarflow_1_solar_input %}
            {{ s1_fresh | bool and sol is not none and is_number(sol.state) and (sol.state | float(-1)) >= 0 }}
          pv_u2_recent: >-
            {% set sol = states.sensor.solarflow_2_solar_input %}
            {{ s2_fresh | bool and sol is not none and is_number(sol.state) and (sol.state | float(-1)) >= 0 }}

          t1: "{{ t1_raw if s1_ok | bool else 99 }}"
          t2: "{{ t2_raw if s2_ok | bool else 99 }}"
          soc1_val: "{{ soc1_raw if s1_ok | bool else 0 }}"
          soc2_val: "{{ soc2_raw if s2_ok | bool else 0 }}"
          soc1_valid: "{{ s1_ok | bool }}"
          soc2_valid: "{{ s2_ok | bool }}"

          s1_base: "{{ [states('input_number.zendure_last_sent_1')|float(0)|int, 0]|max }}"
          s2_base: "{{ [states('input_number.zendure_last_sent_2')|float(0)|int, 0]|max }}"

          s1_out_val: "{{ states('sensor.solarflow_1_output_limit') | int(-1) }}"
          s2_out_val: "{{ states('sensor.solarflow_2_output_limit') | int(-1) }}"

          last_sent_1_ts: "{{ as_timestamp(states.input_number.zendure_last_sent_1.last_updated, 0) }}"
          last_sent_2_ts: "{{ as_timestamp(states.input_number.zendure_last_sent_2.last_updated, 0) }}"
          time_since_1: "{{ as_timestamp(now()) - last_sent_1_ts }}"
          time_since_2: "{{ as_timestamp(now()) - last_sent_2_ts }}"

          ack_pending_1: "{{ time_since_1 < 8 and s1_out_val >= 0 and s1_out_val != s1_base }}"
          drift_recovery_1: "{{ time_since_1 >= 8 and time_since_1 < 60 and s1_out_val >= 0 and s1_out_val != s1_base }}"

          ack_pending_2: "{{ time_since_2 < 8 and s2_out_val >= 0 and s2_out_val != s2_base }}"
          drift_recovery_2: "{{ time_since_2 >= 8 and time_since_2 < 60 and s2_out_val >= 0 and s2_out_val != s2_base }}"

          soc_off: "{{ states('input_number.zendure_conf_soc_off') | int(20) }}"
          hysteresis: "{{ states('input_number.zendure_conf_hysteresis') | int(10) }}"

          bypass1: "{{ is_state('input_boolean.zendure_bypass_u1','on') }}"
          bypass2: "{{ is_state('input_boolean.zendure_bypass_u2','on') }}"
          s1_solar: "{{ states('sensor.solarflow_1_solar_input') | float(0) if pv_u1_recent | bool else 0 }}"
          s2_solar: "{{ states('sensor.solarflow_2_solar_input') | float(0) if pv_u2_recent | bool else 0 }}"
          actual_1_raw: "{{ states('sensor.solarflow_1_output_power') | float(0) if s1_ok | bool else 0 }}"
          actual_2_raw: "{{ states('sensor.solarflow_2_output_power') | float(0) if s2_ok | bool else 0 }}"
          out_pwr_age_1: >-
            {% set s = states.sensor.solarflow_1_output_power %}
            {% if s is not none and s.last_reported is defined %}
              {{ as_timestamp(now()) - as_timestamp(s.last_reported, 0) }}
            {% elif s is not none %}
              {{ as_timestamp(now()) - as_timestamp(s.last_changed, 0) }}
            {% else %}
              9999
            {% endif %}
          out_pwr_age_2: >-
            {% set s = states.sensor.solarflow_2_output_power %}
            {% if s is not none and s.last_reported is defined %}
              {{ as_timestamp(now()) - as_timestamp(s.last_reported, 0) }}
            {% elif s is not none %}
              {{ as_timestamp(now()) - as_timestamp(s.last_changed, 0) }}
            {% else %}
              9999
            {% endif %}
          out_pwr_fresh_1: "{{ (out_pwr_age_1 | float(9999)) < 20 }}"
          out_pwr_fresh_2: "{{ (out_pwr_age_2 | float(9999)) < 20 }}"

          calib1: "{{ is_state('input_boolean.zendure_calib_mode_u1', 'on') }}"
          calib2: "{{ is_state('input_boolean.zendure_calib_mode_u2', 'on') }}"
          calib_any: "{{ calib1 or calib2 }}"
          calib_isolation: "{{ is_state('input_boolean.zendure_conf_calib_isolation', 'on') }}"

          emerg_u1: "{{ is_state('input_boolean.zendure_emergency_u1', 'on') }}"
          emerg_u2: "{{ is_state('input_boolean.zendure_emergency_u2', 'on') }}"
          vguard_u1: "{{ is_state('input_boolean.zendure_vguard_u1', 'on') }}"
          vguard_u2: "{{ is_state('input_boolean.zendure_vguard_u2', 'on') }}"

          busy_u1: "{{ calib1 or emerg_u1 or vguard_u1 }}"
          busy_u2: "{{ calib2 or emerg_u2 or vguard_u2 }}"
          stall_u1: >-
            {{ s1_ok | bool
               and not (busy_u1 | bool)
               and (s1_base | int(0)) >= 120
               and (actual_1_raw | float(0)) < 20
               and (out_pwr_fresh_1 | bool)
               and (time_since_1 | float(0)) > 10
               and (time_since_1 | float(0)) < 120 }}
          stall_u2: >-
            {{ s2_ok | bool
               and not (busy_u2 | bool)
               and (s2_base | int(0)) >= 120
               and (actual_2_raw | float(0)) < 20
               and (out_pwr_fresh_2 | bool)
               and (time_since_2 | float(0)) > 10
               and (time_since_2 | float(0)) < 120 }}

          ghost_load_1: "{{ s1_base if (not s1_ok | bool and s1_base > 0) else 0 }}"
          ghost_load_2: "{{ s2_base if (not s2_ok | bool and s2_base > 0) else 0 }}"
          ghost_total: "{{ (ghost_load_1|int(0)) + (ghost_load_2|int(0)) }}"

          cap_u1: >
            {% if not s1_ok|bool or busy_u1 or stall_u1 %}0
            {% elif calib_isolation and calib_any and not calib1 %}0
            {% elif v1_min < 3.00 %}0
            {% elif soc1_val <= soc_off %}0
            {% elif t1 < 0 or t1 > 52 %}{{ (s1_solar * 0.9) | int(0) }}
            {% elif bypass1 %}{{ (s1_solar * 0.9) | int(0) }}
            {% elif t1 >= 50 %}{{ [400, (s1_solar * 0.9)|int(0)]|min }}
            {% elif t1 >= 48 %}{{ [600, (s1_solar * 0.9)|int(0)]|min }}
            {% elif v1_min < 3.05 %}{{ 120 if soc1_val > 30 else 0 }}
            {% elif v1_min < 3.10 %}{{ 300 if soc1_val > 30 else 220 }}
            {% else %}800{% endif %}

          cap_u2: >
            {% if not s2_ok|bool or busy_u2 or stall_u2 %}0
            {% elif calib_isolation and calib_any and not calib2 %}0
            {% elif v2_min < 3.00 %}0
            {% elif soc2_val <= soc_off %}0
            {% elif t2 < 0 or t2 > 52 %}{{ (s2_solar * 0.9) | int(0) }}
            {% elif bypass2 %}{{ (s2_solar * 0.9) | int(0) }}
            {% elif t2 >= 50 %}{{ [400, (s2_solar * 0.9)|int(0)]|min }}
            {% elif t2 >= 48 %}{{ [600, (s2_solar * 0.9)|int(0)]|min }}
            {% elif v2_min < 3.05 %}{{ 120 if soc2_val > 30 else 0 }}
            {% elif v2_min < 3.10 %}{{ 300 if soc2_val > 30 else 220 }}
            {% else %}800{% endif %}

          floor_1: >-
            {% if soc1_valid and soc1_val == 100 and not busy_u1 %}
              {% if s1_solar > 400 %} 350
              {% elif s1_solar > 300 %} 250
              {% else %} 0 {% endif %}
            {% else %} 0 {% endif %}
          floor_2: >-
            {% if soc2_valid and soc2_val == 100 and not busy_u2 %}
              {% if s2_solar > 400 %} 350
              {% elif s2_solar > 300 %} 250
              {% else %} 0 {% endif %}
            {% else %} 0 {% endif %}


          global_max: "{{ states('input_number.zendure_conf_max_output') | int(1200) }}"
          available_capacity: "{{ [ (global_max|int(0) - ghost_total|int(0)), 0 ] | max }}"

          failsafe: "{{ states('input_number.zendure_conf_failsafe_watt') | int(130) }}"
          grid_bias: "{{ states('input_number.zendure_conf_grid_bias') | int(10) }}"

          zen_mode: "{{ (bypass1 or bypass2) }}"
          slider_change: "{{ states('input_number.zendure_conf_min_change') | int(5) }}"
          jump_raw: >-
            {% if trigger.id == 'meter_step' and trigger.from_state is not none and trigger.to_state is not none and is_number(trigger.from_state.state) and is_number(trigger.to_state.state) %}
              {{ ((trigger.to_state.state | float(0)) - (trigger.from_state.state | float(0))) | abs }}
            {% else %}
              0
            {% endif %}
          fast_jump_threshold: "{{ [[(hysteresis|int(10) * 2), 30] | max, 120] | min }}"
          fast_event: "{{ trigger.id == 'meter_step' and (jump_raw | float(0)) >= (fast_jump_threshold | int(30)) }}"
          fast_push_1: "{{ fast_event and time_since_1 > 1.2 }}"
          fast_push_2: "{{ fast_event and time_since_2 > 1.2 }}"
          min_change_base: "{{ (slider_change * 4) if zen_mode else slider_change }}"
          min_change: "{{ [5, ((min_change_base | int(0)) // 2)] | max if fast_event else min_change_base }}"
          cmd_retry_s: 2.2
          cmd_u1_cooldown_ok: "{{ (time_since_1 | float(0)) > cmd_retry_s }}"
          cmd_u2_cooldown_ok: "{{ (time_since_2 | float(0)) > cmd_retry_s }}"

          override_margin: "{{ [min_change|int(0), 10] | max }}"
          spillover_override: "{{ (floor_1|int(0) > (s1_base|int(0) + override_margin|int(0))) or (floor_2|int(0) > (s2_base|int(0) + override_margin|int(0))) }}"

          override_u1: "{{ s1_ok | bool and (s1_base|int(0) > (cap_u1|int(0) + override_margin|int(0))) }}"
          override_u2: "{{ s2_ok | bool and (s2_base|int(0) > (cap_u2|int(0) + override_margin|int(0))) }}"
          force_zero_u1: "{{ s1_ok | bool and (cap_u1|int(0) == 0) and (s1_base|int(0) > 0) }}"
          force_zero_u2: "{{ s2_ok | bool and (cap_u2|int(0) == 0) and (s2_base|int(0) > 0) }}"
          safety_override: "{{ override_u1 or override_u2 }}"


          grid: "{{ (states(power_meter_entity) | float(0)) if shelly_ok | bool else 0 }}"
          stale_force_zero_u1: "{{ (not s1_fresh|bool) and (s1_base|int(0) > 0) and ((grid|float(0)) < -80) }}"
          stale_force_zero_u2: "{{ (not s2_fresh|bool) and (s2_base|int(0) > 0) and ((grid|float(0)) < -80) }}"
          actual_1: >-
            {% set meas = actual_1_raw | float(0) %}
            {% set cmd = s1_base | int(0) %}
            {% set lim = s1_out_val | int(0) %}
            {% set recent_cmd = (time_since_1 | float(0)) < 12 %}
            {% set ack_like = (lim >= [cmd - 20, 0] | max) %}
            {% if cmd >= 80 and recent_cmd and ack_like and (not out_pwr_fresh_1 | bool or meas < (cmd * 0.25)) %}
              {{ [lim, cmd] | max }}
            {% else %}
              {{ meas }}
            {% endif %}
          actual_2: >-
            {% set meas = actual_2_raw | float(0) %}
            {% set cmd = s2_base | int(0) %}
            {% set lim = s2_out_val | int(0) %}
            {% set recent_cmd = (time_since_2 | float(0)) < 12 %}
            {% set ack_like = (lim >= [cmd - 20, 0] | max) %}
            {% if cmd >= 80 and recent_cmd and ack_like and (not out_pwr_fresh_2 | bool or meas < (cmd * 0.25)) %}
              {{ [lim, cmd] | max }}
            {% else %}
              {{ meas }}
            {% endif %}
          actual_total: "{{ (actual_1 | int(0)) + (actual_2 | int(0)) }}"

          busy_actual_1: "{{ actual_1 | int(0) if busy_u1 | bool else 0 }}"
          busy_actual_2: "{{ actual_2 | int(0) if busy_u2 | bool else 0 }}"
          busy_actual_total: "{{ (busy_actual_1 | int(0)) + (busy_actual_2 | int(0)) }}"
          cmd_total: "{{ (s1_base|int(0)) + (s2_base|int(0)) }}"

          cmd_lag: "{{ (actual_total|int(0)) > ((cmd_total|int(0)) + 120) }}"
          export_persist: "{{ (grid|float(0)) < -100 }}"
          tracking_stale: "{{ (out_pwr_age_1|float(9999) > 25) or (out_pwr_age_2|float(9999) > 25) }}"
          recent_cmd_activity: "{{ (time_since_1|float(0) < 25) or (time_since_2|float(0) < 25) }}"
          cmd_actual_gap: "{{ ((actual_total|int(0)) - (cmd_total|int(0))) | abs }}"
          tracking_unreliable: "{{ tracking_stale|bool or (recent_cmd_activity|bool and (cmd_actual_gap|int(0) > 220)) }}"
          control_total: >-
            {% if tracking_unreliable | bool %}
              {{ cmd_total | int(0) }}
            {% else %}
              {{ ((cmd_total|int(0) * 0.75) + (actual_total|int(0) * 0.25)) | int(0) }}
            {% endif %}

          target_raw: >-
            {{ ((control_total | int(0)) + (grid | float(0)) - (grid_bias | int(0)))
               if shelly_ok | bool else (failsafe | int(0)) }}
          target_total: "{{ [[target_raw|int(0), 0]|max, global_max]|min }}"
          delta_effective: "{{ (target_total|int(0)) - (control_total|int(0)) }}"
          rebalance_needed: >-
            {% set both_ready = s1_ok|bool and s2_ok|bool and not busy_u1 and not busy_u2 and (actual_total|int(0)) > 100 and v1_min > 3.10 and v2_min > 3.10 %}
            {% set ideal = (soc1_val / (soc1_val + soc2_val)) if (soc1_valid and soc2_valid and (soc1_val + soc2_val) > 0) else 0.5 %}
            {% set actual_share = (actual_1|float(0) / (actual_total|float(1))) if (actual_total|float(0)) > 50 else ideal %}
            {{ both_ready
               and ((soc1_val - soc2_val)|abs >= 4)
               and ((actual_share - ideal)|abs >= 0.15) }}

      - condition: template
        value_template: >
          {{ safety_override
             or force_zero_u1
             or force_zero_u2
             or stale_force_zero_u1
             or stale_force_zero_u2
             or spillover_override
             or drift_recovery_1
             or drift_recovery_2
             or fast_event
             or stall_u1
             or stall_u2
             or states('input_text.zendure_ac_mode_u1') != 'Output mode'
             or states('input_text.zendure_ac_mode_u2') != 'Output mode'
             or ((delta_effective | int(0) | abs) > (hysteresis | int(0)))
             or (actual_total | int(0) > global_max | int(0))
             or ((grid | float(0)) < -40)
             or rebalance_needed }}

      - variables:
          target_online: "{{ [[(target_total|int(0) - ghost_total|int(0) - busy_actual_total|int(0)), 0]|max, available_capacity|int(0)]|min }}"

          active_1: "{{ s1_ok | bool and not (busy_u1 | bool) }}"
          active_2: "{{ s2_ok | bool and not (busy_u2 | bool) }}"

          weight_1_base: >-
            {% if soc1_valid and soc2_valid and (soc1_val + soc2_val) > 0 %}
              {{ soc1_val / (soc1_val + soc2_val) }}
            {% else %}
              0.5
            {% endif %}

          weight_1: >-
            {% set w = weight_1_base | float(0.5) %}

            {% if t1 < 80 and t2 < 80 %}
              {% if t1 > 45 and (t1 - t2) > 4 %}
                {% set w = w - 0.15 %}
              {% elif t2 > 45 and (t2 - t1) > 4 %}
                {% set w = w + 0.15 %}
              {% endif %}
            {% endif %}

            {% set solar_diff = s1_solar - s2_solar %}
            {% if solar_diff > 150 %}
              {% set w = w + 0.05 %}
            {% elif solar_diff < -150 %}
              {% set w = w - 0.05 %}
            {% endif %}

            {% if active_1 and active_2 and not busy_u1 and not busy_u2 and v1_min > 3.10 and v2_min > 3.10 %}
              {% set soc_diff = (soc1_val|float(0) - soc2_val|float(0)) %}
              {% set actual_sum = (actual_1|float(0) + actual_2|float(0)) %}
              {% set actual_share_1 = (actual_1|float(0) / actual_sum) if actual_sum > 50 else w %}
              {% set share_dev = actual_share_1 - w %}

              {% if (soc_diff | abs) >= 4 and (share_dev | abs) >= 0.15 %}
                {% if soc_diff > 0 and share_dev < 0 %}
                  {% set w = w + 0.08 %}
                {% elif soc_diff < 0 and share_dev > 0 %}
                  {% set w = w - 0.08 %}
                {% endif %}
              {% endif %}

              {% if (v1_min + 0.05) < v2_min %}
                {% set w = w - 0.08 %}
              {% elif (v2_min + 0.05) < v1_min %}
                {% set w = w + 0.08 %}
              {% endif %}
            {% endif %}

            {{ [[w, 0.35]|max, 0.65]|min }}

          req_1: "{{ ((target_online | int(0)) * (weight_1 | float(0))) | int(0) }}"
          req_2: "{{ (target_online | int(0)) - (req_1 | int(0)) }}"

          req_1_final: "{{ [req_1|int(0), floor_1|int(0)]|max }}"
          req_2_final: "{{ [req_2|int(0), floor_2|int(0)]|max }}"
          final_1_init: "{{ [req_1_final|int(0), cap_u1|int(0)]|min }}"

          final_2_raw: >
            {% if active_2 %}
              {% set v = (req_2_final + (req_1_final - final_1_init)) | int(0) %}
              {{ [[v, 0] | max, cap_u2 | int(0)] | min }}
            {% else %}
              0
            {% endif %}

          final_1_raw: >
            {% if active_1 %}
              {% set v = (target_online | int(0)) - (final_2_raw | int(0)) %}
              {% set v_safe = [v, floor_1|int(0)]|max %}
              {{ [[v_safe, 0] | max, cap_u1 | int(0)] | min }}
            {% else %}
              0
            {% endif %}

          active_sum: >-
            {% set a1 = final_1_raw|int(0) if active_1 else 0 %}
            {% set a2 = final_2_raw|int(0) if active_2 else 0 %}
            {{ a1 + a2 }}

          scale_active: >-
            {% set cap = available_capacity|int(0) %}
            {% set s = active_sum|int(0) %}
            {% if s <= 0 %} 1
            {% elif cap <= 0 %} 0
            {% elif s > cap %} {{ cap / s }}
            {% else %} 1
            {% endif %}

          final_1_pre: "{{ (final_1_raw|int(0) * (scale_active|float(1))) | int }}"
          final_2_pre: "{{ (final_2_raw|int(0) * (scale_active|float(1))) | int }}"

          heavy_export: "{{ (grid | float(0)) < -40 }}"
          fast_down_1: "{{ heavy_export and (final_1_pre|int(0) < s1_base|int(0)) }}"
          fast_down_2: "{{ heavy_export and (final_2_pre|int(0) < s2_base|int(0)) }}"
          max_step_up: "{{ 140 if fast_event else 70 }}"
          max_step_down: "{{ 220 if (fast_event or heavy_export) else 110 }}"
          final_1: >-
            {% set base = s1_base | int(0) %}
            {% set target = final_1_pre | int(0) %}
            {% set up = max_step_up | int(70) %}
            {% set down = max_step_down | int(110) %}
            {% if target > base + up %}
              {{ base + up }}
            {% elif target < base - down %}
              {{ [base - down, 0] | max }}
            {% else %}
              {{ target }}
            {% endif %}
          final_2: >-
            {% set base = s2_base | int(0) %}
            {% set target = final_2_pre | int(0) %}
            {% set up = max_step_up | int(70) %}
            {% set down = max_step_down | int(110) %}
            {% if target > base + up %}
              {{ base + up }}
            {% elif target < base - down %}
              {{ [base - down, 0] | max }}
            {% else %}
              {{ target }}
            {% endif %}

      - parallel:
          # --- UNIT 1 OUTPUT UPDATE ---
          - if:
              - condition: template
                value_template: >-
                  {{ s1_ok|bool and not busy_u1 and cmd_u1_cooldown_ok and (not ack_pending_1|bool or fast_down_1|bool or force_zero_u1|bool or fast_push_1|bool) and (
                         fast_down_1|bool
                         or force_zero_u1|bool
                         or fast_push_1|bool
                         or ((final_1|int(0) - s1_base|int(0))|abs >= (min_change|int(0)))
                         or override_u1
                         or drift_recovery_1
                         or states('input_text.zendure_ac_mode_u1') != 'Output mode'
                         or ((actual_total|int(0) > global_max|int(0)) and (s1_base|int(0) > final_1|int(0)))
                       ) }}
            then:
              - action: script.zendure_dispatch_u1_output
                data:
                  power: "{{ final_1|int }}"
                  ensure_output_mode: true

          # --- UNIT 2 OUTPUT UPDATE ---
          - if:
              - condition: template
                value_template: >-
                  {{ s2_ok|bool and not busy_u2 and cmd_u2_cooldown_ok and (not ack_pending_2|bool or fast_down_2|bool or force_zero_u2|bool or fast_push_2|bool) and (
                         fast_down_2|bool
                         or force_zero_u2|bool
                         or fast_push_2|bool
                         or ((final_2|int(0) - s2_base|int(0))|abs >= (min_change|int(0)))
                         or override_u2
                         or drift_recovery_2
                         or states('input_text.zendure_ac_mode_u2') != 'Output mode'
                         or ((actual_total|int(0) > global_max|int(0)) and (s2_base|int(0) > final_2|int(0)))
                       ) }}
            then:
              - action: script.zendure_dispatch_u2_output
                data:
                  power: "{{ final_2|int }}"
                  ensure_output_mode: true

          # --- UNIT 1 STALE BEST-EFFORT 0W CLAMP ---
          - if:
              - condition: template
                value_template: "{{ stale_force_zero_u1|bool }}"
            then:
              - action: script.zendure_dispatch_u1_output
                data:
                  power: 0
                  ensure_output_mode: false

          # --- UNIT 2 STALE BEST-EFFORT 0W CLAMP ---
          - if:
              - condition: template
                value_template: "{{ stale_force_zero_u2|bool }}"
            then:
              - action: script.zendure_dispatch_u2_output
                data:
                  power: 0
                  ensure_output_mode: false

  # --- 6.5 STATE MACHINE (SAFE RETURN & SYNC) ---
  - alias: "Zendure: State Machine (Smart Single-Channel)"
    id: "zendure_state_machine_dual"
    mode: queued
    initial_state: true
    triggers:
      - trigger: state
        entity_id: input_boolean.zendure_auto_mode
        to: "on"
      - trigger: state
        entity_id: input_boolean.zendure_auto_mode
        to: "off"
        id: "auto_off"

      - trigger: time_pattern
        minutes: "/5"
        id: "periodic_reconcile"

      - trigger: template
        id: "device_online_u1"
        value_template: "{{ states('sensor.solarflow_1_status_raw')|upper not in ['UNAVAILABLE','UNKNOWN','FAULT','ERROR'] }}"
        for: "00:00:01"
      - trigger: template
        id: "device_online_u2"
        value_template: "{{ states('sensor.solarflow_2_status_raw')|upper not in ['UNAVAILABLE','UNKNOWN','FAULT','ERROR'] }}"
        for: "00:00:01"

      - trigger: homeassistant
        event: start
        id: "boot_check"
    actions:
      - choose:
          - conditions:
              - condition: template
                value_template: >
                  {{ trigger.id == 'auto_off' and is_state('input_boolean.zendure_auto_mode','on') }}
            sequence:
              - stop: "Stale auto_off trigger ignored (Auto-Mode already ON)."

          - conditions:
              - condition: template
                value_template: "{{ trigger.id == 'auto_off' }}"
            sequence:
              - action: input_boolean.turn_off
                target:
                  entity_id:
                    - input_boolean.zendure_emergency_u1
                    - input_boolean.zendure_emergency_u2
                    - input_boolean.zendure_calib_mode_u1
                    - input_boolean.zendure_calib_mode_u2
                    - input_boolean.zendure_vguard_u1
                    - input_boolean.zendure_vguard_u2

              - parallel:
                - action: script.zendure_reset_u1_output_safe
                - action: script.zendure_reset_u2_output_safe
              - stop: "Automatik beendet - Full Hard Reset."

          - conditions:
              - condition: template
                value_template: "{{ trigger.id in ['device_online_u1', 'device_online_u2', 'boot_check'] }}"
            sequence:
              - if:
                  - condition: template
                    value_template: "{{ is_state('input_boolean.zendure_auto_mode','off') }}"
                then:
                  - action: input_boolean.turn_off
                    target:
                      entity_id:
                        - input_boolean.zendure_emergency_u1
                        - input_boolean.zendure_emergency_u2
                        - input_boolean.zendure_calib_mode_u1
                        - input_boolean.zendure_calib_mode_u2
                        - input_boolean.zendure_vguard_u1
                        - input_boolean.zendure_vguard_u2

              - if:
                  - condition: template
                    value_template: >
                      {{ is_state('input_boolean.zendure_emergency_u1','on')
                         or is_state('input_boolean.zendure_emergency_u2','on')
                         or is_state('input_boolean.zendure_auto_mode','off') }}
                then:
                  - parallel:
                      - action: script.zendure_reset_u1_output_safe
                      - action: script.zendure_reset_u2_output_safe

              - wait_template: "{{ is_state('input_boolean.zendure_auto_mode','off') }}"
                timeout: "00:00:05"
                continue_on_timeout: true

              - if:
                  - condition: template
                    value_template: "{{ wait.completed }}"
                then:
                  - parallel:
                      - action: script.zendure_reset_u1_output_safe
                      - action: script.zendure_reset_u2_output_safe
                  - stop: "Auto-Mode switched OFF during Boot/Online Sequence. Full Safety Reconnect applied."

              - parallel:
                - if:
                    - condition: template
                      value_template: "{{ states('sensor.solarflow_1_status_raw')|upper not in ['UNAVAILABLE', 'UNKNOWN', 'FAULT', 'ERROR'] }}"
                  then:
                    - action: mqtt.publish
                      data: { topic: !secret zendure_topic_u1_switch_smartMode_set, payload: "ON", qos: 1 }
                - if:
                    - condition: template
                      value_template: "{{ states('sensor.solarflow_2_status_raw')|upper not in ['UNAVAILABLE', 'UNKNOWN', 'FAULT', 'ERROR'] }}"
                  then:
                    - action: mqtt.publish
                      data: { topic: !secret zendure_topic_u2_switch_smartMode_set, payload: "ON", qos: 1 }
              - delay: "00:00:02"
              - parallel:
                - if:
                    - condition: template
                      value_template: "{{ states('sensor.solarflow_1_status_raw')|upper not in ['UNAVAILABLE', 'UNKNOWN', 'FAULT', 'ERROR'] }}"
                  then:
                    - action: mqtt.publish
                      data: { topic: !secret zendure_topic_u1_switch_smartMode_set, payload: "ON", qos: 1 }
                - if:
                    - condition: template
                      value_template: "{{ states('sensor.solarflow_2_status_raw')|upper not in ['UNAVAILABLE', 'UNKNOWN', 'FAULT', 'ERROR'] }}"
                  then:
                    - action: mqtt.publish
                      data: { topic: !secret zendure_topic_u2_switch_smartMode_set, payload: "ON", qos: 1 }

              - wait_template: "{{ is_state('input_boolean.zendure_auto_mode','off') }}"
                timeout: "00:00:02"
                continue_on_timeout: true

              - if:
                  - condition: template
                    value_template: "{{ wait.completed }}"
                then:
                  - parallel:
                      - action: script.zendure_reset_u1_output_safe
                      - action: script.zendure_reset_u2_output_safe
                  - stop: "Auto-Mode switched OFF during Boot/Online Sequence. Full Safety Reconnect applied."

              - parallel:
                - if:
                    - condition: template
                      value_template: "{{ states('sensor.solarflow_1_status_raw')|upper not in ['UNAVAILABLE', 'UNKNOWN', 'FAULT', 'ERROR'] }}"
                  then:
                    - action: mqtt.publish
                      data: { topic: !secret zendure_topic_u1_switch_smartMode_set, payload: "ON", qos: 1 }
                - if:
                    - condition: template
                      value_template: "{{ states('sensor.solarflow_2_status_raw')|upper not in ['UNAVAILABLE', 'UNKNOWN', 'FAULT', 'ERROR'] }}"
                  then:
                    - action: mqtt.publish
                      data: { topic: !secret zendure_topic_u2_switch_smartMode_set, payload: "ON", qos: 1 }

              - if:
                  - condition: template
                    value_template: "{{ is_state('input_boolean.zendure_auto_mode','off') }}"
                then:
                  - parallel:
                      - action: script.zendure_reset_u1_output_safe
                      - action: script.zendure_reset_u2_output_safe
                  - stop: "Auto-Mode OFF: Safety Reconnect Hard-Stop applied."

      - if:
          - condition: template
            value_template: >
              {% set tid = trigger.id | default('') %}
              {{ is_state('input_boolean.zendure_auto_mode','off')
                 and tid not in ['auto_off','device_online_u1','device_online_u2','boot_check'] }}
        then:
          - stop: "Auto-Mode OFF: Trigger ignoriert (Strict Hands-Off)."

      - if:
          - condition: template
            value_template: >
              {{ trigger.id == 'periodic_reconcile'
                 and states('sensor.solarflow_1_status_raw')|upper in ['UNAVAILABLE','UNKNOWN','FAULT','ERROR']
                 and states('sensor.solarflow_2_status_raw')|upper in ['UNAVAILABLE','UNKNOWN','FAULT','ERROR'] }}
        then:
          - stop: "Periodic reconcile skipped (both units offline)."

      - variables:
          online1: "{{ states('sensor.solarflow_1_status_raw')|upper not in ['UNAVAILABLE', 'UNKNOWN', 'FAULT', 'ERROR'] }}"
          online2: "{{ states('sensor.solarflow_2_status_raw')|upper not in ['UNAVAILABLE', 'UNKNOWN', 'FAULT', 'ERROR'] }}"
          min_soc: 5
          t1: "{{ states('sensor.solarflow_1_batt_max_temp') | float(states('sensor.solarflow_1_temp')|float(0)) }}"
          t2: "{{ states('sensor.solarflow_2_batt_max_temp') | float(states('sensor.solarflow_2_temp')|float(0)) }}"
          soc1: "{{ states('sensor.solarflow_1_battery_level') | float(0) }}"
          soc2: "{{ states('sensor.solarflow_2_battery_level') | float(0) }}"
          soc1_valid: "{{ is_number(states('sensor.solarflow_1_battery_level')) }}"
          soc2_valid: "{{ is_number(states('sensor.solarflow_2_battery_level')) }}"

          cl1: "{% if t1 < 5 %} 100 {% elif t1 < 10 %} 300 {% else %} 800 {% endif %}"
          cl2: "{% if t2 < 5 %} 100 {% elif t2 < 10 %} 300 {% else %} 800 {% endif %}"
          sl1: "{% if soc1 > 97 %} 100 {% elif soc1 >= 90 %} 200 {% else %} 800 {% endif %}"
          sl2: "{% if soc2 > 97 %} 100 {% elif soc2 >= 90 %} 200 {% else %} 800 {% endif %}"
          ss1: "{% if soc1 < 12 %} 300 {% else %} 800 {% endif %}"
          ss2: "{% if soc2 < 12 %} 300 {% else %} 800 {% endif %}"

          charge_limit_u1: "{{ [cl1|int, sl1|int, ss1|int]|min }}"
          charge_limit_u2: "{{ [cl2|int, sl2|int, ss2|int]|min }}"

          curr_min_soc_1: "{{ states('sensor.solarflow_1_setting_minsoc') | int(-1) }}"
          curr_charge_1: "{{ states('sensor.solarflow_1_setting_chargelimit') | int(-1) }}"
          curr_min_soc_2: "{{ states('sensor.solarflow_2_setting_minsoc') | int(-1) }}"
          curr_charge_2: "{{ states('sensor.solarflow_2_setting_chargelimit') | int(-1) }}"

      - if:
          - condition: state
            entity_id: input_boolean.zendure_auto_mode
            state: "on"
        then:
          - parallel:
            - if:
                - condition: template
                  value_template: "{{ online1 and (curr_min_soc_1 != min_soc|int or curr_charge_1 != charge_limit_u1|int) }}"
              then:
                - action: mqtt.publish
                  data: { topic: !secret zendure_topic_u1_number_minSoc_set, payload: "{{ min_soc }}", qos: 1 }
                - action: mqtt.publish
                  data: { topic: !secret zendure_topic_u1_number_chargeMaxLimit_set, payload: "{{ charge_limit_u1 }}", qos: 1 }
            - if:
                - condition: template
                  value_template: "{{ online2 and (curr_min_soc_2 != min_soc|int or curr_charge_2 != charge_limit_u2|int) }}"
              then:
                - action: mqtt.publish
                  data: { topic: !secret zendure_topic_u2_number_minSoc_set, payload: "{{ min_soc }}", qos: 1 }
                - action: mqtt.publish
                  data: { topic: !secret zendure_topic_u2_number_chargeMaxLimit_set, payload: "{{ charge_limit_u2 }}", qos: 1 }


  # --- 6.6a SAG CONFIRM U1 ---
  - alias: "Zendure: Sag Confirm U1"
    id: "zendure_sag_confirm_u1"
    mode: single
    initial_state: true
    max_exceeded: silent
    triggers:
      - trigger: state
        entity_id: sensor.solarflow_1_cell_min_vol
        to: null
    conditions:
      - condition: state
        entity_id: input_boolean.zendure_auto_mode
        state: "on"
    actions:
      - variables:
          v_first: "{{ trigger.to_state.state | float(99) }}"
          soc_first: "{{ states('sensor.solarflow_1_battery_level') | float(0) }}"
          online1: "{{ states('sensor.solarflow_1_status_raw')|upper not in ['UNAVAILABLE','UNKNOWN','FAULT','ERROR'] }}"
      - if:
          - condition: template
            value_template: >
              {{ online1
                 and is_state('input_boolean.zendure_calib_mode_u1', 'off')
                 and is_state('input_boolean.zendure_emergency_u1','off')
                 and is_state('input_boolean.zendure_vguard_u1','off')
                 and soc_first > 5
                 and v_first > 2.5
                 and v_first < 3.10 }}
        then:
          - wait_for_trigger:
              - trigger: state
                entity_id: sensor.solarflow_1_cell_min_vol
                to: null
            timeout: "00:02:00"
            continue_on_timeout: false
          - variables:
              v_confirm: "{{ wait.trigger.to_state.state | float(99) if wait.trigger is not none else 99 }}"
              imb_confirm: "{{ states('sensor.solarflow_1_cell_imbalance') | float(0) }}"
              soc_confirm: "{{ states('sensor.solarflow_1_battery_level') | float(0) }}"
              solar_total: "{{ states('sensor.solarflow_total_solar_input') | float(0) }}"
              s1_solar: "{{ states('sensor.solarflow_1_solar_input') | float(0) if online1 else 0 }}"
              relieved_u1: >
                {{ states('input_number.zendure_last_sent_1')|int(999) == 0
                   or states('sensor.solarflow_1_output_limit')|int(999) == 0 }}
              limit_calib_u1: >
                {% set t1 = states('sensor.solarflow_1_batt_max_temp') | float(states('sensor.solarflow_1_temp')|float(0)) %}
                {% set soc1 = states('sensor.solarflow_1_battery_level') | float(0) %}
                {% set cl1 = 100 if t1 < 5 else (300 if t1 < 10 else 800) %}
                {% set sl1 = 100 if soc1 > 97 else (200 if soc1 >= 90 else 800) %}
                {% set soc_soft_u1 = 100 if soc1 < 8 else (300 if soc1 < 12 else 800) %}
                {{ [cl1|int, sl1|int, soc_soft_u1|int]|min }}
              limit_emerg_u1: >
                {% set t1 = states('sensor.solarflow_1_batt_max_temp') | float(states('sensor.solarflow_1_temp')|float(0)) %}
                {% set soc1 = states('sensor.solarflow_1_battery_level') | float(0) %}
                {% set cl1 = 100 if t1 < 5 else (300 if t1 < 10 else 800) %}
                {% set ss1 = 300 if soc1 < 12 else 800 %}
                {{ [300, cl1|int, ss1|int]|min }}
              confirmed: >
                {% set soc_ceiling = (states('input_number.zendure_conf_soc_emerg_stop')|float(25)) + 2 %}
                {{ is_state('input_boolean.zendure_auto_mode','on')
                   and states('sensor.solarflow_1_status_raw')|upper not in ['UNAVAILABLE','UNKNOWN','FAULT','ERROR']
                   and is_state('input_boolean.zendure_calib_mode_u1','off')
                   and is_state('input_boolean.zendure_emergency_u1','off')
                   and is_state('input_boolean.zendure_vguard_u1','off')
                   and (soc_confirm <= soc_ceiling or v_confirm <= 2.95)
                   and v_confirm > 2.5
                   and states('sensor.solarflow_1_output_power')|float(0) > 120
                   and relieved_u1
                   and (
                     v_confirm <= 3.08
                     or (v_confirm <= 3.10 and imb_confirm >= 0.06)
                   ) }}
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ confirmed and solar_total >= 150 }}"
                sequence:
                  - action: input_boolean.turn_on
                    target:
                      entity_id: input_boolean.zendure_calib_mode_u1
                  - if:
                      - condition: template
                        value_template: "{{ s1_solar >= 50 }}"
                    then:
                      - action: input_text.set_value
                        target: { entity_id: input_text.zendure_ac_mode_u1 }
                        data: { value: "Output mode" }
                      - action: script.zendure_dispatch_u1_ac_mode
                        data:
                          mode: "Output mode"
                          force: true
                      - action: script.zendure_set_u1_outputlimit_zero
                    else:
                      - action: input_text.set_value
                        target: { entity_id: input_text.zendure_ac_mode_u1 }
                        data: { value: "Input mode" }
                      - action: script.zendure_dispatch_u1_ac_mode
                        data:
                          mode: "Input mode"
                          force: true
                      - action: script.zendure_set_u1_outputlimit_zero
                      - action: script.zendure_dispatch_u1_inputlimit
                        data:
                          power: "{{ limit_calib_u1 }}"
                  - action: input_number.set_value
                    target: { entity_id: input_number.zendure_last_sent_1 }
                    data: { value: 0 }
                  - action: notify.send_message
                    target:
                      entity_id: !secret telegram_id1
                    data:
                      message: >
                        📉 *Sicherheits-Kalibrierung U1 (Tag)*
                        Unterspannung auf frischem Spannungs-Update bestätigt
                        ({{ v_confirm | round(3) }} V, Δ {{ imb_confirm | round(3) }} V).
                        Akku wird sofort mit Solar re-kalibriert.
              - conditions:
                  - condition: template
                    value_template: >
                      {{ confirmed
                         and solar_total < 150
                         and ((as_timestamp(now()) - as_timestamp(states('input_datetime.zendure_last_full_charge_1'), default=0)) | int(0)) > 86400 }}
                sequence:
                  - action: input_boolean.turn_on
                    target: { entity_id: input_boolean.zendure_force_calib_u1 }
                  - action: input_boolean.turn_on
                    target: { entity_id: input_boolean.zendure_emergency_u1 }
                  - action: input_text.set_value
                    target: { entity_id: input_text.zendure_ac_mode_u1 }
                    data: { value: "Input mode" }
                  - action: script.zendure_dispatch_u1_ac_mode
                    data:
                      mode: "Input mode"
                      force: true
                  - action: script.zendure_set_u1_outputlimit_zero
                  - action: script.zendure_dispatch_u1_inputlimit
                    data:
                      power: "{{ limit_emerg_u1 }}"
                  - action: input_number.set_value
                    target: { entity_id: input_number.zendure_last_sent_1 }
                    data: { value: 0 }
                  - action: notify.send_message
                    target:
                      entity_id: !secret telegram_id1
                    data:
                      message: >
                        📉 *Spannungseinbruch U1 (Nacht)*
                        Unterspannung auf frischem Spannungs-Update bestätigt
                        ({{ v_confirm | round(3) }} V, Δ {{ imb_confirm | round(3) }} V).
                        Notstrom Automatik übernimmt nun. Kalibrierung für morgen 13:00 Uhr vorgemerkt.

  # --- 6.6b SAG CONFIRM U2 ---
  - alias: "Zendure: Sag Confirm U2"
    id: "zendure_sag_confirm_u2"
    mode: single
    initial_state: true
