                      entity_id: !secret telegram_id1
                    data:
                      message: >
                        📉 *Sicherheits-Kalibrierung U2 (Tag)*
                        Unterspannung auf frischem Spannungs-Update bestätigt
                        ({{ v_confirm | round(3) }} V, Δ {{ imb_confirm | round(3) }} V).
                        Akku wird sofort mit Solar re-kalibriert.
              - conditions:
                  - condition: template
                    value_template: >
                      {{ confirmed
                         and solar_total < 150
                         and ((as_timestamp(now()) - as_timestamp(states('input_datetime.zendure_last_full_charge_2'), default=0)) | int(0)) > 86400 }}
                sequence:
                  - action: input_boolean.turn_on
                    target: { entity_id: input_boolean.zendure_force_calib_u2 }
                  - action: input_boolean.turn_on
                    target: { entity_id: input_boolean.zendure_emergency_u2 }
                  - action: input_text.set_value
                    target: { entity_id: input_text.zendure_ac_mode_u2 }
                    data: { value: "Input mode" }
                  - action: script.zendure_dispatch_u2_ac_mode
                    data:
                      mode: "Input mode"
                      force: true
                  - action: script.zendure_set_u2_outputlimit_zero
                  - action: script.zendure_dispatch_u2_inputlimit
                    data:
                      power: "{{ limit_emerg_u2 }}"
                  - action: input_number.set_value
                    target: { entity_id: input_number.zendure_last_sent_2 }
                    data: { value: 0 }
                  - action: notify.send_message
                    target:
                      entity_id: !secret telegram_id1
                    data:
                      message: >
                        📉 *Spannungseinbruch U2 (Nacht)*
                        Unterspannung auf frischem Spannungs-Update bestätigt
                        ({{ v_confirm | round(3) }} V, Δ {{ imb_confirm | round(3) }} V).
                        Notstrom Automatik übernimmt nun. Kalibrierung für morgen 13:00 Uhr vorgemerkt.

  # --- 6.6c VOLTAGE GUARD LATCH MANAGER ---
  - alias: "Zendure: Voltage Guard Latch Manager"
    id: "zendure_voltage_guard_latch_manager"
    mode: queued
    initial_state: true
    triggers:
      - trigger: template
        id: "set_u1"
        value_template: >
          {% set vmin_s = states.sensor.solarflow_1_cell_min_vol %}
          {% set stat = states.sensor.solarflow_1_status_raw %}
          {% set hb_ok = stat is not none and stat.state|upper not in ['UNAVAILABLE','UNKNOWN','FAULT','ERROR'] %}
          {% set vmin_fresh = hb_ok and vmin_s is not none and is_number(vmin_s.state) and (vmin_s.state|float(0)) > 2.0 %}
          {% set out_pwr = states('sensor.solarflow_1_output_power')|float(0) %}
          {% set min_out = states('input_number.zendure_conf_vguard_set_min_output')|float(30) %}
          {% set soc = states('sensor.solarflow_1_battery_level')|float(100) %}
          {% set soc_guard = (states('input_number.zendure_conf_soc_off')|float(20)) + 8 %}
          {{ is_state('input_boolean.zendure_auto_mode','on')
             and is_state('input_boolean.zendure_vguard_u1','off')
             and is_state('input_boolean.zendure_emergency_u1','off')
             and is_state('input_boolean.zendure_calib_mode_u1','off')
             and states('sensor.solarflow_1_status_raw')|upper not in ['UNAVAILABLE','UNKNOWN','FAULT','ERROR']
             and soc <= soc_guard
             and vmin_fresh
             and vmin_s.state|float(99) <= 3.02
             and out_pwr > min_out }}
        for: "00:01:00"
      - trigger: template
        id: "set_u1_hard"
        value_template: >
          {% set vmin = states('sensor.solarflow_1_cell_min_vol')|float(99) %}
          {% set soc = states('sensor.solarflow_1_battery_level')|float(100) %}
          {% set soc_guard_hard = (states('input_number.zendure_conf_soc_off')|float(20)) + 4 %}
          {{ is_state('input_boolean.zendure_auto_mode','on')
             and is_state('input_boolean.zendure_vguard_u1','off')
             and is_state('input_boolean.zendure_emergency_u1','off')
             and is_state('input_boolean.zendure_calib_mode_u1','off')
             and states('sensor.solarflow_1_status_raw')|upper not in ['UNAVAILABLE','UNKNOWN','FAULT','ERROR']
             and soc <= soc_guard_hard
             and vmin > 2.0
             and vmin <= 2.95 }}
        for: "00:01:00"
      - trigger: template
        id: "clear_u1"
        value_template: >
          {% set soc_exit = (states('input_number.zendure_conf_soc_bypass')|int(25)) + 1 %}
          {% set soc = states('sensor.solarflow_1_battery_level')|float(0) %}
          {% set vmin = states('sensor.solarflow_1_cell_min_vol')|float(0) %}
          {% set pv = states('sensor.solarflow_1_solar_input')|float(0) %}
          {{ is_state('input_boolean.zendure_vguard_u1','on')
             and soc >= soc_exit
             and (vmin > 3.20 or (pv > 20 and soc >= soc_exit)) }}
        for: "00:10:00"
      - trigger: template
        id: "set_u2"
        value_template: >
          {% set vmin_s = states.sensor.solarflow_2_cell_min_vol %}
          {% set stat = states.sensor.solarflow_2_status_raw %}
          {% set hb_ok = stat is not none and stat.state|upper not in ['UNAVAILABLE','UNKNOWN','FAULT','ERROR'] %}
          {% set vmin_fresh = hb_ok and vmin_s is not none and is_number(vmin_s.state) and (vmin_s.state|float(0)) > 2.0 %}
          {% set out_pwr = states('sensor.solarflow_2_output_power')|float(0) %}
          {% set min_out = states('input_number.zendure_conf_vguard_set_min_output')|float(30) %}
          {% set soc = states('sensor.solarflow_2_battery_level')|float(100) %}
          {% set soc_guard = (states('input_number.zendure_conf_soc_off')|float(20)) + 8 %}
          {{ is_state('input_boolean.zendure_auto_mode','on')
             and is_state('input_boolean.zendure_vguard_u2','off')
             and is_state('input_boolean.zendure_emergency_u2','off')
             and is_state('input_boolean.zendure_calib_mode_u2','off')
             and states('sensor.solarflow_2_status_raw')|upper not in ['UNAVAILABLE','UNKNOWN','FAULT','ERROR']
             and soc <= soc_guard
             and vmin_fresh
             and vmin_s.state|float(99) <= 3.02
             and out_pwr > min_out }}
        for: "00:01:00"
      - trigger: template
        id: "set_u2_hard"
        value_template: >
          {% set vmin = states('sensor.solarflow_2_cell_min_vol')|float(99) %}
          {% set soc = states('sensor.solarflow_2_battery_level')|float(100) %}
          {% set soc_guard_hard = (states('input_number.zendure_conf_soc_off')|float(20)) + 4 %}
          {{ is_state('input_boolean.zendure_auto_mode','on')
             and is_state('input_boolean.zendure_vguard_u2','off')
             and is_state('input_boolean.zendure_emergency_u2','off')
             and is_state('input_boolean.zendure_calib_mode_u2','off')
             and states('sensor.solarflow_2_status_raw')|upper not in ['UNAVAILABLE','UNKNOWN','FAULT','ERROR']
             and soc <= soc_guard_hard
             and vmin > 2.0
             and vmin <= 2.95 }}
        for: "00:01:00"
      - trigger: template
        id: "clear_u2"
        value_template: >
          {% set soc_exit = (states('input_number.zendure_conf_soc_bypass')|int(25)) + 1 %}
          {% set soc = states('sensor.solarflow_2_battery_level')|float(0) %}
          {% set vmin = states('sensor.solarflow_2_cell_min_vol')|float(0) %}
          {% set pv = states('sensor.solarflow_2_solar_input')|float(0) %}
          {{ is_state('input_boolean.zendure_vguard_u2','on')
             and soc >= soc_exit
             and (vmin > 3.20 or (pv > 20 and soc >= soc_exit)) }}
        for: "00:10:00"
    actions:
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ trigger.id in ['set_u1','set_u1_hard'] }}"
            sequence:
              - action: input_boolean.turn_on
                target: { entity_id: input_boolean.zendure_vguard_u1 }
              - action: script.zendure_set_u1_outputlimit_zero
              - action: input_number.set_value
                target: { entity_id: input_number.zendure_last_sent_1 }
                data: { value: 0 }
          - conditions:
              - condition: template
                value_template: "{{ trigger.id == 'clear_u1' }}"
            sequence:
              - action: input_boolean.turn_off
                target: { entity_id: input_boolean.zendure_vguard_u1 }
          - conditions:
              - condition: template
                value_template: "{{ trigger.id in ['set_u2','set_u2_hard'] }}"
            sequence:
              - action: input_boolean.turn_on
                target: { entity_id: input_boolean.zendure_vguard_u2 }
              - action: script.zendure_set_u2_outputlimit_zero
              - action: input_number.set_value
                target: { entity_id: input_number.zendure_last_sent_2 }
                data: { value: 0 }
          - conditions:
              - condition: template
                value_template: "{{ trigger.id == 'clear_u2' }}"
            sequence:
              - action: input_boolean.turn_off
                target: { entity_id: input_boolean.zendure_vguard_u2 }

  # --- 6.6d CALIBRATION MANAGER (Top-Balancing) ---
  - alias: "Zendure: Force Calibration on Suspicious SoC Drift"
    id: "zendure_force_calib_on_soc_drift"
    mode: single
    initial_state: true
    triggers:
      - trigger: homeassistant
        event: start
        id: boot
      - trigger: time_pattern
        minutes: "/10"
        id: check

    actions:
      - variables:
          ts_now: "{{ as_timestamp(now()) | int(0) }}"

      # --- Initialisierung nach HA-Start ---
      - if:
          - condition: template
            value_template: "{{ trigger.id == 'boot' }}"
        then:
          - action: input_number.set_value
            target: { entity_id: input_number.zendure_soc_drift_ref_u1 }
            data:
              value: "{{ states('sensor.solarflow_1_battery_level') | int(0) }}"
          - action: input_datetime.set_datetime
            target: { entity_id: input_datetime.zendure_soc_drift_ref_ts_u1 }
            data:
              timestamp: "{{ ts_now }}"

          - action: input_number.set_value
            target: { entity_id: input_number.zendure_soc_drift_ref_u2 }
            data:
              value: "{{ states('sensor.solarflow_2_battery_level') | int(0) }}"
          - action: input_datetime.set_datetime
            target: { entity_id: input_datetime.zendure_soc_drift_ref_ts_u2 }
            data:
              timestamp: "{{ ts_now }}"

      # --- Prüfen alle 10 Minuten ---
        else:
          - variables:
              soc1: "{{ states('sensor.solarflow_1_battery_level') | int(-1) }}"
              soc2: "{{ states('sensor.solarflow_2_battery_level') | int(-1) }}"

              ref_soc1: "{{ states('input_number.zendure_soc_drift_ref_u1') | int(-1) }}"
              ref_soc2: "{{ states('input_number.zendure_soc_drift_ref_u2') | int(-1) }}"

              age_min1: "{{ ((ts_now - (as_timestamp(states('input_datetime.zendure_soc_drift_ref_ts_u1'), default=0) | int(0))) / 60) | float(0) }}"
              age_min2: "{{ ((ts_now - (as_timestamp(states('input_datetime.zendure_soc_drift_ref_ts_u2'), default=0) | int(0))) / 60) | float(0) }}"

              drop1: >-
                {% set cur = states('sensor.solarflow_1_battery_level') | int(-1) %}
                {% set ref = states('input_number.zendure_soc_drift_ref_u1') | int(-1) %}
                {{ (ref - cur) if cur >= 0 and ref >= 0 else 0 }}

              drop2: >-
                {% set cur = states('sensor.solarflow_2_battery_level') | int(-1) %}
                {% set ref = states('input_number.zendure_soc_drift_ref_u2') | int(-1) %}
                {{ (ref - cur) if cur >= 0 and ref >= 0 else 0 }}

              suspicious_u1: >-
                {% set soc = states('sensor.solarflow_1_battery_level') | int(-1) %}
                {% set ref = states('input_number.zendure_soc_drift_ref_u1') | int(-1) %}
                {% set drop = (ref - soc) if soc >= 0 and ref >= 0 else 0 %}
                {% set ref_ts = as_timestamp(states('input_datetime.zendure_soc_drift_ref_ts_u1'), default=0) | int(0) %}
                {% set age_min = ((as_timestamp(now()) - ref_ts) / 60) | float(0) %}
                {% set vmin = states('sensor.solarflow_1_cell_min_vol') | float(99) %}
                {% set s = states.sensor.solarflow_1_status_raw %}
                {% set fresh = s is not none and s.state | upper not in ['UNAVAILABLE','UNKNOWN','FAULT','ERROR'] and (as_timestamp(now()) - as_timestamp(s.last_reported, 0)) < 120 %}
                {% set quiet = states('sensor.solarflow_1_output_power') | float(0) < 50
                               and states('sensor.solarflow_1_output_limit') | float(0) < 50
                               and states('input_number.zendure_last_sent_1') | float(0) < 50
                               and states('sensor.solarflow_1_grid_input_power') | float(0) < 50
                               and not is_state('input_boolean.zendure_calib_mode_u1', 'on')
                               and not is_state('input_boolean.zendure_emergency_u1', 'on') %}
                {{ fresh
                   and age_min >= 10
                   and soc >= 0 and soc <= 35
                   and ref >= 0 and ref <= 35
                   and drop >= 3
                   and quiet
                   and (is_state('input_boolean.zendure_vguard_u1','on') or vmin < 3.20)
                   and not is_state('input_boolean.zendure_force_calib_u1', 'on') }}

              suspicious_u2: >-
                {% set soc = states('sensor.solarflow_2_battery_level') | int(-1) %}
                {% set ref = states('input_number.zendure_soc_drift_ref_u2') | int(-1) %}
                {% set drop = (ref - soc) if soc >= 0 and ref >= 0 else 0 %}
                {% set ref_ts = as_timestamp(states('input_datetime.zendure_soc_drift_ref_ts_u2'), default=0) | int(0) %}
                {% set age_min = ((as_timestamp(now()) - ref_ts) / 60) | float(0) %}
                {% set vmin = states('sensor.solarflow_2_cell_min_vol') | float(99) %}
                {% set s = states.sensor.solarflow_2_status_raw %}
                {% set fresh = s is not none and s.state | upper not in ['UNAVAILABLE','UNKNOWN','FAULT','ERROR'] and (as_timestamp(now()) - as_timestamp(s.last_reported, 0)) < 120 %}
                {% set quiet = states('sensor.solarflow_2_output_power') | float(0) < 50
                               and states('sensor.solarflow_2_output_limit') | float(0) < 50
                               and states('input_number.zendure_last_sent_2') | float(0) < 50
                               and states('sensor.solarflow_2_grid_input_power') | float(0) < 50
                               and not is_state('input_boolean.zendure_calib_mode_u2', 'on')
                               and not is_state('input_boolean.zendure_emergency_u2', 'on') %}
                {{ fresh
                   and age_min >= 10
                   and soc >= 0 and soc <= 35
                   and ref >= 0 and ref <= 35
                   and drop >= 3
                   and quiet
                   and (is_state('input_boolean.zendure_vguard_u2','on') or vmin < 3.20)
                   and not is_state('input_boolean.zendure_force_calib_u2', 'on') }}

          # --- Unit 1 markieren ---
          - if:
              - condition: template
                value_template: "{{ suspicious_u1 }}"
            then:
              - action: input_boolean.turn_on
                target: { entity_id: input_boolean.zendure_force_calib_u1 }
              - action: notify.send_message
                target:
                  entity_id: !secret telegram_id1
                data:
                  message: >
                    🧭 *Calibration U1 scheduled for tomorrow 13:00*
                    Suspicious SoC drop detected without matching energy output
                    (ΔSoC {{ drop1 }}% in {{ age_min1 | round(0) }} min, vmin {{ states('sensor.solarflow_1_cell_min_vol') | float(0) | round(3) }} V).

          # --- Unit 2 markieren ---
          - if:
              - condition: template
                value_template: "{{ suspicious_u2 }}"
            then:
              - action: input_boolean.turn_on
                target: { entity_id: input_boolean.zendure_force_calib_u2 }
              - action: notify.send_message
                target:
                  entity_id: !secret telegram_id1
                data:
                  message: >
                    🧭 *Calibration U2 scheduled for tomorrow 13:00*
                    Suspicious SoC drop detected without matching energy output
                    (ΔSoC {{ drop2 }}% in {{ age_min2 | round(0) }} min, vmin {{ states('sensor.solarflow_2_cell_min_vol') | float(0) | round(3) }} V).

          # --- Referenzfenster immer neu setzen ---
          - action: input_number.set_value
            target: { entity_id: input_number.zendure_soc_drift_ref_u1 }
            data:
              value: "{{ states('sensor.solarflow_1_battery_level') | int(0) }}"
          - action: input_datetime.set_datetime
            target: { entity_id: input_datetime.zendure_soc_drift_ref_ts_u1 }
            data:
              timestamp: "{{ ts_now }}"

          - action: input_number.set_value
            target: { entity_id: input_number.zendure_soc_drift_ref_u2 }
            data:
              value: "{{ states('sensor.solarflow_2_battery_level') | int(0) }}"
          - action: input_datetime.set_datetime
            target: { entity_id: input_datetime.zendure_soc_drift_ref_ts_u2 }
            data:
              timestamp: "{{ ts_now }}"

  - alias: "Zendure: Smart Calibration Manager"
    id: "zendure_calibration_manager"
    mode: queued
    initial_state: true
    triggers:
      - trigger: homeassistant
        event: start
        id: "boot_check"
      - trigger: time
        at: "13:00:00"
        id: "check_time"
      - trigger: numeric_state
        entity_id: sensor.solarflow_1_battery_level
        above: 99
        for: "00:05:00"
        id: "stop_u1"
        # Stoppt Kalibrierung rein auf SoC-Basis (input-unabhängig):
        # Greift sowohl bei PV-Ladung als auch bei AC-Input.
      - trigger: numeric_state
        entity_id: sensor.solarflow_2_battery_level
        above: 99
        for: "00:05:00"
        id: "stop_u2"
        # Stoppt Kalibrierung rein auf SoC-Basis (input-unabhängig):
        # Greift sowohl bei PV-Ladung als auch bei AC-Input.
      - trigger: template
        id: "stop_u1_abort"
        value_template: >
          {% set bt = states.sensor.solarflow_1_batt_max_temp %}
          {% set ht = states.sensor.solarflow_1_temp %}
          {% set have_temp = (bt is not none and is_number(bt.state)) or (ht is not none and is_number(ht.state)) %}
          {% set t = states('sensor.solarflow_1_batt_max_temp')|float(states('sensor.solarflow_1_temp')|float(999)) %}
          {% set temp_mode_ok_u1 = have_temp and t >= 0 and t <= 52 and not is_state('sensor.solarflow_1_heizung', 'Aktiv') %}
          {{ is_state('input_boolean.zendure_calib_mode_u1', 'on')
             and (not temp_mode_ok_u1
                  or states('sensor.solarflow_1_status_raw')|upper in ['UNAVAILABLE','UNKNOWN','FAULT','ERROR']) }}
        for: "00:05:00"
      - trigger: template
        id: "stop_u2_abort"
        value_template: >
          {% set bt = states.sensor.solarflow_2_batt_max_temp %}
          {% set ht = states.sensor.solarflow_2_temp %}
          {% set have_temp = (bt is not none and is_number(bt.state)) or (ht is not none and is_number(ht.state)) %}
          {% set t = states('sensor.solarflow_2_batt_max_temp')|float(states('sensor.solarflow_2_temp')|float(999)) %}
          {% set temp_mode_ok_u2 = have_temp and t >= 0 and t <= 52 and not is_state('sensor.solarflow_2_heizung', 'Aktiv') %}
          {{ is_state('input_boolean.zendure_calib_mode_u2', 'on')
             and (not temp_mode_ok_u2
                  or states('sensor.solarflow_2_status_raw')|upper in ['UNAVAILABLE','UNKNOWN','FAULT','ERROR']) }}
        for: "00:05:00"
    conditions:
      - condition: state
        entity_id: input_boolean.zendure_auto_mode
        state: "on"
    actions:
      - if:
          - condition: state
            entity_id: input_boolean.zendure_auto_mode
            state: "off"
        then:
          - stop: "Auto Mode OFF. Calibration aborted."

      - variables:
          last_u1: "{{ as_timestamp(states('input_datetime.zendure_last_full_charge_1'), default=0) }}"
          last_u2: "{{ as_timestamp(states('input_datetime.zendure_last_full_charge_2'), default=0) }}"
          days_cfg: "{{ states('input_number.zendure_conf_calib_days') | int(14) }}"
          days_u1: "{{ ((as_timestamp(now()) - last_u1) / 86400) | int(0) }}"
          days_u2: "{{ ((as_timestamp(now()) - last_u2) / 86400) | int(0) }}"
          force_u1: "{{ is_state('input_boolean.zendure_force_calib_u1', 'on') }}"
          force_u2: "{{ is_state('input_boolean.zendure_force_calib_u2', 'on') }}"

      - if:
          - condition: template
            value_template: "{{ trigger.id == 'stop_u1' }}"
        then:
          - action: input_datetime.set_datetime
            target: { entity_id: input_datetime.zendure_last_full_charge_1 }
            data: { timestamp: "{{ as_timestamp(now()) }}" }

      - if:
          - condition: template
            value_template: "{{ trigger.id == 'stop_u2' }}"
        then:
          - action: input_datetime.set_datetime
            target: { entity_id: input_datetime.zendure_last_full_charge_2 }
            data: { timestamp: "{{ as_timestamp(now()) }}" }

      # --- START LOGIK UNIT 1 ---
      - if:
          - condition: template
            value_template: >
              {% set s = states.sensor.solarflow_1_status_raw %}
              {% set fresh = s is not none and s.state|upper not in ['UNAVAILABLE','UNKNOWN','FAULT','ERROR'] and (as_timestamp(now()) - as_timestamp(s.last_reported, 0)) < 120 %}
              {% set vmin_ok = has_value('sensor.solarflow_1_cell_min_vol') %}
              {% set vol = states('sensor.solarflow_1_cell_min_vol')|float(0) if vmin_ok else 0 %}
              {% set bt = states.sensor.solarflow_1_batt_max_temp %}
              {% set ht = states.sensor.solarflow_1_temp %}
              {% set have_temp = (bt is not none and is_number(bt.state)) or (ht is not none and is_number(ht.state)) %}
              {% set t = states('sensor.solarflow_1_batt_max_temp')|float(states('sensor.solarflow_1_temp')|float(999)) %}
              {% set temp_mode_ok_u1 = have_temp and t >= 0 and t <= 52 and not is_state('sensor.solarflow_1_heizung', 'Aktiv') %}
              {% set plausible = vmin_ok and vol > 2.0 and temp_mode_ok_u1 %}

              {{ trigger.id == 'check_time' and (days_u1 >= days_cfg or force_u1)
                 and is_state('input_boolean.zendure_calib_mode_u1', 'off')
                 and is_state('input_boolean.zendure_emergency_u1','off')
                 and is_state('input_boolean.zendure_vguard_u1','off')
                 and fresh and plausible
                 and temp_mode_ok_u1 }}
        then:
          - variables:
              s1_solar: "{{ states('sensor.solarflow_1_solar_input') | float(0) }}"
              pv_low: "{{ states('input_number.zendure_conf_calib_pv_low') | float(40) }}"
              pv_high_raw: "{{ states('input_number.zendure_conf_calib_pv_high') | float(70) }}"
              pv_start: "{{ [pv_high_raw, (pv_low | float(40)) + 10] | max }}"
              limit_calib_u1: >
                {% set t1 = states('sensor.solarflow_1_batt_max_temp') | float(states('sensor.solarflow_1_temp')|float(0)) %}
                {% set soc1 = states('sensor.solarflow_1_battery_level') | float(0) %}
                {% set cl1 = 100 if t1 < 5 else (300 if t1 < 10 else 800) %}
                {% set sl1 = 100 if soc1 > 97 else (200 if soc1 >= 90 else 800) %}
                {% set soc_soft_u1 = 100 if soc1 < 8 else (300 if soc1 < 12 else 800) %}
                {{ [cl1|int, sl1|int, soc_soft_u1|int]|min }}
          - action: input_boolean.turn_on
            target: { entity_id: input_boolean.zendure_calib_mode_u1 }
          - if:
              - condition: template
                value_template: "{{ s1_solar >= pv_start }}"
            then:
              - action: input_text.set_value
                target: { entity_id: input_text.zendure_ac_mode_u1 }
                data: { value: "Output mode" }
              - action: script.zendure_dispatch_u1_ac_mode
                data:
                  mode: "Output mode"
                  force: true
              - action: script.zendure_set_u1_outputlimit_zero
            else:
              - action: input_text.set_value
                target: { entity_id: input_text.zendure_ac_mode_u1 }
                data: { value: "Input mode" }
              - action: script.zendure_dispatch_u1_ac_mode
                data:
                  mode: "Input mode"
                  force: true
              - action: script.zendure_set_u1_outputlimit_zero
              - action: script.zendure_dispatch_u1_inputlimit
                data:
                  power: "{{ limit_calib_u1 }}"
          - action: input_number.set_value
            target: { entity_id: input_number.zendure_last_sent_1 }
            data: { value: 0 }
          - action: notify.send_message
            target:
              entity_id: !secret telegram_id1
            data:
              message: >
                {% if force_u1 %}
                  📅 *Top-Kalibrierung U1 gestartet*\nSonder-Kalibrierung (Nach Spannungsabsturz in der Nacht)
                {% else %}
                  📅 *Top-Kalibrierung U1 gestartet*\nRegulärer Zyklus nach {{ days_u1 }} Tagen.
                {% endif %}

      # --- START LOGIK UNIT 2 ---
      - if:
          - condition: template
            value_template: >
              {% set s = states.sensor.solarflow_2_status_raw %}
              {% set fresh = s is not none and s.state|upper not in ['UNAVAILABLE','UNKNOWN','FAULT','ERROR'] and (as_timestamp(now()) - as_timestamp(s.last_reported, 0)) < 120 %}
              {% set vmin_ok = has_value('sensor.solarflow_2_cell_min_vol') %}
              {% set vol = states('sensor.solarflow_2_cell_min_vol')|float(0) if vmin_ok else 0 %}
              {% set bt = states.sensor.solarflow_2_batt_max_temp %}
              {% set ht = states.sensor.solarflow_2_temp %}
              {% set have_temp = (bt is not none and is_number(bt.state)) or (ht is not none and is_number(ht.state)) %}
              {% set t = states('sensor.solarflow_2_batt_max_temp')|float(states('sensor.solarflow_2_temp')|float(999)) %}
              {% set temp_mode_ok_u2 = have_temp and t >= 0 and t <= 52 and not is_state('sensor.solarflow_2_heizung', 'Aktiv') %}
              {% set plausible = vmin_ok and vol > 2.0 and temp_mode_ok_u2 %}

              {{ trigger.id == 'check_time' and (days_u2 >= days_cfg or force_u2)
                 and is_state('input_boolean.zendure_calib_mode_u2', 'off')
                 and is_state('input_boolean.zendure_emergency_u2','off')
                 and is_state('input_boolean.zendure_vguard_u2','off')
                 and fresh and plausible
                 and temp_mode_ok_u2 }}
        then:
          - variables:
              s2_solar: "{{ states('sensor.solarflow_2_solar_input') | float(0) }}"
              pv_low: "{{ states('input_number.zendure_conf_calib_pv_low') | float(40) }}"
              pv_high_raw: "{{ states('input_number.zendure_conf_calib_pv_high') | float(70) }}"
              pv_start: "{{ [pv_high_raw, (pv_low | float(40)) + 10] | max }}"
              limit_calib_u2: >
                {% set t2 = states('sensor.solarflow_2_batt_max_temp') | float(states('sensor.solarflow_2_temp')|float(0)) %}
                {% set soc2 = states('sensor.solarflow_2_battery_level') | float(0) %}
                {% set cl2 = 100 if t2 < 5 else (300 if t2 < 10 else 800) %}
                {% set sl2 = 100 if soc2 > 97 else (200 if soc2 >= 90 else 800) %}
                {% set soc_soft_u2 = 100 if soc2 < 8 else (300 if soc2 < 12 else 800) %}
                {{ [cl2|int, sl2|int, soc_soft_u2|int]|min }}
          - action: input_boolean.turn_on
            target: { entity_id: input_boolean.zendure_calib_mode_u2 }
          - if:
              - condition: template
                value_template: "{{ s2_solar >= pv_start }}"
            then:
              - action: input_text.set_value
                target: { entity_id: input_text.zendure_ac_mode_u2 }
                data: { value: "Output mode" }
              - action: script.zendure_dispatch_u2_ac_mode
                data:
                  mode: "Output mode"
                  force: true
              - action: script.zendure_set_u2_outputlimit_zero
            else:
              - action: input_text.set_value
                target: { entity_id: input_text.zendure_ac_mode_u2 }
                data: { value: "Input mode" }
              - action: script.zendure_dispatch_u2_ac_mode
                data:
                  mode: "Input mode"
                  force: true
              - action: script.zendure_set_u2_outputlimit_zero
              - action: script.zendure_dispatch_u2_inputlimit
                data:
                  power: "{{ limit_calib_u2 }}"
          - action: input_number.set_value
            target: { entity_id: input_number.zendure_last_sent_2 }
            data: { value: 0 }
          - action: notify.send_message
            target:
              entity_id: !secret telegram_id1
            data:
              message: >
                {% if force_u2 %}
                  📅 *Top-Kalibrierung U2 gestartet*\nSonder-Kalibrierung (Nach Spannungsabsturz in der Nacht)
                {% else %}
                  📅 *Top-Kalibrierung U2 gestartet*\nRegulärer Zyklus nach {{ days_u2 }} Tagen.
                {% endif %}

      # --- BEENDEN LOGIK ---
      - if:
          - condition: template
            value_template: >
              {{ is_state('input_boolean.zendure_calib_mode_u1','on')
                 and (
                   trigger.id in ['stop_u1', 'stop_u1_abort']
                   or (trigger.id == 'boot_check' and states('sensor.solarflow_1_battery_level')|float(0) >= 99)
                 ) }}
        then:
          - action: input_boolean.turn_off
            target: { entity_id: input_boolean.zendure_calib_mode_u1 }
          - action: input_text.set_value
            target: { entity_id: input_text.zendure_ac_mode_u1 }
            data: { value: "Output mode" }
          - action: script.zendure_dispatch_u1_ac_mode
            data:
              mode: "Output mode"
              force: true
          - action: script.zendure_set_u1_outputlimit_zero
          - action: input_number.set_value
            target: { entity_id: input_number.zendure_last_sent_1 }
            data: { value: 0 }
          - if:
              - condition: template
                value_template: "{{ trigger.id in ['stop_u1', 'boot_check'] }}"
            then:
              - action: input_boolean.turn_off
                target: { entity_id: input_boolean.zendure_force_calib_u1 }
          - action: notify.send_message
            target:
              entity_id: !secret telegram_id1
            data:
              message: >
                {% if trigger.id == 'stop_u1' %}
                  ✅ *Kalibrierung U1*\nErfolgreich beendet (100%). Zellen balanciert.
                {% elif trigger.id == 'boot_check' and states('sensor.solarflow_1_battery_level')|float(0) >= 99 %}
                  ✅ *Kalibrierung U1*\nNach HA-Neustart bei 100% sauber beendet.
                {% else %}
                  ⚠️ *Kalibrierung U1 abgebrochen*\nTemperatur nicht operativ (oder Sensorfehler/Offline).
                {% endif %}

      - if:
          - condition: template
            value_template: >
              {{ is_state('input_boolean.zendure_calib_mode_u2','on')
                 and (
                   trigger.id in ['stop_u2', 'stop_u2_abort']
                   or (trigger.id == 'boot_check' and states('sensor.solarflow_2_battery_level')|float(0) >= 99)
                 ) }}
        then:
          - action: input_boolean.turn_off
            target: { entity_id: input_boolean.zendure_calib_mode_u2 }
          - action: input_text.set_value
            target: { entity_id: input_text.zendure_ac_mode_u2 }
            data: { value: "Output mode" }
          - action: script.zendure_dispatch_u2_ac_mode
            data:
              mode: "Output mode"
              force: true
          - action: script.zendure_set_u2_outputlimit_zero
          - action: input_number.set_value
            target: { entity_id: input_number.zendure_last_sent_2 }
            data: { value: 0 }
          - if:
              - condition: template
                value_template: "{{ trigger.id in ['stop_u2', 'boot_check'] }}"
            then:
              - action: input_boolean.turn_off
                target: { entity_id: input_boolean.zendure_force_calib_u2 }
          - action: notify.send_message
            target:
              entity_id: !secret telegram_id1
            data:
              message: >
                {% if trigger.id == 'stop_u2' %}
                  ✅ *Kalibrierung U2*\nErfolgreich beendet (100%). Zellen balanciert.
                {% elif trigger.id == 'boot_check' and states('sensor.solarflow_2_battery_level')|float(0) >= 99 %}
                  ✅ *Kalibrierung U2*\nNach HA-Neustart bei 100% sauber beendet.
                {% else %}
                  ⚠️ *Kalibrierung U2 abgebrochen*\nTemperatur nicht operativ (oder Sensorfehler/Offline).
                {% endif %}

  # --- 6.7 HEALTH REPORTER ---
  - alias: "Zendure: Weekly Health Report"
    id: "zendure_weekly_report"
    triggers:
      - trigger: time
        at: "18:00:00"
    conditions:
      - condition: time
        weekday: [fri]
    actions:
      - variables:
          last_u1: "{{ as_timestamp(states('input_datetime.zendure_last_full_charge_1'), default=0) }}"
          last_u2: "{{ as_timestamp(states('input_datetime.zendure_last_full_charge_2'), default=0) }}"
          days_u1: "{{ ((as_timestamp(now()) - last_u1) / 86400) | int(0) }}"
          days_u2: "{{ ((as_timestamp(now()) - last_u2) / 86400) | int(0) }}"
          imb1_raw: "{{ states('sensor.solarflow_1_cell_imbalance') }}"
          imb2_raw: "{{ states('sensor.solarflow_2_cell_imbalance') }}"
      - action: notify.send_message
        target:
          entity_id: !secret telegram_id1
        data:
          message: |
            ℹ️ *Zendure Wochenbericht*
            Unit 1: {{ days_u1 }} Tage ({{ imb1_raw }} V)
            Unit 2: {{ days_u2 }} Tage ({{ imb2_raw }} V)

  # --- 6.8a CALIBRATION AC FALLBACK MANAGER ---
  - alias: "Zendure: Calibration AC Fallback Manager"
    id: "zendure_calibration_ac_fallback_manager"
    mode: queued
    initial_state: true
    max: 2
    max_exceeded: silent
    triggers:
      - trigger: homeassistant
        event: start
      - trigger: time_pattern
        minutes: "/1"
      - trigger: state
        entity_id:
          - input_boolean.zendure_calib_mode_u1
          - input_boolean.zendure_calib_mode_u2
          - sensor.solarflow_1_solar_input
          - sensor.solarflow_2_solar_input
    conditions:
      - condition: state
        entity_id: input_boolean.zendure_auto_mode
        state: "on"
    actions:
      - variables:
          pv_low: "{{ states('input_number.zendure_conf_calib_pv_low') | float(40) }}"
          pv_high_raw: "{{ states('input_number.zendure_conf_calib_pv_high') | float(70) }}"
          pv_high: "{{ [pv_high_raw, (pv_low | float(40)) + 10] | max }}"

          online1: "{{ states('sensor.solarflow_1_status_raw')|upper not in ['UNAVAILABLE','UNKNOWN','FAULT','ERROR'] }}"
          online2: "{{ states('sensor.solarflow_2_status_raw')|upper not in ['UNAVAILABLE','UNKNOWN','FAULT','ERROR'] }}"
          calib1: "{{ is_state('input_boolean.zendure_calib_mode_u1', 'on') }}"
          calib2: "{{ is_state('input_boolean.zendure_calib_mode_u2', 'on') }}"

          soc1: "{{ states('sensor.solarflow_1_battery_level') | float(0) }}"
          soc2: "{{ states('sensor.solarflow_2_battery_level') | float(0) }}"
          s1_solar: "{{ states('sensor.solarflow_1_solar_input') | float(0) if online1 else 0 }}"
          s2_solar: "{{ states('sensor.solarflow_2_solar_input') | float(0) if online2 else 0 }}"

          t1: "{{ states('sensor.solarflow_1_batt_max_temp') | float(states('sensor.solarflow_1_temp')|float(0)) }}"
          t2: "{{ states('sensor.solarflow_2_batt_max_temp') | float(states('sensor.solarflow_2_temp')|float(0)) }}"
          cl1: "{{ 100 if t1 < 5 else (300 if t1 < 10 else 800) }}"
          cl2: "{{ 100 if t2 < 5 else (300 if t2 < 10 else 800) }}"
          sl1: "{{ 100 if soc1 > 97 else (200 if soc1 >= 90 else 800) }}"
          sl2: "{{ 100 if soc2 > 97 else (200 if soc2 >= 90 else 800) }}"
          soc_soft_u1: "{{ 100 if soc1 < 8 else (300 if soc1 < 12 else 800) }}"
          soc_soft_u2: "{{ 100 if soc2 < 8 else (300 if soc2 < 12 else 800) }}"
          limit_calib_u1: "{{ [cl1|int, sl1|int, soc_soft_u1|int]|min }}"
          limit_calib_u2: "{{ [cl2|int, sl2|int, soc_soft_u2|int]|min }}"
          curr_limit_u1: "{{ states('sensor.solarflow_1_setting_chargelimit') | int(-1) }}"
          curr_limit_u2: "{{ states('sensor.solarflow_2_setting_chargelimit') | int(-1) }}"

      - condition: template
        value_template: "{{ calib1 or calib2 }}"

      - parallel:
          - choose:
              - conditions:
                  - condition: template
                    value_template: >
                      {{ calib1 and online1 and soc1 < 100 and s1_solar <= (pv_low|float(40))
                         and (states('input_text.zendure_ac_mode_u1') != 'Input mode'
                              or curr_limit_u1 != (limit_calib_u1|int)) }}
                sequence:
                  - if:
                      - condition: template
                        value_template: "{{ states('input_text.zendure_ac_mode_u1') != 'Input mode' }}"
                    then:
                      - action: script.zendure_dispatch_u1_ac_mode
                        data:
                          mode: "Input mode"
                          force: true
                      - action: script.zendure_set_u1_outputlimit_zero
                  - action: script.zendure_dispatch_u1_inputlimit
                    data:
                      power: "{{ limit_calib_u1|int }}"
              - conditions:
                  - condition: template
                    value_template: >
                      {{ calib1 and online1 and soc1 < 100 and s1_solar >= (pv_high|float(70))
                      and (
                          states('input_text.zendure_ac_mode_u1') != 'Output mode'
                          or states('sensor.solarflow_1_output_limit')|int(-1) != 0
                          or states('input_number.zendure_last_sent_1')|int(-1) != 0
                      ) }}
                sequence:
                  - action: script.zendure_dispatch_u1_ac_mode
                    data:
                      mode: "Output mode"
                      force: true
                  - action: script.zendure_set_u1_outputlimit_zero

          - choose:
              - conditions:
                  - condition: template
                    value_template: >
                      {{ calib2 and online2 and soc2 < 100 and s2_solar <= (pv_low|float(40))
                         and (states('input_text.zendure_ac_mode_u2') != 'Input mode'
                              or curr_limit_u2 != (limit_calib_u2|int)) }}
                sequence:
                  - if:
                      - condition: template
                        value_template: "{{ states('input_text.zendure_ac_mode_u2') != 'Input mode' }}"
                    then:
                      - action: script.zendure_dispatch_u2_ac_mode
                        data:
                          mode: "Input mode"
                          force: true
                      - action: script.zendure_set_u2_outputlimit_zero
                  - action: script.zendure_dispatch_u2_inputlimit
                    data:
                      power: "{{ limit_calib_u2|int }}"
              - conditions:
                  - condition: template
                    value_template: >
                      {{ calib2 and online2 and soc2 < 100 and s2_solar >= (pv_high|float(70))
                      and (
                          states('input_text.zendure_ac_mode_u2') != 'Output mode'
                          or states('sensor.solarflow_2_output_limit')|int(-1) != 0
                          or states('input_number.zendure_last_sent_2')|int(-1) != 0
                      ) }}
                sequence:
                  - action: script.zendure_dispatch_u2_ac_mode
                    data:
                      mode: "Output mode"
                      force: true
                  - action: script.zendure_set_u2_outputlimit_zero

  # --- 6.8b AUTO-EMERGENCY MANAGER (PER-UNIT) ---
  - alias: "Zendure: VGuard -> Emergency Bridge (Low-SoC)"
    id: "zendure_vguard_emergency_bridge"
    mode: queued
    initial_state: true
    triggers:
      - trigger: homeassistant
        event: start
      - trigger: time_pattern
        minutes: "/1"
      - trigger: state
        entity_id:
          - input_boolean.zendure_vguard_u1
          - input_boolean.zendure_vguard_u2
          - sensor.solarflow_1_battery_level
          - sensor.solarflow_2_battery_level
          - sensor.solarflow_total_solar_input
          - input_boolean.zendure_calib_mode_u1
          - input_boolean.zendure_calib_mode_u2
          - input_boolean.zendure_emergency_u1
          - input_boolean.zendure_emergency_u2
          - sensor.solarflow_1_status_raw
          - sensor.solarflow_2_status_raw
    conditions:
      - condition: state
        entity_id: input_boolean.zendure_auto_mode
        state: "on"
    actions:
      - choose:
          - conditions:
              - condition: template
                value_template: >
                  {% set s = states.sensor.solarflow_1_status_raw %}
                  {% set fresh = s is not none and s.state|upper not in ['UNAVAILABLE','UNKNOWN','FAULT','ERROR'] and (as_timestamp(now()) - as_timestamp(s.last_reported, 0)) < 120 %}
                  {% set bt = states.sensor.solarflow_1_batt_max_temp %}
                  {% set ht = states.sensor.solarflow_1_temp %}
                  {% set have_temp = (bt is not none and is_number(bt.state)) or (ht is not none and is_number(ht.state)) %}
                  {% set t = states('sensor.solarflow_1_batt_max_temp') | float(states('sensor.solarflow_1_temp') | float(999)) %}
                  {% set temp_mode_ok_u1 = have_temp and t >= 0 and t <= 52 and not is_state('sensor.solarflow_1_heizung', 'Aktiv') %}
                  {{ is_state('input_boolean.zendure_vguard_u1','on')
                     and is_state('input_boolean.zendure_emergency_u1','off')
                     and is_state('input_boolean.zendure_calib_mode_u1','off')
                     and fresh
                     and temp_mode_ok_u1
                     and states('sensor.solarflow_total_solar_input')|float(0) < 150
                     and (
                       states('sensor.solarflow_1_battery_level')|float(100) <= states('input_number.zendure_conf_soc_emerg_start')|float(15)
                       or states('sensor.solarflow_1_cell_min_vol')|float(99) <= 3.00
                     ) }}
            sequence:
              - action: input_boolean.turn_off
                target: { entity_id: input_boolean.zendure_vguard_u1 }
              - action: input_boolean.turn_on
                target: { entity_id: input_boolean.zendure_emergency_u1 }
              - variables:
                  t1: "{{ states('sensor.solarflow_1_batt_max_temp') | float(states('sensor.solarflow_1_temp')|float(0)) }}"
                  soc1: "{{ states('sensor.solarflow_1_battery_level') | float(0) }}"
                  cl1: "{{ 100 if t1 < 5 else (300 if t1 < 10 else 800) }}"
                  ss1: "{{ 300 if soc1 < 12 else 800 }}"
                  limit_emerg_u1: "{{ [300, cl1|int, ss1|int]|min }}"
              - action: input_text.set_value
                target: { entity_id: input_text.zendure_ac_mode_u1 }
                data: { value: "Input mode" }
              - action: script.zendure_dispatch_u1_ac_mode
                data:
                  mode: "Input mode"
                  force: true
              - action: script.zendure_set_u1_outputlimit_zero
              - action: script.zendure_dispatch_u1_inputlimit
                data:
                  power: "{{ limit_emerg_u1 }}"
              - action: input_number.set_value
                target: { entity_id: input_number.zendure_last_sent_1 }
                data: { value: 0 }
              - action: notify.send_message
                target:
                  entity_id: !secret telegram_id1
                data:
                  message: "🔋 *VGuard→Emergency U1*\nKritischer Low-SoC erkannt, VGuard freigegeben und Notladung mit {{ limit_emerg_u1|int }}W gestartet."
          - conditions:
              - condition: template
                value_template: >
                  {% set s = states.sensor.solarflow_2_status_raw %}
                  {% set fresh = s is not none and s.state|upper not in ['UNAVAILABLE','UNKNOWN','FAULT','ERROR'] and (as_timestamp(now()) - as_timestamp(s.last_reported, 0)) < 120 %}
                  {% set bt = states.sensor.solarflow_2_batt_max_temp %}
                  {% set ht = states.sensor.solarflow_2_temp %}
                  {% set have_temp = (bt is not none and is_number(bt.state)) or (ht is not none and is_number(ht.state)) %}
                  {% set t = states('sensor.solarflow_2_batt_max_temp') | float(states('sensor.solarflow_2_temp') | float(999)) %}
                  {% set temp_mode_ok_u2 = have_temp and t >= 0 and t <= 52 and not is_state('sensor.solarflow_2_heizung', 'Aktiv') %}
                  {{ is_state('input_boolean.zendure_vguard_u2','on')
                     and is_state('input_boolean.zendure_emergency_u2','off')
                     and is_state('input_boolean.zendure_calib_mode_u2','off')
                     and fresh
                     and temp_mode_ok_u2
                     and states('sensor.solarflow_total_solar_input')|float(0) < 150
                     and (
                       states('sensor.solarflow_2_battery_level')|float(100) <= states('input_number.zendure_conf_soc_emerg_start')|float(15)
                       or states('sensor.solarflow_2_cell_min_vol')|float(99) <= 3.00
                     ) }}
            sequence:
              - action: input_boolean.turn_off
                target: { entity_id: input_boolean.zendure_vguard_u2 }
              - action: input_boolean.turn_on
                target: { entity_id: input_boolean.zendure_emergency_u2 }
              - variables:
                  t2: "{{ states('sensor.solarflow_2_batt_max_temp') | float(states('sensor.solarflow_2_temp')|float(0)) }}"
                  soc2: "{{ states('sensor.solarflow_2_battery_level') | float(0) }}"
                  cl2: "{{ 100 if t2 < 5 else (300 if t2 < 10 else 800) }}"
                  ss2: "{{ 300 if soc2 < 12 else 800 }}"
                  limit_emerg_u2: "{{ [300, cl2|int, ss2|int]|min }}"
              - action: input_text.set_value
                target: { entity_id: input_text.zendure_ac_mode_u2 }
                data: { value: "Input mode" }
              - action: script.zendure_dispatch_u2_ac_mode
                data:
                  mode: "Input mode"
                  force: true
              - action: script.zendure_set_u2_outputlimit_zero
              - action: script.zendure_dispatch_u2_inputlimit
                data:
                  power: "{{ limit_emerg_u2 }}"
              - action: input_number.set_value
                target: { entity_id: input_number.zendure_last_sent_2 }
                data: { value: 0 }
              - action: notify.send_message
                target:
                  entity_id: !secret telegram_id1
                data:
                  message: "🔋 *VGuard→Emergency U2*\nKritischer Low-SoC erkannt, VGuard freigegeben und Notladung mit {{ limit_emerg_u2|int }}W gestartet."

  # --- 6.8b AUTO-EMERGENCY MANAGER (PER-UNIT) ---
  - alias: "Zendure: Auto-Emergency Manager (Per-Unit)"
    id: "zendure_auto_emergency_manager_dual"
    mode: parallel
    initial_state: true
    triggers:
      - trigger: homeassistant
        event: start
        id: "boot_check"
      # U1 START (SoC-basiert, konservativ)
      - trigger: template
        id: "start_u1_soc"
        value_template: >
