                  message: >
                    {% set bt = states.sensor.solarflow_2_batt_max_temp %}
                    {% set ht = states.sensor.solarflow_2_temp %}
                    {% set have_temp = (bt is not none and is_number(bt.state)) or (ht is not none and is_number(ht.state)) %}
                    {% set t = states('sensor.solarflow_2_batt_max_temp') | float(states('sensor.solarflow_2_temp') | float(999)) %}
                    {% set temp_mode_ok_u2 = have_temp and t >= 0 and t <= 52 and not is_state('sensor.solarflow_2_heizung', 'Aktiv') %}
                    {% if not temp_mode_ok_u2 %}
                      ⚠️ *Zendure Notladung (Unit 2) abgebrochen*\nTemperatur nicht operativ.
                    {% else %}
                      ✅ *Zendure Notladung (Unit 2)*\nBeendet (Werte stabilisiert).
                    {% endif %}


  # --- 6.9 SEASON MANAGER ---
  - alias: "Zendure: Season Manager"
    id: "zendure_season_manager_dual"
    initial_state: true
    triggers:
      - trigger: time
        at: "04:00:00"
      - trigger: homeassistant
        event: start
    actions:
      - choose:
          # WINTER (Oktober - März)
          - conditions:
              - condition: template
                value_template: "{{ now().month >= 10 or now().month < 4 }}"
            sequence:
              - action: input_number.set_value
                target: { entity_id: input_number.zendure_conf_soc_off }
                data: { value: 20 }
              - action: input_number.set_value
                target: { entity_id: input_number.zendure_conf_soc_bypass }
                data: { value: 25 }
              - action: input_number.set_value
                target: { entity_id: input_number.zendure_conf_soc_emerg_start }
                data: { value: 10 }
              - action: input_number.set_value
                target: { entity_id: input_number.zendure_conf_soc_emerg_stop }
                data: { value: 15 }
              - action: input_number.set_value
                target: { entity_id: input_number.zendure_conf_calib_days }
                data: { value: 14 }

          # SOMMER (April - September)
          - conditions:
              - condition: template
                value_template: "{{ now().month >= 4 and now().month < 10 }}"
            sequence:
              - action: input_number.set_value
                target: { entity_id: input_number.zendure_conf_soc_off }
                data: { value: 10 }
              - action: input_number.set_value
                target: { entity_id: input_number.zendure_conf_soc_bypass }
                data: { value: 12 }
              - action: input_number.set_value
                target: { entity_id: input_number.zendure_conf_soc_emerg_start }
                data: { value: 7 }
              - action: input_number.set_value
                target: { entity_id: input_number.zendure_conf_soc_emerg_stop }
                data: { value: 9 }
              - action: input_number.set_value
                target: { entity_id: input_number.zendure_conf_calib_days }
                data: { value: 14 }

      - action: input_number.set_value
        target: { entity_id: input_number.zendure_conf_grid_bias }
        data: { value: 10 }
      - action: input_number.set_value
        target: { entity_id: input_number.zendure_conf_hysteresis }
        data: { value: 10 }
      - action: input_number.set_value
        target: { entity_id: input_number.zendure_conf_min_change }
        data: { value: 5 }

      - delay: "00:00:05"
      - parallel:
        - if:
            - condition: template
              value_template: "{{ states('sensor.solarflow_1_status_raw')|upper not in ['UNAVAILABLE', 'UNKNOWN', 'FAULT', 'ERROR'] }}"
          then:
            - action: mqtt.publish
              data: { topic: !secret zendure_topic_u1_switch_smartMode_set, payload: "ON", qos: 1 }
        - if:
            - condition: template
              value_template: "{{ states('sensor.solarflow_2_status_raw')|upper not in ['UNAVAILABLE', 'UNKNOWN', 'FAULT', 'ERROR'] }}"
          then:
            - action: mqtt.publish
              data: { topic: !secret zendure_topic_u2_switch_smartMode_set, payload: "ON", qos: 1 }
      - delay: "00:00:02"
      - parallel:
        - if:
            - condition: template
              value_template: "{{ states('sensor.solarflow_1_status_raw')|upper not in ['UNAVAILABLE', 'UNKNOWN', 'FAULT', 'ERROR'] }}"
          then:
            - action: mqtt.publish
              data: { topic: !secret zendure_topic_u1_switch_smartMode_set, payload: "ON", qos: 1 }
        - if:
            - condition: template
              value_template: "{{ states('sensor.solarflow_2_status_raw')|upper not in ['UNAVAILABLE', 'UNKNOWN', 'FAULT', 'ERROR'] }}"
          then:
            - action: mqtt.publish
              data: { topic: !secret zendure_topic_u2_switch_smartMode_set, payload: "ON", qos: 1 }

  # --- 6.10 MONITORING ---
  - alias: "Zendure: Monitoring"
    id: "zendure_monitoring_dual"
    initial_state: true
    triggers:
      - trigger: template
        id: "shelly_fail"
        value_template: >-
          {% set meter = states('input_text.zendure_power_meter_total_consumption') %}
          {% set s = (expand(meter) | first) if meter|length > 0 else none %}
          {% set val = s.state if s is not none else 'unknown' %}
          {% set ts_reported = as_timestamp(s.last_reported, 0) if s is not none and s.last_reported is defined else 0 %}
          {% set ts_changed = as_timestamp(s.last_changed, 0) if s is not none else 0 %}
          {% set fresh = (as_timestamp(now()) - ts_reported) < 25 or (as_timestamp(now()) - ts_changed) < 25 %}
          {{ not (s is not none and val|upper not in ['UNAVAILABLE','UNKNOWN','NONE'] and is_number(val) and fresh) }}
        for: "00:00:30"
      - trigger: template
        id: "shelly_ok"
        value_template: >-
          {% set meter = states('input_text.zendure_power_meter_total_consumption') %}
          {% set s = (expand(meter) | first) if meter|length > 0 else none %}
          {% set val = s.state if s is not none else 'unknown' %}
          {% set ts_reported = as_timestamp(s.last_reported, 0) if s is not none and s.last_reported is defined else 0 %}
          {% set ts_changed = as_timestamp(s.last_changed, 0) if s is not none else 0 %}
          {% set fresh = (as_timestamp(now()) - ts_reported) < 25 or (as_timestamp(now()) - ts_changed) < 25 %}
          {{ s is not none and val|upper not in ['UNAVAILABLE','UNKNOWN','NONE'] and is_number(val) and fresh }}
        for: "00:01:00"

      - trigger: state
        entity_id: sensor.solarflow_1_status_raw
        to: "unavailable"
        for: "00:03:00"
        id: "u1_offline"
      - trigger: state
        entity_id: sensor.solarflow_2_status_raw
        to: "unavailable"
        for: "00:03:00"
        id: "u2_offline"

      - trigger: template
        id: "u1_fault"
        value_template: "{{ states('sensor.solarflow_1_status_raw')|upper in ['FAULT', 'ERROR'] }}"
        for: "00:03:00"
      - trigger: template
        id: "u2_fault"
        value_template: "{{ states('sensor.solarflow_2_status_raw')|upper in ['FAULT', 'ERROR'] }}"
        for: "00:03:00"

    actions:
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ trigger.id == 'shelly_fail' }}"
            sequence:
              - action: persistent_notification.create
                data: { title: "⚠️ Zendure Failsafe", message: "Netzdaten fehlen (Shelly offline). Grundlast aktiv.", notification_id: "sf_failsafe" }
          - conditions:
              - condition: template
                value_template: "{{ trigger.id == 'shelly_ok' }}"
            sequence:
              - action: persistent_notification.dismiss
                data: { notification_id: "sf_failsafe" }

          - conditions:
              - condition: template
                value_template: "{{ trigger.id == 'u1_offline' }}"
            sequence:
              - action: notify.send_message
                target:
                  entity_id: !secret telegram_id1
                data:
                  message: "⚠️ *Zendure Warnung*\nUnit 1 ist offline/nicht erreichbar."
          - conditions:
              - condition: template
                value_template: "{{ trigger.id == 'u2_offline' }}"
            sequence:
              - action: notify.send_message
                target:
                  entity_id: !secret telegram_id1
                data:
                  message: "⚠️ *Zendure Warnung*\nUnit 2 ist offline/nicht erreichbar."

          - conditions:
              - condition: template
                value_template: "{{ trigger.id == 'u1_fault' }}"
            sequence:
              - action: notify.send_message
                target:
                  entity_id: !secret telegram_id1
                data:
                  message: "❌ *Zendure Fehler*\nUnit 1 meldet Fehlerstatus (FAULT/ERROR)!"
          - conditions:
              - condition: template
                value_template: "{{ trigger.id == 'u2_fault' }}"
            sequence:
              - action: notify.send_message
                target:
                  entity_id: !secret telegram_id1
                data:
                  message: "❌ *Zendure Fehler*\nUnit 2 meldet Fehlerstatus (FAULT/ERROR)!"


# --- 6.11 PROGNOSE: ÜBERFÜLLUNG ---
  - alias: "Zendure Info: Intelligente Tagesprognose (10 Uhr)"
    id: "zendure_info_smart_forecast"
    description: >-
      Berechnet, ob und wann der Akku voll wird, und gibt passgenaue
      Verbrauchs-Empfehlungen.
    mode: single
    triggers:
      - trigger: time
        at: "10:00:00"
    variables:
      total_capacity_wh: 3840
      target_soc: 95
      base_load_w: 180

      soc: "{{ states('sensor.solarflow_system_battery_level') | float(-1) }}"
      soc_valid: "{{ soc >= 0 }}"

      missing_wh: >
        {% if soc_valid %}
          {{ [(((target_soc - soc) / 100) * total_capacity_wh), 0] | max }}
        {% else %}
          0
        {% endif %}

      forecast_left_kwh: "{{ states('sensor.energy_production_today_remaining') | float(0) }}"
      forecast_left_wh: "{{ (forecast_left_kwh * 1000) | round(0) }}"

      now_ts: "{{ as_timestamp(now()) }}"
      sunset_ts: >-
        {{ as_timestamp(state_attr('sun.sun', 'next_setting'), default=now_ts + 8*3600) }}

      hours_to_sunset: "{{ [((sunset_ts - now_ts) / 3600), 0.1] | max }}"
      eff_sun_h: "{{ [hours_to_sunset * 0.7, 0.1] | max }}"

      avg_pv_power_w: "{{ (forecast_left_wh / eff_sun_h) | float(0) }}"
      net_avg_charge_w: "{{ [ (avg_pv_power_w - base_load_w), 0 ] | max }}"

      peak_ts: >-
        {{ as_timestamp(states('sensor.power_highest_peak_time_today'), default=now_ts + 4*3600) }}
      peak_ts_safe: "{{ [peak_ts, now_ts] | max }}"
      peak_time: "{{ peak_ts_safe | timestamp_custom('%H:%M') }}"

      hours_to_peak: "{{ [((peak_ts_safe - now_ts) / 3600), 0] | max }}"
      net_to_peak_wh: "{{ (net_avg_charge_w * hours_to_peak) | round(0) }}"

      full_before_peak: "{{ (missing_wh > 0) and (net_to_peak_wh >= missing_wh) }}"

      hours_to_full: >
        {% if net_avg_charge_w > 50 %}
          {{ missing_wh / net_avg_charge_w }}
        {% else %}
          99
        {% endif %}

      will_fill_today: >-
        {% if hours_to_full < 99 %}
          {{ forecast_left_wh > (missing_wh + (hours_to_full * base_load_w)) }}
        {% else %}
          false
        {% endif %}

      full_time: >
        {% if (hours_to_full | float(99)) < 8 %}
          {{ (now_ts + ((hours_to_full | float) * 3600)) | timestamp_custom('%H:%M') }}
        {% else %}
          später am Nachmittag
        {% endif %}

    conditions:
      - condition: template
        value_template: "{{ soc_valid and will_fill_today }}"
      - condition: numeric_state
        entity_id: sensor.solarflow_total_solar_input
        above: 50
      - condition: or
        conditions:
          - condition: state
            entity_id: person.britta
            state: "home"
          - condition: state
            entity_id: person.patrick
            state: "home"

    actions:
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ full_before_peak }}"
            sequence:
              - action: notify.send_message
                target:
                  entity_id: !secret telegram_id2
                data:
                  message: >
                    Der PV Speicher ({{ soc | round(0) }}%) wird heute um **{{ full_time }} Uhr** voll sein.
                    👉 **Großgeräte am besten um {{ full_time }} Uhr starten**.

                    (Leistungs Peak ist um ca. {{ peak_time }} Uhr.)
          - conditions:
              - condition: template
                value_template: "{{ not full_before_peak }}"
            sequence:
              - action: notify.send_message
                target:
                  entity_id: !secret telegram_id2
                data:
                  message: >
                    Die PV Energie reicht, um den Akku ({{ soc | round(0) }}%) heute bis {{ target_soc }}% zu laden.
                    👉 **Großgeräte am besten um {{ peak_time }} Uhr starten.**


# --- 6.12 TEMPERATURE WARNING ---
  - alias: "Zendure: Übertemperatur Warnung"
    id: "zendure_temp_warning"
    mode: parallel
    triggers:
      - trigger: numeric_state
        entity_id: sensor.solarflow_1_temp
        above: 45
        for: "00:05:00"
        id: "hub1"
      - trigger: numeric_state
        entity_id: sensor.solarflow_2_temp
        above: 45
        for: "00:05:00"
        id: "hub2"
    actions:
      - action: notify.send_message
        target:
          entity_id: !secret telegram_id1
        data:
          message: >
            🔥 *Zendure Temperatur-Warnung!*

            {% if trigger.id == 'hub1' %}
            Unit 1 wird extrem warm ({{ states('sensor.solarflow_1_temp') }} °C).
            {% elif trigger.id == 'hub2' %}
            Unit 2 wird extrem warm ({{ states('sensor.solarflow_2_temp') }} °C).
            {% endif %}

            Das System hat 45°C überschritten. Bitte prüfen, ob das Derating ab 48°C ausreichend greift oder ob die Belüftung verbessert werden muss.

# --- 6.13 AUTO-NOTSTROM (USV) ---
  - alias: "Zendure: Auto-Notstrom (UPS Ausfall)"
    id: "zendure_auto_notstrom_usv"
    description: "Aktiviert Zendure Off-Grid via direktem MQTT-Publish (Bypass HA-Availability)."
    mode: single
    triggers:
      - trigger: state
        entity_id: sensor.ups_status
      - trigger: time_pattern
        minutes: "/5"
      - trigger: homeassistant
        event: start
        id: "boot"
    actions:
      - if:
          - condition: template
            value_template: "{{ trigger.id == 'boot' }}"
        then:
          - wait_template: >
              {{ 'online' in states('sensor.ups_status')|lower or
                 'battery' in states('sensor.ups_status')|lower or
                 'ob' in states('sensor.ups_status')|lower or
                 'ol' in states('sensor.ups_status')|lower }}
            timeout: "00:00:30"
            continue_on_timeout: false

      - choose:
          # ==========================================
          # FALL 1: STROMAUSFALL (On Battery / OB)
          # ==========================================
          - conditions:
              - condition: template
                value_template: >
                  {% set ups = states('sensor.ups_status') | lower %}
                  {% set d1 = states(states('input_text.zendure_gridoffmode_entity_u1')) %}
                  {% set d2 = states(states('input_text.zendure_gridoffmode_entity_u2')) %}
                  {{ ('on battery' in ups or 'ob' in ups or 'discharging' in ups) and
                     (d1 == 'off' or d2 == 'off') }}
            sequence:
              - action: mqtt.publish
                data:
                  topic: !secret zendure_topic_u1_select_gridOffMode_set
                  payload: "Normal mode"
                  qos: 1
              - action: mqtt.publish
                data:
                  topic: !secret zendure_topic_u2_select_gridOffMode_set
                  payload: "Normal mode"
                  qos: 1
              - action: notify.send_message
                target:
                  entity_id: !secret telegram_id1
                data:
                  message: >
                    🚨 *ACHTUNG: STROMAUSFALL!*
                    Die USV meldet Netzverlust (On Battery).
                    🔌 Die Zendure Notstrom-Steckdosen wurden automatisch via MQTT **AKTIVIERT**.

          # ==========================================
          # FALL 2: STROM ZURÜCK (Online / OL)
          # ==========================================
          - conditions:
              - condition: template
                value_template: >
                  {% set ups = states('sensor.ups_status') | lower %}
                  {% set d1 = states(states('input_text.zendure_gridoffmode_entity_u1')) %}
                  {% set d2 = states(states('input_text.zendure_gridoffmode_entity_u2')) %}
                  {{ ('online' in ups or 'ol' in ups) and
                     (d1 == 'Normal mode' or d2 == 'Normal mode') }}
            sequence:
              - action: mqtt.publish
                data:
                  topic: !secret zendure_topic_u1_select_gridOffMode_set
                  payload: "OFF"
                  qos: 1
              - action: mqtt.publish
                data:
                  topic: !secret zendure_topic_u2_select_gridOffMode_set
                  payload: "OFF"
                  qos: 1
              - action: notify.send_message
                target:
                  entity_id: !secret telegram_id1
                data:
                  message: >
                    ✅ *STROM WIEDER DA!*
                    Die USV meldet Netzrückkehr (Online).
                    🔌 Die Zendure Notstrom-Steckdosen wurden via MQTT **DEAKTIVIERT**.

# --- 6.14 AC MODE RECONCILE WATCHDOG ---
  - alias: "Zendure: AC Mode Reconcile Watchdog"
    id: "zendure_ac_mode_reconcile_watchdog"
    mode: parallel
    initial_state: true
    triggers:
      - trigger: time_pattern
        minutes: "/5"
    conditions:
      - condition: state
        entity_id: input_boolean.zendure_auto_mode
        state: "on"
    actions:
      - parallel:
          - if:
              - condition: template
                value_template: >
                  {% set ac1 = states.sensor.solarflow_1_ac_mode %}
                  {% set soc1 = states('sensor.solarflow_1_battery_level')|float(100) %}
                  {% set gin1 = states('sensor.solarflow_1_grid_input_power')|float(0) %}
                  {{ states('sensor.solarflow_1_status_raw')|upper not in ['UNAVAILABLE', 'UNKNOWN', 'FAULT', 'ERROR']
                     and ac1 is not none
                     and ac1.state == 'Input mode'
                     and states('input_text.zendure_ac_mode_u1') == 'Output mode'
                     and is_state('input_boolean.zendure_calib_mode_u1','off')
                     and is_state('input_boolean.zendure_emergency_u1','off')
                     and (soc1 <= 10 or gin1 > 50) }}
            then:
              - action: input_text.set_value
                target: { entity_id: input_text.zendure_ac_mode_u1 }
                data: { value: "Input mode" }
              - action: notify.send_message
                target:
                  entity_id: !secret telegram_id1
                data:
                  message: >
                    ℹ️ *AC-Reconcile U1 übersprungen (Schutzladung erkannt)*\n
                    Gerät blieb in Input mode (SoC/Grid-Ladung-Schutz aktiv). Helper wurde auf Input mode nachgezogen.
          - if:
              - condition: template
                value_template: >
                  {% set ac1 = states.sensor.solarflow_1_ac_mode %}
                  {% set soc1 = states('sensor.solarflow_1_battery_level')|float(100) %}
                  {% set gin1 = states('sensor.solarflow_1_grid_input_power')|float(0) %}
                  {% set protect_charge = ac1 is not none and ac1.state == 'Input mode'
                     and is_state('input_text.zendure_ac_mode_u1','Output mode')
                     and is_state('input_boolean.zendure_calib_mode_u1','off')
                     and is_state('input_boolean.zendure_emergency_u1','off')
                     and (soc1 <= 10 or gin1 > 50) %}
                  {{ states('sensor.solarflow_1_status_raw')|upper not in ['UNAVAILABLE', 'UNKNOWN', 'FAULT', 'ERROR']
                     and ac1 is not none
                     and ac1.state in ['Input mode', 'Output mode']
                     and states('input_text.zendure_ac_mode_u1') in ['Input mode', 'Output mode']
                     and ac1.state != states('input_text.zendure_ac_mode_u1')
                     and not protect_charge }}
            then:
              - variables:
                  ac1_is: "{{ states('sensor.solarflow_1_ac_mode') }}"
                  ac1_should: "{{ states('input_text.zendure_ac_mode_u1') }}"
              - action: script.zendure_dispatch_u1_ac_mode
                data:
                  mode: "{{ ac1_should }}"
                  force: true
              - action: notify.send_message
                target:
                  entity_id: !secret telegram_id1
                data:
                  message: >
                    ⚠️ *AC-Mode war falsch (U1) – Re-Sync ausgeführt*\n
                    Ist (vor Re-Sync): {{ ac1_is }}\n
                    Soll (vor Re-Sync): {{ ac1_should }}\n
                    Der Fehler wurde erkannt und via MQTT korrigiert.
          - if:
              - condition: template
                value_template: >
                  {% set ac2 = states.sensor.solarflow_2_ac_mode %}
                  {% set soc2 = states('sensor.solarflow_2_battery_level')|float(100) %}
                  {% set gin2 = states('sensor.solarflow_2_grid_input_power')|float(0) %}
                  {{ states('sensor.solarflow_2_status_raw')|upper not in ['UNAVAILABLE', 'UNKNOWN', 'FAULT', 'ERROR']
                     and ac2 is not none
                     and ac2.state == 'Input mode'
                     and states('input_text.zendure_ac_mode_u2') == 'Output mode'
                     and is_state('input_boolean.zendure_calib_mode_u2','off')
                     and is_state('input_boolean.zendure_emergency_u2','off')
                     and (soc2 <= 10 or gin2 > 50) }}
            then:
              - action: input_text.set_value
                target: { entity_id: input_text.zendure_ac_mode_u2 }
                data: { value: "Input mode" }
              - action: notify.send_message
                target:
                  entity_id: !secret telegram_id1
                data:
                  message: >
                    ℹ️ *AC-Reconcile U2 übersprungen (Schutzladung erkannt)*\n
                    Gerät blieb in Input mode (SoC/Grid-Ladung-Schutz aktiv). Helper wurde auf Input mode nachgezogen.
          - if:
              - condition: template
                value_template: >
                  {% set ac2 = states.sensor.solarflow_2_ac_mode %}
                  {% set soc2 = states('sensor.solarflow_2_battery_level')|float(100) %}
                  {% set gin2 = states('sensor.solarflow_2_grid_input_power')|float(0) %}
                  {% set protect_charge = ac2 is not none and ac2.state == 'Input mode'
                     and is_state('input_text.zendure_ac_mode_u2','Output mode')
                     and is_state('input_boolean.zendure_calib_mode_u2','off')
                     and is_state('input_boolean.zendure_emergency_u2','off')
                     and (soc2 <= 10 or gin2 > 50) %}
                  {{ states('sensor.solarflow_2_status_raw')|upper not in ['UNAVAILABLE', 'UNKNOWN', 'FAULT', 'ERROR']
                     and ac2 is not none
                     and ac2.state in ['Input mode', 'Output mode']
                     and states('input_text.zendure_ac_mode_u2') in ['Input mode', 'Output mode']
                     and ac2.state != states('input_text.zendure_ac_mode_u2')
                     and not protect_charge }}
            then:
              - variables:
                  ac2_is: "{{ states('sensor.solarflow_2_ac_mode') }}"
                  ac2_should: "{{ states('input_text.zendure_ac_mode_u2') }}"
              - action: script.zendure_dispatch_u2_ac_mode
                data:
                  mode: "{{ ac2_should }}"
                  force: true
              - action: notify.send_message
                target:
                  entity_id: !secret telegram_id1
                data:
                  message: >
                    ⚠️ *AC-Mode war falsch (U2) – Re-Sync ausgeführt*\n
                    Ist (vor Re-Sync): {{ ac2_is }}\n
                    Soll (vor Re-Sync): {{ ac2_should }}\n
                    Der Fehler wurde erkannt und via MQTT korrigiert.
