                          force: true
                      - action: script.zendure_set_u2_outputlimit_zero
                      - action: script.zendure_dispatch_u2_inputlimit
                        data:
                          power: "{{ limit_calib_u2 }}"
                  - action: input_number.set_value
                    target: { entity_id: input_number.zendure_last_sent_2 }
