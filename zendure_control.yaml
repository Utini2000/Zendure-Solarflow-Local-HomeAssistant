################################################################################
#                   ZENDURE SOLARFLOW CONTROL PACKAGE (V133)                    #
################################################################################
#
# DESCRIPTION:
# Advanced local control for Zendure SolarFlow with Shelly 3EM.
# Features strict validation, safe math, and separate state/loop logic.
#
# REQUIREMENTS:
# - Zendure Hyper 2000 / SolarFlow 800 Pro (HTTP API enabled)
# - Shelly Pro 3EM (Grid measurement)
# - Integration "Forecast.Solar"
#
# STRATEGY (Managed by Logic Manager):
# - WINTER: Stop 20% | Emerg Start 10% -> Charge to 15% (300W Soft)
# - SUMMER: Stop 10% | Emerg Start 7%  -> Charge to 10% (300W Soft)
# - ALWAYS: Hardware Limit (minSoc) fixed at 5% (Panic Line).
# - ALWAYS: Soft Start (<12% SoC) limits Power to 300W.
# - SAFETY: Heat Protection Bypass starts at 45°C (was 55°C).
#
# NETWORK STABILITY:
# - Polling: 15s | Timeout: 30s | No forced updates (Anti-DDoS).

# Complete Changelog:
# https://github.com/Utini2000/Zendure-Solarflow-Local-HomeAssistant/blob/main/Changelog



# ==============================================================================
# 1. KONFIGURATION (Input Helpers)
# ==============================================================================
input_boolean:
  zendure_auto_mode:
    name: "Zendure Automatik Aktiv"
    icon: mdi:robot

  # Getrennte Helfer für Selective Emergency
  zendure_emergency_u1:
    name: "Intern: Status Not-Ladung U1"
    icon: mdi:battery-alert
    initial: off
  zendure_emergency_u2:
    name: "Intern: Status Not-Ladung U2"
    icon: mdi:battery-alert
    initial: off

  zendure_calib_mode_u1:
    name: "Status: Kalibrierung U1"
    icon: mdi:battery-sync
  zendure_calib_mode_u2:
    name: "Status: Kalibrierung U2"
    icon: mdi:battery-sync
  zendure_force_calib_u1:
    name: "Intern: Force Kalibrierung U1"
    icon: mdi:calendar-refresh
  zendure_force_calib_u2:
    name: "Intern: Force Kalibrierung U2"
    icon: mdi:calendar-refresh

  zendure_vguard_u1:
    name: "Status: Voltage Guard U1"
    icon: mdi:battery-heart-variant
  zendure_vguard_u2:
    name: "Status: Voltage Guard U2"
    icon: mdi:battery-heart-variant

  zendure_bypass_u1:
    name: "Intern: Bypass Latch U1"
    icon: mdi:lock-clock
    initial: off
  zendure_bypass_u2:
    name: "Intern: Bypass Latch U2"
    icon: mdi:lock-clock
    initial: off
  zendure_conf_calib_isolation:
    name: "Kalibrierung: Andere Unit pausieren"
    icon: mdi:transmission-tower-off
    initial: off

input_text:
  zendure_ac_mode_u1:
    name: "Intern: AC Mode U1"
  zendure_ac_mode_u2:
    name: "Intern: AC Mode U2"
  zendure_power_meter_total_consumption:
    name: "Zendure: Power Meter Entity"
    initial: !secret power_meter_total_consumption
  zendure_gridoffmode_entity_u1:
    name: "Zendure: GridOffMode Entity U1"
    initial: !secret zendure_gridoffmode_entity_u1
  zendure_gridoffmode_entity_u2:
    name: "Zendure: GridOffMode Entity U2"
    initial: !secret zendure_gridoffmode_entity_u2

input_datetime:
  zendure_last_full_charge_1:
    name: "Unit 1: Letzte 100%"
    has_date: true
    has_time: true
  zendure_last_full_charge_2:
    name: "Unit 2: Letzte 100%"
    has_date: true
    has_time: true
  zendure_soc_drift_ref_ts_u1:
    name: "Intern: SoC-Drift Referenzzeit U1"
    has_date: true
    has_time: true
  zendure_soc_drift_ref_ts_u2:
    name: "Intern: SoC-Drift Referenzzeit U2"
    has_date: true
    has_time: true
  zendure_v132_zero_next:
    name: "Intern v132: Zero Next"
    has_date: true
    has_time: true
  zendure_v132_zero_fast_until:
    name: "Intern v132: Zero Fast Until"
    has_date: true
    has_time: true
input_number:
  zendure_last_sent_1:
    name: "System: Letzter Wert Unit 1"
    min: 0
    max: 800
    step: 1
    mode: box
    initial: 0
  zendure_last_sent_2:
    name: "System: Letzter Wert Unit 2"
    min: 0
    max: 800
    step: 1
    mode: box
    initial: 0
  zendure_target_total:
    name: "Zendure: Fast-Target Gesamt"
    min: 0
    max: 1600
    step: 1
    mode: box
    initial: 0
    unit_of_measurement: "W"
  zendure_soc_drift_ref_u1:
    name: "Intern: SoC-Drift Referenz U1"
    min: 0
    max: 100
    step: 1
    mode: box
    initial: 0
  zendure_soc_drift_ref_u2:
    name: "Intern: SoC-Drift Referenz U2"
    min: 0
    max: 100
    step: 1
    mode: box
    initial: 0
  zendure_conf_max_output:
    name: "Zendure: Max. Einspeisung (Gesamt)"
    min: 0
    max: 1200
    step: 10
    initial: 1200
    unit_of_measurement: "W"
    mode: box
  zendure_conf_failsafe_watt:
    name: "Zendure: Failsafe Grundlast"
    min: 0
    max: 800
    step: 10
    initial: 130
    unit_of_measurement: "W"

  zendure_conf_grid_bias:
    name: "Zendure: Netz-Puffer (Bias)"
    min: -100
    max: 100
    step: 1
    initial: 10
