################################################################################
#                   ZENDURE SOLARFLOW CONTROL PACKAGE (V73)                    #
#             EDITION: THE HEARTBEAT (FORCE UPDATE & TRUE FRESHNESS)           #
################################################################################
#
# DESCRIPTION:
# Advanced local control for Zendure SolarFlow with Shelly 3EM.
# Features strict validation, safe math, and separate state/loop logic.
#
# REQUIREMENTS:
# - Zendure Hyper 2000 / SolarFlow 800 Pro (HTTP API enabled)
# - Shelly Pro 3EM (Grid measurement)
# - Integration "Forecast.Solar"
#
# STRATEGY (Managed by Logic Manager):
# - WINTER: Stop 20% | Emerg Start 10% -> Charge to 15% (300W Soft)
# - SUMMER: Stop 10% | Emerg Start 7%  -> Charge to 10% (300W Soft)
# - ALWAYS: Hardware Limit (minSoc) fixed at 5% (Panic Line).
# - ALWAYS: Soft Start (<12% SoC) limits Power to 300W.
# - SAFETY: Heat Protection Bypass starts at 45°C (was 55°C).
#
# NETWORK STABILITY:
# - Polling: 15s | Timeout: 30s | No forced updates (Anti-DDoS).

# Complete Changelog:
# https://github.com/Utini2000/Zendure-Solarflow-Local-HomeAssistant/blob/main/Changelog

# ==============================================================================
# 1. KONFIGURATION (Input Helpers)
# ==============================================================================
input_boolean:
  zendure_auto_mode:
    name: "Zendure Automatik Aktiv"
    icon: mdi:robot

  # Getrennte Helfer für Selective Emergency
  zendure_emergency_u1:
    name: "Status: Not-Ladung U1"
    icon: mdi:battery-alert
  zendure_emergency_u2:
    name: "Status: Not-Ladung U2"
    icon: mdi:battery-alert

  zendure_calib_mode_u1:
    name: "Status: Kalibrierung U1"
    icon: mdi:battery-sync
  zendure_calib_mode_u2:
    name: "Status: Kalibrierung U2"
    icon: mdi:battery-sync

  zendure_bypass_u1:
    name: "Intern: Bypass Latch U1"
    icon: mdi:lock-clock
  zendure_bypass_u2:
    name: "Intern: Bypass Latch U2"
    icon: mdi:lock-clock

input_text:
  zendure_ac_mode_u1:
    name: "Intern: AC Mode U1"
    initial: "Output mode"
  zendure_ac_mode_u2:
    name: "Intern: AC Mode U2"
    initial: "Output mode"

input_datetime:
  zendure_last_full_charge_1:
    name: "Unit 1: Letzte 100%"
    has_date: true
    has_time: true
  zendure_last_full_charge_2:
    name: "Unit 2: Letzte 100%"
    has_date: true
    has_time: true

input_number:
  zendure_last_sent_1:
    name: "System: Letzter Wert Unit 1"
    min: -2
    max: 800
    step: 1
    mode: box
  zendure_last_sent_2:
    name: "System: Letzter Wert Unit 2"
    min: -2
    max: 800
    step: 1
    mode: box
  zendure_conf_max_output:
    name: "Zendure: Max. Einspeisung (Gesamt)"
    min: 0
    max: 800
    step: 10
    initial: 800
    unit_of_measurement: "W"
    mode: box
  zendure_conf_failsafe_watt:
    name: "Zendure: Failsafe Grundlast"
    min: 0
    max: 800
    step: 10
    initial: 130
    unit_of_measurement: "W"

  zendure_conf_grid_bias:
    name: "Zendure: Netz-Puffer (Bias)"
    min: -100
    max: 100
    step: 1
    initial: 10
    unit_of_measurement: "W"

  zendure_conf_min_change:
    name: "Zendure: Min. Änderungsschritt"
    min: 1
    max: 50
    step: 1
    initial: 5
    unit_of_measurement: "W"

  zendure_conf_hysteresis:
    name: "Zendure: Regel-Hysterese (Deadband)"
    min: 0
    max: 50
    step: 1
    initial: 10
    unit_of_measurement: "W"

  zendure_conf_soc_off:
    name: "SoC Limit: Batterie-Schutz (PV only)"
    min: 0
    max: 30
    step: 1
    initial: 20
    unit_of_measurement: "%"
  zendure_conf_soc_bypass:
    name: "SoC Limit: Schonmodus (Start)"
    min: 10
    max: 90
    step: 1
    initial: 25
    unit_of_measurement: "%"
  zendure_conf_soc_emerg_start:
    name: "SoC Limit: Start Not-Ladung"
    min: 0
    max: 50
    step: 1
    initial: 15
    unit_of_measurement: "%"
  zendure_conf_soc_emerg_stop:
    name: "SoC Limit: Stopp Not-Ladung"
    min: 0
    max: 90
    step: 1
    initial: 25
    unit_of_measurement: "%"
  zendure_conf_calib_days:
    name: "Kalibrierung: Intervall"
    min: 1
    max: 60
    step: 1
    initial: 14
    unit_of_measurement: "Tage"

# ==============================================================================
# 2. MQTT SENSOREN
# ==============================================================================
mqtt:
  sensor:
    # --- UNIT 1 ---
    - name: "SolarFlow 1 Solar Input Total"
      unique_id: solarflow_1_solar_input_mqtt
      default_entity_id: sensor.solarflow_1_solar_input
      state_topic: "Zendure/sensor/HUB1_SERIAL_NUMBER/solarInputPower"
      unit_of_measurement: "W"
      device_class: power
      state_class: measurement

    - name: "SolarFlow 1 Grid Input Power"
      unique_id: solarflow_1_grid_input_mqtt
      default_entity_id: sensor.solarflow_1_grid_input_power
      state_topic: "Zendure/sensor/HUB1_SERIAL_NUMBER/gridInputPower"
      unit_of_measurement: "W"
      device_class: power
      state_class: measurement

    - name: "SolarFlow 1 Battery Level Hub"
      unique_id: solarflow_1_battery_level_mqtt
      default_entity_id: sensor.solarflow_1_battery_level_hub
      state_topic: "Zendure/sensor/HUB1_SERIAL_NUMBER/electricLevel"
      unit_of_measurement: "%"
      device_class: battery
      state_class: measurement

    - name: "SolarFlow 1 Output Power"
      unique_id: solarflow_1_output_power_mqtt
      default_entity_id: sensor.solarflow_1_output_power
      state_topic: "Zendure/sensor/HUB1_SERIAL_NUMBER/outputHomePower"
      unit_of_measurement: "W"
      device_class: power
      state_class: measurement

    - name: "SolarFlow 1 Output Limit"
      unique_id: solarflow_1_output_limit_mqtt
      default_entity_id: sensor.solarflow_1_output_limit
      state_topic: "Zendure/number/HUB1_SERIAL_NUMBER/outputLimit"
      unit_of_measurement: "W"
      device_class: power
      entity_category: diagnostic

    - name: "SolarFlow 1 AC Mode"
      unique_id: solarflow_1_ac_mode_mqtt
      default_entity_id: sensor.solarflow_1_ac_mode
      state_topic: "Zendure/select/HUB1_SERIAL_NUMBER/acMode"
      entity_category: diagnostic

    - name: "SolarFlow 1 Setting MinSoC"
      unique_id: solarflow_1_setting_minsoc
      default_entity_id: sensor.solarflow_1_setting_minsoc
      state_topic: "Zendure/number/HUB1_SERIAL_NUMBER/minSoc"
      unit_of_measurement: "%"
      entity_category: diagnostic

    - name: "SolarFlow 1 Setting ChargeLimit"
      unique_id: solarflow_1_setting_chargelimit
      default_entity_id: sensor.solarflow_1_setting_chargelimit
      state_topic: "Zendure/number/HUB1_SERIAL_NUMBER/chargeMaxLimit"
      unit_of_measurement: "W"
      entity_category: diagnostic

    - name: "SolarFlow 1 Temp"
      unique_id: solarflow_1_temp_mqtt
      default_entity_id: sensor.solarflow_1_temp
      state_topic: "Zendure/sensor/HUB1_SERIAL_NUMBER/hyperTmp"
      unit_of_measurement: "°C"
      device_class: temperature
      state_class: measurement
      value_template: >
        {% set v = value | float(none) %}
        {% if v is none %} {{ 'unavailable' }}
        {% elif v > 1000 %} {{ ((v - 2731) / 10) | round(1) }}
        {% else %} {{ v }} {% endif %}

    - name: "SolarFlow 1 Heizung"
      unique_id: solarflow_1_heat_state
      default_entity_id: sensor.solarflow_1_heizung
      state_topic: "Zendure/sensor/HUB1_SERIAL_NUMBER/heatState"
      icon: mdi:radiator
      value_template: >
        {% if value == 'not_heating' %} Inaktiv
        {% else %} Aktiv {% endif %}

    - name: "SolarFlow 1 Bypass Status"
      unique_id: solarflow_1_pass_state
      state_topic: "Zendure/sensor/HUB1_SERIAL_NUMBER/pass"
      icon: mdi:arrow-split-vertical
      value_template: >
        {% if value == 'yes' %} Aktiv
        {% else %} Inaktiv {% endif %}

    - name: "SolarFlow 1 BMS Leistung"
      unique_id: solarflow_1_bms_power
      state_topic: "Zendure/sensor/BAT1_SERIAL_NUMBER/BAT1_SERIAL_NUMBER_power"
      unit_of_measurement: "W"
      device_class: power
      state_class: measurement

    - name: "SolarFlow 1 Battery Max Temp"
      unique_id: solarflow_1_batt_max_temp
      default_entity_id: sensor.solarflow_1_batt_max_temp
      state_topic: "Zendure/sensor/BAT1_SERIAL_NUMBER/BAT1_SERIAL_NUMBER_maxTemp"
      unit_of_measurement: "°C"
      device_class: temperature
      state_class: measurement
      value_template: >
        {% set v = value | float(none) %}
        {% if v is none %} {{ 'unavailable' }}
        {% elif v > 1000 %} {{ ((v - 2731) / 10) | round(1) }}
        {% else %} {{ v }} {% endif %}

    - name: "SolarFlow 1 Cell Max Vol"
      unique_id: solarflow_1_cell_max_vol
      default_entity_id: sensor.solarflow_1_cell_max_vol
      state_topic: "Zendure/sensor/BAT1_SERIAL_NUMBER/BAT1_SERIAL_NUMBER_maxVol"
      unit_of_measurement: "V"
      device_class: voltage
      state_class: measurement
      value_template: >
        {% set v = value | float(none) %}
        {% if v is none %} {{ 'unavailable' }}
        {% elif v > 2000 %} {{ (v / 1000) | round(3) }}
        {% elif v > 20 %} {{ (v / 100) | round(3) }}
        {% else %} {{ v | round(3) }}
        {% endif %}

    - name: "SolarFlow 1 Cell Min Vol"
      unique_id: solarflow_1_cell_min_vol
      default_entity_id: sensor.solarflow_1_cell_min_vol
      state_topic: "Zendure/sensor/BAT1_SERIAL_NUMBER/BAT1_SERIAL_NUMBER_minVol"
      unit_of_measurement: "V"
      device_class: voltage
      state_class: measurement
      value_template: >
        {% set v = value | float(none) %}
        {% if v is none %} {{ 'unavailable' }}
        {% elif v > 2000 %} {{ (v / 1000) | round(3) }}
        {% elif v > 20 %} {{ (v / 100) | round(3) }}
        {% else %} {{ v | round(3) }}
        {% endif %}


    # --- UNIT 2 ---
    - name: "SolarFlow 2 Solar Input Total"
      unique_id: solarflow_2_solar_input_mqtt
      default_entity_id: sensor.solarflow_2_solar_input
      state_topic: "Zendure/sensor/HUB2_SERIAL_NUMBER/solarInputPower"
      unit_of_measurement: "W"
      device_class: power
      state_class: measurement

    - name: "SolarFlow 2 Grid Input Power"
      unique_id: solarflow_2_grid_input_mqtt
      default_entity_id: sensor.solarflow_2_grid_input_power
      state_topic: "Zendure/sensor/HUB2_SERIAL_NUMBER/gridInputPower"
      unit_of_measurement: "W"
      device_class: power
      state_class: measurement

    - name: "SolarFlow 2 Battery Level Hub"
      unique_id: solarflow_2_battery_level_mqtt
      default_entity_id: sensor.solarflow_2_battery_level_hub
      state_topic: "Zendure/sensor/HUB2_SERIAL_NUMBER/electricLevel"
      unit_of_measurement: "%"
      device_class: battery
      state_class: measurement

    - name: "SolarFlow 2 Output Power"
      unique_id: solarflow_2_output_power_mqtt
      default_entity_id: sensor.solarflow_2_output_power
      state_topic: "Zendure/sensor/HUB2_SERIAL_NUMBER/outputHomePower"
      unit_of_measurement: "W"
      device_class: power
      state_class: measurement

    - name: "SolarFlow 2 Output Limit"
      unique_id: solarflow_2_output_limit_mqtt
      default_entity_id: sensor.solarflow_2_output_limit
      state_topic: "Zendure/number/HUB2_SERIAL_NUMBER/outputLimit"
      unit_of_measurement: "W"
      device_class: power
      entity_category: diagnostic

    - name: "SolarFlow 2 AC Mode"
      unique_id: solarflow_2_ac_mode_mqtt
      default_entity_id: sensor.solarflow_2_ac_mode
      state_topic: "Zendure/select/HUB2_SERIAL_NUMBER/acMode"
      entity_category: diagnostic

    - name: "SolarFlow 2 Setting MinSoC"
      unique_id: solarflow_2_setting_minsoc
      default_entity_id: sensor.solarflow_2_setting_minsoc
      state_topic: "Zendure/number/HUB2_SERIAL_NUMBER/minSoc"
      unit_of_measurement: "%"
      entity_category: diagnostic

    - name: "SolarFlow 2 Setting ChargeLimit"
      unique_id: solarflow_2_setting_chargelimit
      default_entity_id: sensor.solarflow_2_setting_chargelimit
      state_topic: "Zendure/number/HUB2_SERIAL_NUMBER/chargeMaxLimit"
      unit_of_measurement: "W"
      entity_category: diagnostic

    - name: "SolarFlow 2 Temp"
      unique_id: solarflow_2_temp_mqtt
      default_entity_id: sensor.solarflow_2_temp
      state_topic: "Zendure/sensor/HUB2_SERIAL_NUMBER/hyperTmp"
      unit_of_measurement: "°C"
      device_class: temperature
      state_class: measurement
      value_template: >
        {% set v = value | float(none) %}
        {% if v is none %} {{ 'unavailable' }}
        {% elif v > 1000 %} {{ ((v - 2731) / 10) | round(1) }}
        {% else %} {{ v }} {% endif %}

    - name: "SolarFlow 2 Heizung"
      unique_id: solarflow_2_heat_state
      default_entity_id: sensor.solarflow_2_heizung
      state_topic: "Zendure/sensor/HUB2_SERIAL_NUMBER/heatState"
      icon: mdi:radiator
      value_template: >
        {% if value == 'not_heating' %} Inaktiv
        {% else %} Aktiv {% endif %}

    - name: "SolarFlow 2 Bypass Status"
      unique_id: solarflow_2_pass_state
      state_topic: "Zendure/sensor/HUB2_SERIAL_NUMBER/pass"
      icon: mdi:arrow-split-vertical
      value_template: >
        {% if value == 'yes' %} Aktiv
        {% else %} Inaktiv {% endif %}

    - name: "SolarFlow 2 BMS Leistung"
      unique_id: solarflow_2_bms_power
      state_topic: "Zendure/sensor/BAT2_SERIAL_NUMBER/BAT2_SERIAL_NUMBER_power"
      unit_of_measurement: "W"
      device_class: power
      state_class: measurement

    - name: "SolarFlow 2 Battery Max Temp"
      unique_id: solarflow_2_batt_max_temp
      default_entity_id: sensor.solarflow_2_batt_max_temp
      state_topic: "Zendure/sensor/BAT2_SERIAL_NUMBER/BAT2_SERIAL_NUMBER_maxTemp"
      unit_of_measurement: "°C"
      device_class: temperature
      state_class: measurement
      value_template: >
        {% set v = value | float(none) %}
        {% if v is none %} {{ 'unavailable' }}
        {% elif v > 1000 %} {{ ((v - 2731) / 10) | round(1) }}
        {% else %} {{ v }} {% endif %}

    - name: "SolarFlow 2 Cell Max Vol"
      unique_id: solarflow_2_cell_max_vol
      default_entity_id: sensor.solarflow_2_cell_max_vol
      state_topic: "Zendure/sensor/BAT2_SERIAL_NUMBER/BAT2_SERIAL_NUMBER_maxVol"
      unit_of_measurement: "V"
      device_class: voltage
      state_class: measurement
      value_template: >
        {% set v = value | float(none) %}
        {% if v is none %} {{ 'unavailable' }}
        {% elif v > 2000 %} {{ (v / 1000) | round(3) }}
        {% elif v > 20 %} {{ (v / 100) | round(3) }}
        {% else %} {{ v | round(3) }}
        {% endif %}

    - name: "SolarFlow 2 Cell Min Vol"
      unique_id: solarflow_2_cell_min_vol
      default_entity_id: sensor.solarflow_2_cell_min_vol
      state_topic: "Zendure/sensor/BAT2_SERIAL_NUMBER/BAT2_SERIAL_NUMBER_minVol"
      unit_of_measurement: "V"
      device_class: voltage
      state_class: measurement
      value_template: >
        {% set v = value | float(none) %}
        {% if v is none %} {{ 'unavailable' }}
        {% elif v > 2000 %} {{ (v / 1000) | round(3) }}
        {% elif v > 20 %} {{ (v / 100) | round(3) }}
        {% else %} {{ v | round(3) }}
        {% endif %}

    # --- WATCHDOGS (120s Expiry) ---
    - name: "SolarFlow 1 Status Raw"
      unique_id: solarflow_1_status_mqtt
      default_entity_id: sensor.solarflow_1_status_raw
      state_topic: "Zendure/sensor/HUB1_SERIAL_NUMBER/packState"
      value_template: "{{ value }}"
      force_update: true
      expire_after: 120

    - name: "SolarFlow 2 Status Raw"
      unique_id: solarflow_2_status_mqtt
      default_entity_id: sensor.solarflow_2_status_raw
      state_topic: "Zendure/sensor/HUB2_SERIAL_NUMBER/packState"
      value_template: "{{ value }}"
      force_update: true
      expire_after: 120

    # --- UNIT 1 OFF-GRID LEISTUNG ---
    - name: "SolarFlow 1 Off-Grid Leistung"
      unique_id: solarflow_1_offgrid_power
      default_entity_id: sensor.solarflow_1_offgrid_power
      state_topic: "Zendure/sensor/HUB1_SERIAL_NUMBER/gridOffPower"
      unit_of_measurement: "W"
      device_class: power
      state_class: measurement

    # --- UNIT 2 OFF-GRID LEISTUNG ---
    - name: "SolarFlow 2 Off-Grid Leistung"
      unique_id: solarflow_2_offgrid_power
      default_entity_id: sensor.solarflow_2_offgrid_power
      state_topic: "Zendure/sensor/HUB2_SERIAL_NUMBER/gridOffPower"
      unit_of_measurement: "W"
      device_class: power
      state_class: measurement


# ==============================================================================
# 3. HELPER SENSOREN (MIT PLAUSIBILITÄTS- UND FRESHNESS-FILTER)
# ==============================================================================
template:
  - sensor:
      - name: "SolarFlow 1 Battery Level"
        unique_id: solarflow_1_battery_level
        default_entity_id: sensor.solarflow_1_battery_level
        device_class: battery
        state_class: measurement
        unit_of_measurement: "%"
        availability: >
          {% set s = states.sensor.solarflow_1_status_raw %}
          {% set fresh = s is not none and s.state|upper not in ['UNAVAILABLE', 'UNKNOWN', 'FAULT', 'ERROR'] and (as_timestamp(now()) - as_timestamp(s.last_reported, 0)) < 120 %}
          {% set vol = states('sensor.solarflow_1_cell_min_vol') | float(3.3) %}
          {% set temp = states('sensor.solarflow_1_batt_max_temp') | float(0) %}
          {{ fresh and is_number(states('sensor.solarflow_1_battery_level_hub')) and vol > 0 and temp < 80 }}
        state: >
          {{ states('sensor.solarflow_1_battery_level_hub') | int(0) }}

      - name: "SolarFlow 2 Battery Level"
        unique_id: solarflow_2_battery_level
        default_entity_id: sensor.solarflow_2_battery_level
        device_class: battery
        state_class: measurement
        unit_of_measurement: "%"
        availability: >
          {% set s = states.sensor.solarflow_2_status_raw %}
          {% set fresh = s is not none and s.state|upper not in ['UNAVAILABLE', 'UNKNOWN', 'FAULT', 'ERROR'] and (as_timestamp(now()) - as_timestamp(s.last_reported, 0)) < 120 %}
          {% set vol = states('sensor.solarflow_2_cell_min_vol') | float(3.3) %}
          {% set temp = states('sensor.solarflow_2_batt_max_temp') | float(0) %}
          {{ fresh and is_number(states('sensor.solarflow_2_battery_level_hub')) and vol > 0 and temp < 80 }}
        state: >
          {{ states('sensor.solarflow_2_battery_level_hub') | int(0) }}

      - name: "SolarFlow Total Solar Input"
        unique_id: solarflow_total_solar_input
        default_entity_id: sensor.solarflow_total_solar_input
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        state: >
          {% set s1 = states.sensor.solarflow_1_status_raw %}
          {% set s1_fresh = s1 is not none and s1.state|upper not in ['UNAVAILABLE', 'UNKNOWN', 'FAULT', 'ERROR'] and (as_timestamp(now()) - as_timestamp(s1.last_reported, 0)) < 120 %}
          {% set v1 = states('sensor.solarflow_1_solar_input')|float(0) if s1_fresh else 0 %}

          {% set s2 = states.sensor.solarflow_2_status_raw %}
          {% set s2_fresh = s2 is not none and s2.state|upper not in ['UNAVAILABLE', 'UNKNOWN', 'FAULT', 'ERROR'] and (as_timestamp(now()) - as_timestamp(s2.last_reported, 0)) < 120 %}
          {% set v2 = states('sensor.solarflow_2_solar_input')|float(0) if s2_fresh else 0 %}

          {{ (v1 + v2) | int }}

      - name: "SolarFlow Total Grid Input"
        unique_id: solarflow_total_grid_input
        default_entity_id: sensor.solarflow_total_grid_input
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        state: >
          {% set s1 = states.sensor.solarflow_1_status_raw %}
          {% set s1_fresh = s1 is not none and s1.state|upper not in ['UNAVAILABLE', 'UNKNOWN', 'FAULT', 'ERROR'] and (as_timestamp(now()) - as_timestamp(s1.last_reported, 0)) < 120 %}
          {% set v1 = states('sensor.solarflow_1_grid_input_power')|float(0) if s1_fresh else 0 %}

          {% set s2 = states.sensor.solarflow_2_status_raw %}
          {% set s2_fresh = s2 is not none and s2.state|upper not in ['UNAVAILABLE', 'UNKNOWN', 'FAULT', 'ERROR'] and (as_timestamp(now()) - as_timestamp(s2.last_reported, 0)) < 120 %}
          {% set v2 = states('sensor.solarflow_2_grid_input_power')|float(0) if s2_fresh else 0 %}

          {{ (v1 + v2) | int }}

      - name: "SolarFlow System Total Output"
        unique_id: solarflow_system_total_output
        default_entity_id: sensor.solarflow_system_total_output
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        state: >
          {% set s1 = states.sensor.solarflow_1_status_raw %}
          {% set s1_fresh = s1 is not none and s1.state|upper not in ['UNAVAILABLE', 'UNKNOWN', 'FAULT', 'ERROR'] and (as_timestamp(now()) - as_timestamp(s1.last_reported, 0)) < 120 %}
          {% set v1 = states('sensor.solarflow_1_output_power')|float(0) if s1_fresh else 0 %}

          {% set s2 = states.sensor.solarflow_2_status_raw %}
          {% set s2_fresh = s2 is not none and s2.state|upper not in ['UNAVAILABLE', 'UNKNOWN', 'FAULT', 'ERROR'] and (as_timestamp(now()) - as_timestamp(s2.last_reported, 0)) < 120 %}
          {% set v2 = states('sensor.solarflow_2_output_power')|float(0) if s2_fresh else 0 %}

          {{ (v1 + v2) | int }}

      - name: "SolarFlow System Battery Level"
        unique_id: solarflow_system_battery_level
        default_entity_id: sensor.solarflow_system_battery_level
        unit_of_measurement: "%"
        device_class: battery
        state_class: measurement
        availability: >
          {% set s1 = states('sensor.solarflow_1_battery_level') | float(-1) %}
          {% set s2 = states('sensor.solarflow_2_battery_level') | float(-1) %}
          {{ s1 >= 0 or s2 >= 0 }}
        state: >
          {% set s1 = states('sensor.solarflow_1_battery_level') | float(-1) %}
          {% set s2 = states('sensor.solarflow_2_battery_level') | float(-1) %}
          {% set ns = namespace(sum=0, count=0) %}
          {% if s1 >= 0 %}{% set ns.sum = ns.sum + s1 %}{% set ns.count = ns.count + 1 %}{% endif %}
          {% if s2 >= 0 %}{% set ns.sum = ns.sum + s2 %}{% set ns.count = ns.count + 1 %}{% endif %}
          {{ (ns.sum / ns.count) | round(0) if ns.count > 0 else 0 }}

      - name: "SolarFlow 1 Cell Imbalance"
        unique_id: solarflow_1_cell_imbalance
        default_entity_id: sensor.solarflow_1_cell_imbalance
        unit_of_measurement: "V"
        device_class: voltage
        state_class: measurement
        availability: >
          {% set s = states.sensor.solarflow_1_status_raw %}
          {% set fresh = s is not none and s.state|upper not in ['UNAVAILABLE', 'UNKNOWN', 'FAULT', 'ERROR'] and (as_timestamp(now()) - as_timestamp(s.last_reported, 0)) < 120 %}
          {{ fresh and is_number(states('sensor.solarflow_1_cell_min_vol')) and is_number(states('sensor.solarflow_1_cell_max_vol')) }}
        state: >
          {% set min_v = states('sensor.solarflow_1_cell_min_vol') | float(0) %}
          {% set max_v = states('sensor.solarflow_1_cell_max_vol') | float(0) %}
          {{ [ (max_v - min_v) | round(3), 0 ] | max }}

      - name: "SolarFlow 2 Cell Imbalance"
        unique_id: solarflow_2_cell_imbalance
        default_entity_id: sensor.solarflow_2_cell_imbalance
        unit_of_measurement: "V"
        device_class: voltage
        state_class: measurement
        availability: >
          {% set s = states.sensor.solarflow_2_status_raw %}
          {% set fresh = s is not none and s.state|upper not in ['UNAVAILABLE', 'UNKNOWN', 'FAULT', 'ERROR'] and (as_timestamp(now()) - as_timestamp(s.last_reported, 0)) < 120 %}
          {{ fresh and is_number(states('sensor.solarflow_2_cell_min_vol')) and is_number(states('sensor.solarflow_2_cell_max_vol')) }}
        state: >
          {% set min_v = states('sensor.solarflow_2_cell_min_vol') | float(0) %}
          {% set max_v = states('sensor.solarflow_2_cell_max_vol') | float(0) %}
          {{ [ (max_v - min_v) | round(3), 0 ] | max }}

      - name: "SolarFlow System Total Charge Power V24"
        unique_id: solarflow_system_total_charge_power_v24
        default_entity_id: sensor.solarflow_system_total_charge_power_v24
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        state: >
          {% set solar = states('sensor.solarflow_total_solar_input') | float(0) %}
          {% set grid_in = states('sensor.solarflow_total_grid_input') | float(0) %}
          {% set output = states('sensor.solarflow_system_total_output') | float(0) %}
          {% set total_in = solar + grid_in %}
          {% set diff = total_in - output %}
          {{ diff if diff > 0 else 0 }}

      - name: "SolarFlow System Total Discharge Power V24"
        unique_id: solarflow_system_total_discharge_power_v24
        default_entity_id: sensor.solarflow_system_total_discharge_power_v24
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        state: >
          {% set solar = states('sensor.solarflow_total_solar_input') | float(0) %}
          {% set grid_in = states('sensor.solarflow_total_grid_input') | float(0) %}
          {% set output = states('sensor.solarflow_system_total_output') | float(0) %}
          {% set total_in = solar + grid_in %}
          {% set diff = output - total_in %}
          {{ diff if diff > 0 else 0 }}

# ==============================================================================
# 4. ENERGY SENSORS (RIEMANN SUM)
# ==============================================================================
sensor:
  - platform: integration
    source: sensor.solarflow_total_solar_input
    name: "SolarFlow System Solar Yield Total"
    unit_prefix: k
    method: left
    max_sub_interval:
      minutes: 1

  - platform: integration
    source: sensor.solarflow_system_total_charge_power_v24
    name: "SolarFlow System Battery In Total V24"
    unit_prefix: k
    method: left
    max_sub_interval:
      minutes: 1

  - platform: integration
    source: sensor.solarflow_system_total_discharge_power_v24
    name: "SolarFlow System Battery Out Total V24"
    unit_prefix: k
    method: left
    max_sub_interval:
      minutes: 1

# ==============================================================================
# 5. AUTOMATISIERUNGEN
# ==============================================================================
automation:
  # --- 5.1 KILL SWITCH ---
  - alias: "Zendure: Safety Kill Switch (Auto-Mode OFF)"
    id: "zendure_safety_kill_switch"
    mode: restart
    triggers:
      - trigger: state
        entity_id: input_boolean.zendure_auto_mode
        to: "off"
        id: "off"
      - trigger: state
        entity_id: input_boolean.zendure_auto_mode
        to: "on"
        id: "on"
    actions:
      - if:
          - condition: template
            value_template: "{{ trigger.id == 'on' }}"
        then:
          - stop: "Auto-Mode switched ON. Kill-Switch cancelled."

      - action: input_boolean.turn_off
        target:
          entity_id:
            - input_boolean.zendure_emergency_u1
            - input_boolean.zendure_emergency_u2
            - input_boolean.zendure_calib_mode_u1
            - input_boolean.zendure_calib_mode_u2

      - repeat:
          count: 3
          sequence:
            - condition: state
              entity_id: input_boolean.zendure_auto_mode
              state: "off"

            - parallel:
                - sequence:
                    - action: input_text.set_value
                      target: { entity_id: input_text.zendure_ac_mode_u1 }
                      data: { value: "Output mode" }
                    - if:
                        - condition: template
                          value_template: "{{ states('sensor.solarflow_1_ac_mode') != 'Output mode' }}"
                      then:
                        - action: mqtt.publish
                          data: { topic: "Zendure/select/HUB1_SERIAL_NUMBER/acMode/set", payload: "Output mode", qos: 1 }
                        - delay: "00:00:00.500"
                        - action: mqtt.publish
                          data: { topic: "Zendure/select/HUB1_SERIAL_NUMBER/acMode/set", payload: "Output mode", qos: 1 }
                        - delay: "00:00:01"
                    - action: mqtt.publish
                      data: { topic: "Zendure/number/HUB1_SERIAL_NUMBER/outputLimit/set", payload: "0", qos: 1 }
                    - if:
                        - condition: template
                          value_template: >
                            {% set last = states('input_number.zendure_last_sent_1')|int(0) %}
                            {% set s = states.sensor.solarflow_1_status_raw %}
                            {% set online = s.state|upper not in ['UNAVAILABLE','UNKNOWN','FAULT','ERROR'] %}
                            {% set fresh = (as_timestamp(now()) - as_timestamp(s.last_reported, default=0)) < 120 %}
                            {{ online and fresh and last != 0 }}
                      then:
                        - action: input_number.set_value
                          target: { entity_id: input_number.zendure_last_sent_1 }
                          data: { value: 0 }

                - sequence:
                    - action: input_text.set_value
                      target: { entity_id: input_text.zendure_ac_mode_u2 }
                      data: { value: "Output mode" }
                    - if:
                        - condition: template
                          value_template: "{{ states('sensor.solarflow_2_ac_mode') != 'Output mode' }}"
                      then:
                        - action: mqtt.publish
                          data: { topic: "Zendure/select/HUB2_SERIAL_NUMBER/acMode/set", payload: "Output mode", qos: 1 }
                        - delay: "00:00:00.500"
                        - action: mqtt.publish
                          data: { topic: "Zendure/select/HUB2_SERIAL_NUMBER/acMode/set", payload: "Output mode", qos: 1 }
                        - delay: "00:00:01"
                    - action: mqtt.publish
                      data: { topic: "Zendure/number/HUB2_SERIAL_NUMBER/outputLimit/set", payload: "0", qos: 1 }
                    - if:
                        - condition: template
                          value_template: >
                            {% set last = states('input_number.zendure_last_sent_2')|int(0) %}
                            {% set s = states.sensor.solarflow_2_status_raw %}
                            {% set online = s.state|upper not in ['UNAVAILABLE','UNKNOWN','FAULT','ERROR'] %}
                            {% set fresh = (as_timestamp(now()) - as_timestamp(s.last_reported, default=0)) < 120 %}
                            {{ online and fresh and last != 0 }}
                      then:
                        - action: input_number.set_value
                          target: { entity_id: input_number.zendure_last_sent_2 }
                          data: { value: 0 }
            - delay: "00:00:01"

# --- 6.0 INITIALIZATION ---
  - alias: "Zendure: Initialize Calibration Timer"
    id: "zendure_init_calib_timer"
    mode: single
    triggers:
      - trigger: homeassistant
        event: start
    actions:
      - variables:
          ts_now: "{{ as_timestamp(now()) | int(0) }}"
      - if:
          - condition: template
            value_template: >
              {{ states('input_datetime.zendure_last_full_charge_1') in ['unknown', 'unavailable', 'none'] }}
        then:
          - action: input_datetime.set_datetime
            target: { entity_id: input_datetime.zendure_last_full_charge_1 }
            data: { timestamp: "{{ ts_now }}" }
      - if:
          - condition: template
            value_template: >
              {{ states('input_datetime.zendure_last_full_charge_2') in ['unknown', 'unavailable', 'none'] }}
        then:
          - action: input_datetime.set_datetime
            target: { entity_id: input_datetime.zendure_last_full_charge_2 }
            data: { timestamp: "{{ ts_now }}" }

  # --- 6.1 SYNC ON STARTUP ---
  - alias: "Zendure: Sync Memory on Start"
    id: "zendure_sync_on_start"
    triggers:
      - trigger: homeassistant
        event: start
    conditions:
      - condition: state
        entity_id: input_boolean.zendure_auto_mode
        state: "on"
    actions:
      - delay: "00:00:10"
      - if:
          - condition: template
            value_template: >
              {{ is_number(states('sensor.solarflow_1_output_limit'))
                 and states('sensor.solarflow_1_status_raw')|upper not in ['UNAVAILABLE', 'UNKNOWN', 'FAULT', 'ERROR']
                 and (states('input_number.zendure_last_sent_1')|int(0) >= 0) }}
        then:
          - action: input_number.set_value
            target: { entity_id: input_number.zendure_last_sent_1 }
            data: { value: "{{ [[states('sensor.solarflow_1_output_limit')|int(0),0]|max,800]|min }}" }
      - if:
          - condition: template
            value_template: >
              {{ is_number(states('sensor.solarflow_2_output_limit'))
                 and states('sensor.solarflow_2_status_raw')|upper not in ['UNAVAILABLE', 'UNKNOWN', 'FAULT', 'ERROR']
                 and (states('input_number.zendure_last_sent_2')|int(0) >= 0) }}
        then:
          - action: input_number.set_value
            target: { entity_id: input_number.zendure_last_sent_2 }
            data: { value: "{{ [[states('sensor.solarflow_2_output_limit')|int(0),0]|max,800]|min }}" }

  # --- 6.2 ANTI-DRIFT WATCHDOG ---
  - alias: "Zendure: Anti-Drift Watchdog"
    id: "zendure_anti_drift_watchdog"
    mode: queued
    triggers:
      - trigger: template
        id: "drift_1"
        value_template: >
          {{ states('sensor.solarflow_1_status_raw')|upper not in ['UNAVAILABLE','UNKNOWN','FAULT','ERROR']
             and is_number(states('sensor.solarflow_1_output_limit'))
             and (states('sensor.solarflow_1_output_limit')|float(0) - states('input_number.zendure_last_sent_1')|float(0))|abs > 30 }}
        for: "00:01:00"
      - trigger: template
        id: "drift_2"
        value_template: >
          {{ states('sensor.solarflow_2_status_raw')|upper not in ['UNAVAILABLE','UNKNOWN','FAULT','ERROR']
             and is_number(states('sensor.solarflow_2_output_limit'))
             and (states('sensor.solarflow_2_output_limit')|float(0) - states('input_number.zendure_last_sent_2')|float(0))|abs > 30 }}
        for: "00:01:00"
    conditions:
      - condition: state
        entity_id: input_boolean.zendure_auto_mode
        state: "on"
      - condition: template
        value_template: >
          {% if trigger.id == 'drift_1' %}
            {{ states('input_number.zendure_last_sent_1')|float(0) >= 0 }}
          {% else %}
            {{ states('input_number.zendure_last_sent_2')|float(0) >= 0 }}
          {% endif %}
    actions:
      - choose:
          - conditions:
              - condition: template
                value_template: >
                  {{ trigger.id == 'drift_1'
                     and is_state('input_boolean.zendure_emergency_u1', 'off')
                     and is_state('input_boolean.zendure_calib_mode_u1', 'off') }}
            sequence:
              - action: input_number.set_value
                target: { entity_id: input_number.zendure_last_sent_1 }
                data: { value: "{{ [[states('sensor.solarflow_1_output_limit')|int(0),0]|max,800]|min }}" }
          - conditions:
              - condition: template
                value_template: >
                  {{ trigger.id == 'drift_2'
                     and is_state('input_boolean.zendure_emergency_u2', 'off')
                     and is_state('input_boolean.zendure_calib_mode_u2', 'off') }}
            sequence:
              - action: input_number.set_value
                target: { entity_id: input_number.zendure_last_sent_2 }
                data: { value: "{{ [[states('sensor.solarflow_2_output_limit')|int(0),0]|max,800]|min }}" }

  # --- 6.2b SYNC MEMORY FROM MQTT ---
  - alias: "Zendure: Sync Memory from OutputLimit"
    id: "zendure_sync_memory_from_outputlimit"
    mode: queued
    triggers:
      - trigger: state
        entity_id:
          - sensor.solarflow_1_output_limit
          - sensor.solarflow_2_output_limit
    conditions:
      - condition: template
        value_template: >
          {{ is_number(trigger.to_state.state) }}
    actions:
      - choose:
          - conditions:
              - condition: template
                value_template: >
                  {{ trigger.entity_id == 'sensor.solarflow_1_output_limit'
                     and is_state('input_boolean.zendure_emergency_u1','off')
                     and is_state('input_boolean.zendure_calib_mode_u1','off')
                     and states('sensor.solarflow_1_status_raw')|upper not in ['UNAVAILABLE','UNKNOWN','FAULT','ERROR']
                     and (states('input_number.zendure_last_sent_1')|int(0) >= 0)
                     and (trigger.to_state.state|int(0) != states('input_number.zendure_last_sent_1')|int(0)) }}
            sequence:
              - action: input_number.set_value
                target: { entity_id: input_number.zendure_last_sent_1 }
                data: { value: "{{ [[trigger.to_state.state|int(0),0]|max,800]|min }}" }
          - conditions:
              - condition: template
                value_template: >
                  {{ trigger.entity_id == 'sensor.solarflow_2_output_limit'
                     and is_state('input_boolean.zendure_emergency_u2','off')
                     and is_state('input_boolean.zendure_calib_mode_u2','off')
                     and states('sensor.solarflow_2_status_raw')|upper not in ['UNAVAILABLE','UNKNOWN','FAULT','ERROR']
                     and (states('input_number.zendure_last_sent_2')|int(0) >= 0)
                     and (trigger.to_state.state|int(0) != states('input_number.zendure_last_sent_2')|int(0)) }}
            sequence:
              - action: input_number.set_value
                target: { entity_id: input_number.zendure_last_sent_2 }
                data: { value: "{{ [[trigger.to_state.state|int(0),0]|max,800]|min }}" }

  # --- 6.3 BYPASS LATCH MANAGER ---
  - alias: "Zendure: Bypass Latch Manager"
    id: "zendure_bypass_latch_manager"
    mode: single
    triggers:
      - trigger: state
        entity_id: [sensor.solarflow_1_battery_level, sensor.solarflow_2_battery_level]
      - trigger: homeassistant
        event: start
      - trigger: state
        entity_id: input_number.zendure_conf_soc_bypass
      - trigger: state
        entity_id: input_boolean.zendure_auto_mode
    actions:
      - variables:
          soc_entry: "{{ states('input_number.zendure_conf_soc_bypass') | int(30) }}"
          soc_exit: "{{ (soc_entry | int(30)) + 5 }}"
          soc1_ok: "{{ is_number(states('sensor.solarflow_1_battery_level')) }}"
          soc2_ok: "{{ is_number(states('sensor.solarflow_2_battery_level')) }}"
          soc1: "{{ states('sensor.solarflow_1_battery_level') | float(0) }}"
          soc2: "{{ states('sensor.solarflow_2_battery_level') | float(0) }}"

      - if:
          - condition: template
            value_template: "{{ soc1_ok and soc1 <= soc_entry }}"
        then:
          - action: input_boolean.turn_on
            target: { entity_id: input_boolean.zendure_bypass_u1 }
      - if:
          - condition: template
            value_template: "{{ soc1_ok and soc1 >= soc_exit }}"
        then:
          - action: input_boolean.turn_off
            target: { entity_id: input_boolean.zendure_bypass_u1 }

      - if:
          - condition: template
            value_template: "{{ soc2_ok and soc2 <= soc_entry }}"
        then:
          - action: input_boolean.turn_on
            target: { entity_id: input_boolean.zendure_bypass_u2 }
      - if:
          - condition: template
            value_template: "{{ soc2_ok and soc2 >= soc_exit }}"
        then:
          - action: input_boolean.turn_off
            target: { entity_id: input_boolean.zendure_bypass_u2 }

  # --- 6.4 CONTROL LOOP ---
  - alias: "Zendure: Control Loop (Dual)"
    id: "zendure_control_loop_dual"
    mode: restart
    max_exceeded: silent
    triggers:
      - trigger: time_pattern
        seconds: "/5"
      - trigger: numeric_state
        entity_id: sensor.shellypro3em_SHELLY_ID_total_active_power
        above: 150
        for: "00:00:01"
      - trigger: numeric_state
        entity_id: sensor.shellypro3em_SHELLY_ID_total_active_power
        below: -30
        for: "00:00:01"
      - trigger: state
        entity_id:
          - input_boolean.zendure_bypass_u1
          - input_boolean.zendure_bypass_u2
      - trigger: state
        entity_id:
          - input_boolean.zendure_auto_mode
          - input_boolean.zendure_emergency_u1
          - input_boolean.zendure_emergency_u2
          - input_boolean.zendure_calib_mode_u1
          - input_boolean.zendure_calib_mode_u2
    actions:
      - if:
          - condition: state
            entity_id: input_boolean.zendure_auto_mode
            state: "off"
        then:
          - stop: "Auto Mode is OFF - Loop aborted."

      - variables:
          shelly_ok: >-
            {% set s = states.sensor.shellypro3em_SHELLY_ID_total_active_power %}
            {{ s is not none and is_number(s.state) and (as_timestamp(now()) - as_timestamp(s.last_reported, 0)) < 25 }}

          s1_fresh: >-
            {% set s = states.sensor.solarflow_1_status_raw %}
            {{ s is not none and s.state|upper not in ['UNAVAILABLE', 'UNKNOWN', 'FAULT', 'ERROR'] and (as_timestamp(now()) - as_timestamp(s.last_reported, 0)) < 120 }}

          s2_fresh: >-
            {% set s = states.sensor.solarflow_2_status_raw %}
            {{ s is not none and s.state|upper not in ['UNAVAILABLE', 'UNKNOWN', 'FAULT', 'ERROR'] and (as_timestamp(now()) - as_timestamp(s.last_reported, 0)) < 120 }}

          v1_min: "{{ states('sensor.solarflow_1_cell_min_vol') | float(3.3) }}"
          v2_min: "{{ states('sensor.solarflow_2_cell_min_vol') | float(3.3) }}"
          t1_raw: "{{ states('sensor.solarflow_1_batt_max_temp') | float(states('sensor.solarflow_1_temp')|float(99)) }}"
          t2_raw: "{{ states('sensor.solarflow_2_batt_max_temp') | float(states('sensor.solarflow_2_temp')|float(99)) }}"
          soc1_raw: "{{ states('sensor.solarflow_1_battery_level') | float(-1) }}"
          soc2_raw: "{{ states('sensor.solarflow_2_battery_level') | float(-1) }}"

          s1_plausible: "{{ t1_raw < 80 and v1_min > 0 and soc1_raw >= 0 }}"
          s2_plausible: "{{ t2_raw < 80 and v2_min > 0 and soc2_raw >= 0 }}"

          s1_ok: "{{ s1_fresh | bool and s1_plausible | bool }}"
          s2_ok: "{{ s2_fresh | bool and s2_plausible | bool }}"

          t1: "{{ t1_raw if s1_ok | bool else 99 }}"
          t2: "{{ t2_raw if s2_ok | bool else 99 }}"
          soc1_val: "{{ soc1_raw if s1_ok | bool else 0 }}"
          soc2_val: "{{ soc2_raw if s2_ok | bool else 0 }}"
          soc1_valid: "{{ s1_ok | bool }}"
          soc2_valid: "{{ s2_ok | bool }}"

          s1_base: "{{ [states('input_number.zendure_last_sent_1')|float(0)|int, 0]|max }}"
          s2_base: "{{ [states('input_number.zendure_last_sent_2')|float(0)|int, 0]|max }}"

          s1_out_val: "{{ states('sensor.solarflow_1_output_limit') | int(-1) }}"
          s2_out_val: "{{ states('sensor.solarflow_2_output_limit') | int(-1) }}"

          last_sent_1_ts: "{{ as_timestamp(states.input_number.zendure_last_sent_1.last_updated, 0) }}"
          last_sent_2_ts: "{{ as_timestamp(states.input_number.zendure_last_sent_2.last_updated, 0) }}"
          time_since_1: "{{ as_timestamp(now()) - last_sent_1_ts }}"
          time_since_2: "{{ as_timestamp(now()) - last_sent_2_ts }}"

          ack_pending_1: "{{ time_since_1 < 8 and s1_out_val >= 0 and s1_out_val != s1_base and states('input_number.zendure_last_sent_1')|int(-2) >= 0 }}"
          drift_recovery_1: "{{ time_since_1 >= 8 and time_since_1 < 60 and s1_out_val >= 0 and s1_out_val != s1_base and states('input_number.zendure_last_sent_1')|int(-2) >= 0 }}"

          ack_pending_2: "{{ time_since_2 < 8 and s2_out_val >= 0 and s2_out_val != s2_base and states('input_number.zendure_last_sent_2')|int(-2) >= 0 }}"
          drift_recovery_2: "{{ time_since_2 >= 8 and time_since_2 < 60 and s2_out_val >= 0 and s2_out_val != s2_base and states('input_number.zendure_last_sent_2')|int(-2) >= 0 }}"

          soc_off: "{{ states('input_number.zendure_conf_soc_off') | int(10) }}"
          hysteresis: "{{ states('input_number.zendure_conf_hysteresis') | int(10) }}"

          bypass1: "{{ is_state('input_boolean.zendure_bypass_u1','on') }}"
          bypass2: "{{ is_state('input_boolean.zendure_bypass_u2','on') }}"
          s1_solar: "{{ states('sensor.solarflow_1_solar_input') | float(0) if s1_ok | bool else 0 }}"
          s2_solar: "{{ states('sensor.solarflow_2_solar_input') | float(0) if s2_ok | bool else 0 }}"

          calib1: "{{ is_state('input_boolean.zendure_calib_mode_u1', 'on') }}"
          calib2: "{{ is_state('input_boolean.zendure_calib_mode_u2', 'on') }}"
          calib_any: "{{ calib1 or calib2 }}"

          emerg_u1: "{{ is_state('input_boolean.zendure_emergency_u1', 'on') }}"
          emerg_u2: "{{ is_state('input_boolean.zendure_emergency_u2', 'on') }}"

          sentinel_u1: "{{ states('input_number.zendure_last_sent_1')|int(0) == -2 }}"
          sentinel_u2: "{{ states('input_number.zendure_last_sent_2')|int(0) == -2 }}"
          busy_u1: "{{ calib1 or sentinel_u1 or emerg_u1 }}"
          busy_u2: "{{ calib2 or sentinel_u2 or emerg_u2 }}"

          ghost_load_1: "{{ s1_base if (not s1_ok | bool and s1_base > 0) else 0 }}"
          ghost_load_2: "{{ s2_base if (not s2_ok | bool and s2_base > 0) else 0 }}"
          ghost_total: "{{ (ghost_load_1|int(0)) + (ghost_load_2|int(0)) }}"

          cap_u1: >
            {% if not s1_ok|bool or busy_u1 %}0
            {% elif calib_any %}{{ (s1_solar * 0.9) | int(0) }}
            {% elif soc1_val <= 10 or v1_min < 3.15 %}0
            {% elif t1 < 0 or t1 > 52 or soc1_val <= soc_off or bypass1 %}{{ (s1_solar * 0.9) | int(0) }}
            {% elif t1 >= 50 %}{{ [400, (s1_solar * 0.9)|int(0)]|max }}
            {% elif t1 >= 48 %}{{ [600, (s1_solar * 0.9)|int(0)]|max }}
            {% elif soc1_val <= (soc_off + 5) %}{{ [150, (s1_solar * 0.9)|int(0)] | max }}
            {% else %}800{% endif %}

          cap_u2: >
            {% if not s2_ok|bool or busy_u2 %}0
            {% elif calib_any %}{{ (s2_solar * 0.9) | int(0) }}
            {% elif soc2_val <= 10 or v2_min < 3.15 %}0
            {% elif t2 < 0 or t2 > 52 or soc2_val <= soc_off or bypass2 %}{{ (s2_solar * 0.9) | int(0) }}
            {% elif t2 >= 50 %}{{ [400, (s2_solar * 0.9)|int(0)]|max }}
            {% elif t2 >= 48 %}{{ [600, (s2_solar * 0.9)|int(0)]|max }}
            {% elif soc2_val <= (soc_off + 5) %}{{ [150, (s2_solar * 0.9)|int(0)] | max }}
            {% else %}800{% endif %}

          floor_1: >-
            {% if soc1_valid and soc1_val == 100 and not busy_u1 %}
              {% if s1_solar > 400 %} 350
              {% elif s1_solar > 300 %} 250
              {% else %} 0 {% endif %}
            {% else %} 0 {% endif %}
          floor_2: >-
            {% if soc2_valid and soc2_val == 100 and not busy_u2 %}
              {% if s2_solar > 400 %} 350
              {% elif s2_solar > 300 %} 250
              {% else %} 0 {% endif %}
            {% else %} 0 {% endif %}

          spillover_override: "{{ (floor_1|int(0) > s1_base|int(0)) or (floor_2|int(0) > s2_base|int(0)) }}"

          override_u1: "{{ s1_ok | bool and (s1_base|int(0) > cap_u1|int(0)) }}"
          override_u2: "{{ s2_ok | bool and (s2_base|int(0) > cap_u2|int(0)) }}"
          safety_override: "{{ override_u1 or override_u2 }}"

          global_max: "{{ states('input_number.zendure_conf_max_output') | int(800) }}"
          available_capacity: "{{ [ (global_max|int(0) - ghost_total|int(0)), 0 ] | max }}"

          failsafe: "{{ states('input_number.zendure_conf_failsafe_watt') | int(130) }}"
          grid_bias: "{{ states('input_number.zendure_conf_grid_bias') | int(10) }}"

          zen_mode: "{{ (bypass1 or bypass2) }}"
          slider_change: "{{ states('input_number.zendure_conf_min_change') | int(5) }}"
          min_change: "{{ (slider_change * 4) if zen_mode else slider_change }}"

          grid: "{{ (states('sensor.shellypro3em_SHELLY_ID_total_active_power') | float(0)) if shelly_ok | bool else 0 }}"
          total_base: "{{ (s1_base | int(0)) + (s2_base | int(0)) }}"

          target_raw: >-
            {{ ((total_base | int(0)) + (grid | float(0)) - (grid_bias | int(0)))
               if shelly_ok | bool else (failsafe | int(0)) }}
          delta: "{{ (target_raw | float(0)) - (total_base | float(0)) }}"

          target_total: "{{ [[target_raw|int(0), 0]|max, global_max]|min }}"
          delta_effective: "{{ (target_total|int(0)) - (total_base|int(0)) }}"

      - condition: template
        value_template: >
          {{ safety_override
             or spillover_override
             or drift_recovery_1
             or drift_recovery_2
             or states('input_text.zendure_ac_mode_u1') != 'Output mode'
             or states('input_text.zendure_ac_mode_u2') != 'Output mode'
             or ((delta_effective | int(0) | abs) > (hysteresis | int(0)))
             or (total_base | int(0) > global_max | int(0))
             or ((grid | float(0)) < -40) }}

      - variables:
          target_online: "{{ [[(target_total|int(0) - ghost_total|int(0)), 0]|max, available_capacity|int(0)]|min }}"

          active_1: "{{ s1_ok | bool }}"
          active_2: "{{ s2_ok | bool }}"

          weight_1_base: >-
            {% if soc1_valid and soc2_valid and (soc1_val + soc2_val) > 0 %}
              {{ soc1_val / (soc1_val + soc2_val) }}
            {% else %}
              0.5
            {% endif %}

          weight_1: >-
            {% set w = weight_1_base | float(0.5) %}

            {% if t1 < 80 and t2 < 80 %}
              {% if t1 > 45 and (t1 - t2) > 4 %}
                {% set w = w - 0.15 %}
              {% elif t2 > 45 and (t2 - t1) > 4 %}
                {% set w = w + 0.15 %}
              {% endif %}
            {% endif %}

            {% set solar_diff = s1_solar - s2_solar %}
            {% if solar_diff > 150 %}
              {% set w = w + 0.05 %}
            {% elif solar_diff < -150 %}
              {% set w = w - 0.05 %}
            {% endif %}

            {{ [[w, 0.15]|max, 0.85]|min }}

          req_1: "{{ ((target_online | int(0)) * (weight_1 | float(0))) | int(0) }}"
          req_2: "{{ (target_online | int(0)) - (req_1 | int(0)) }}"

          req_1_final: "{{ [req_1|int(0), floor_1|int(0)]|max }}"
          req_2_final: "{{ [req_2|int(0), floor_2|int(0)]|max }}"
          final_1_init: "{{ [req_1_final|int(0), cap_u1|int(0)]|min }}"

          final_2_raw: >
            {% if active_2 %}
              {% set v = (req_2_final + (req_1_final - final_1_init)) | int(0) %}
              {{ [[v, 0] | max, cap_u2 | int(0)] | min }}
            {% else %}
              0
            {% endif %}

          final_1_raw: >
            {% if active_1 %}
              {% set v = (target_online | int(0)) - (final_2_raw | int(0)) %}
              {% set v_safe = [v, floor_1|int(0)]|max %}
              {{ [[v_safe, 0] | max, cap_u1 | int(0)] | min }}
            {% else %}
              0
            {% endif %}

          active_sum: >-
            {% set a1 = final_1_raw|int(0) if active_1 else 0 %}
            {% set a2 = final_2_raw|int(0) if active_2 else 0 %}
            {{ a1 + a2 }}

          scale_active: >-
            {% set cap = available_capacity|int(0) %}
            {% set s = active_sum|int(0) %}
            {% if s <= 0 %} 1
            {% elif cap <= 0 %} 0
            {% elif s > cap %} {{ cap / s }}
            {% else %} 1
            {% endif %}

          final_1: "{{ (final_1_raw|int(0) * (scale_active|float(1))) | int }}"
          final_2: "{{ (final_2_raw|int(0) * (scale_active|float(1))) | int }}"

          heavy_export: "{{ (grid | float(0)) < -40 }}"
          fast_down_1: "{{ heavy_export and (final_1|int(0) < s1_base|int(0)) }}"
          fast_down_2: "{{ heavy_export and (final_2|int(0) < s2_base|int(0)) }}"

      - parallel:
          # --- UNIT 1 OUTPUT UPDATE ---
          - if:
              - condition: template
                value_template: >-
                  {{ s1_ok|bool and not busy_u1 and (not ack_pending_1|bool or fast_down_1|bool) and (
                         fast_down_1|bool
                         or ((final_1|int(0) - s1_base|int(0))|abs >= (min_change|int(0)))
                         or override_u1
                         or drift_recovery_1
                         or states('input_text.zendure_ac_mode_u1') != 'Output mode'
                         or ((total_base|int(0) > global_max|int(0)) and (s1_base|int(0) > final_1|int(0)))
                       ) }}
            then:
              - if:
                  - condition: template
                    value_template: >-
                      {{ states('input_text.zendure_ac_mode_u1') != 'Output mode' or states('sensor.solarflow_1_ac_mode') != 'Output mode' }}
                then:
                  - action: input_text.set_value
                    target: { entity_id: input_text.zendure_ac_mode_u1 }
                    data: { value: "Output mode" }
                  - action: mqtt.publish
                    data: { topic: "Zendure/select/HUB1_SERIAL_NUMBER/acMode/set", payload: "Output mode", qos: 1 }
                  - delay: "00:00:00.500"
                  - action: mqtt.publish
                    data: { topic: "Zendure/select/HUB1_SERIAL_NUMBER/acMode/set", payload: "Output mode", qos: 1 }
                  - delay: "00:00:01"
              - action: mqtt.publish
                data: { topic: "Zendure/number/HUB1_SERIAL_NUMBER/outputLimit/set", payload: "{{ final_1|int }}", qos: 1 }
              - action: input_number.set_value
                target: { entity_id: input_number.zendure_last_sent_1 }
                data: { value: "{{ final_1|int }}" }

          # --- UNIT 2 OUTPUT UPDATE ---
          - if:
              - condition: template
                value_template: >-
                  {{ s2_ok|bool and not busy_u2 and (not ack_pending_2|bool or fast_down_2|bool) and (
                         fast_down_2|bool
                         or ((final_2|int(0) - s2_base|int(0))|abs >= (min_change|int(0)))
                         or override_u2
                         or drift_recovery_2
                         or states('input_text.zendure_ac_mode_u2') != 'Output mode'
                         or ((total_base|int(0) > global_max|int(0)) and (s2_base|int(0) > final_2|int(0)))
                       ) }}
            then:
              - if:
                  - condition: template
                    value_template: >-
                      {{ states('input_text.zendure_ac_mode_u2') != 'Output mode' or states('sensor.solarflow_2_ac_mode') != 'Output mode' }}
                then:
                  - action: input_text.set_value
                    target: { entity_id: input_text.zendure_ac_mode_u2 }
                    data: { value: "Output mode" }
                  - action: mqtt.publish
                    data: { topic: "Zendure/select/HUB2_SERIAL_NUMBER/acMode/set", payload: "Output mode", qos: 1 }
                  - delay: "00:00:00.500"
                  - action: mqtt.publish
                    data: { topic: "Zendure/select/HUB2_SERIAL_NUMBER/acMode/set", payload: "Output mode", qos: 1 }
                  - delay: "00:00:01"
              - action: mqtt.publish
                data: { topic: "Zendure/number/HUB2_SERIAL_NUMBER/outputLimit/set", payload: "{{ final_2|int }}", qos: 1 }
              - action: input_number.set_value
                target: { entity_id: input_number.zendure_last_sent_2 }
                data: { value: "{{ final_2|int }}" }

  # --- 6.5 STATE MACHINE (SAFE RETURN & SYNC) ---
  - alias: "Zendure: State Machine (Smart Single-Channel)"
    id: "zendure_state_machine_dual"
    mode: queued
    triggers:
      - trigger: state
        entity_id: input_boolean.zendure_auto_mode
        to: "on"
      - trigger: state
        entity_id: input_boolean.zendure_auto_mode
        to: "off"
        id: "auto_off"

      - trigger: time_pattern
        minutes: "/5"
        id: "periodic_reconcile"

      - trigger: template
        id: "device_online_u1"
        value_template: "{{ states('sensor.solarflow_1_status_raw')|upper not in ['UNAVAILABLE','UNKNOWN','FAULT','ERROR'] }}"
        for: "00:00:01"
      - trigger: template
        id: "device_online_u2"
        value_template: "{{ states('sensor.solarflow_2_status_raw')|upper not in ['UNAVAILABLE','UNKNOWN','FAULT','ERROR'] }}"
        for: "00:00:01"

      - trigger: homeassistant
        event: start
        id: "boot_check"
    actions:
      - choose:
          - conditions:
              - condition: template
                value_template: >
                  {{ trigger.id == 'auto_off' and is_state('input_boolean.zendure_auto_mode','on') }}
            sequence:
              - stop: "Stale auto_off trigger ignored (Auto-Mode already ON)."

          - conditions:
              - condition: template
                value_template: "{{ trigger.id == 'auto_off' }}"
            sequence:
              - action: input_boolean.turn_off
                target:
                  entity_id:
                    - input_boolean.zendure_emergency_u1
                    - input_boolean.zendure_emergency_u2
                    - input_boolean.zendure_calib_mode_u1
                    - input_boolean.zendure_calib_mode_u2

              - parallel:
                - if:
                    - condition: template
                      value_template: "{{ states('sensor.solarflow_1_status_raw')|upper not in ['UNAVAILABLE','UNKNOWN','FAULT','ERROR'] }}"
                  then:
                    - action: input_text.set_value
                      target: { entity_id: input_text.zendure_ac_mode_u1 }
                      data: { value: "Output mode" }
                    - if:
                        - condition: template
                          value_template: "{{ states('sensor.solarflow_1_ac_mode') != 'Output mode' }}"
                      then:
                        - action: mqtt.publish
                          data: { topic: "Zendure/select/HUB1_SERIAL_NUMBER/acMode/set", payload: "Output mode", qos: 1 }
                        - delay: "00:00:00.500"
                        - action: mqtt.publish
                          data: { topic: "Zendure/select/HUB1_SERIAL_NUMBER/acMode/set", payload: "Output mode", qos: 1 }
                        - delay: "00:00:01"
                    - action: mqtt.publish
                      data: { topic: "Zendure/number/HUB1_SERIAL_NUMBER/outputLimit/set", payload: "0", qos: 1 }
                    - if:
                        - condition: template
                          value_template: >
                            {% set last = states('input_number.zendure_last_sent_1')|int(0) %}
                            {% set s = states.sensor.solarflow_1_status_raw %}
                            {% set online = s.state|upper not in ['UNAVAILABLE','UNKNOWN','FAULT','ERROR'] %}
                            {% set fresh = (as_timestamp(now()) - as_timestamp(s.last_reported, default=0)) < 120 %}
                            {{ online and fresh and last != 0 }}
                      then:
                        - action: input_number.set_value
                          target: { entity_id: input_number.zendure_last_sent_1 }
                          data: { value: 0 }

                - if:
                    - condition: template
                      value_template: "{{ states('sensor.solarflow_2_status_raw')|upper not in ['UNAVAILABLE','UNKNOWN','FAULT','ERROR'] }}"
                  then:
                    - action: input_text.set_value
                      target: { entity_id: input_text.zendure_ac_mode_u2 }
                      data: { value: "Output mode" }
                    - if:
                        - condition: template
                          value_template: "{{ states('sensor.solarflow_2_ac_mode') != 'Output mode' }}"
                      then:
                        - action: mqtt.publish
                          data: { topic: "Zendure/select/HUB2_SERIAL_NUMBER/acMode/set", payload: "Output mode", qos: 1 }
                        - delay: "00:00:00.500"
                        - action: mqtt.publish
                          data: { topic: "Zendure/select/HUB2_SERIAL_NUMBER/acMode/set", payload: "Output mode", qos: 1 }
                        - delay: "00:00:01"
                    - action: mqtt.publish
                      data: { topic: "Zendure/number/HUB2_SERIAL_NUMBER/outputLimit/set", payload: "0", qos: 1 }
                    - if:
                        - condition: template
                          value_template: >
                            {% set last = states('input_number.zendure_last_sent_2')|int(0) %}
                            {% set s = states.sensor.solarflow_2_status_raw %}
                            {% set online = s.state|upper not in ['UNAVAILABLE','UNKNOWN','FAULT','ERROR'] %}
                            {% set fresh = (as_timestamp(now()) - as_timestamp(s.last_reported, default=0)) < 120 %}
                            {{ online and fresh and last != 0 }}
                      then:
                        - action: input_number.set_value
                          target: { entity_id: input_number.zendure_last_sent_2 }
                          data: { value: 0 }
              - stop: "Automatik beendet - Full Hard Reset."

          - conditions:
              - condition: template
                value_template: "{{ trigger.id in ['device_online_u1', 'device_online_u2', 'boot_check'] }}"
            sequence:
              - if:
                  - condition: template
                    value_template: "{{ is_state('input_boolean.zendure_auto_mode','off') }}"
                then:
                  - action: input_boolean.turn_off
                    target:
                      entity_id:
                        - input_boolean.zendure_emergency_u1
                        - input_boolean.zendure_emergency_u2
                        - input_boolean.zendure_calib_mode_u1
                        - input_boolean.zendure_calib_mode_u2

              - if:
                  - condition: template
                    value_template: >
                      {{ is_state('input_boolean.zendure_emergency_u1','on')
                         or is_state('input_boolean.zendure_emergency_u2','on')
                         or is_state('input_boolean.zendure_auto_mode','off') }}
                then:
                  - action: mqtt.publish
                    data: { topic: "Zendure/number/HUB1_SERIAL_NUMBER/outputLimit/set", payload: "0", qos: 1 }
                  - action: mqtt.publish
                    data: { topic: "Zendure/number/HUB2_SERIAL_NUMBER/outputLimit/set", payload: "0", qos: 1 }

                  - if:
                      - condition: state
                        entity_id: input_boolean.zendure_auto_mode
                        state: "off"
                    then:
                      - if:
                          - condition: template
                            value_template: >
                              {% set last = states('input_number.zendure_last_sent_1')|int(0) %}
                              {% set s = states.sensor.solarflow_1_status_raw %}
                              {% set online = s.state|upper not in ['UNAVAILABLE','UNKNOWN','FAULT','ERROR'] %}
                              {% set fresh = (as_timestamp(now()) - as_timestamp(s.last_reported, default=0)) < 120 %}
                              {{ online and fresh and last > 0 }}
                        then:
                          - action: input_number.set_value
                            target: { entity_id: input_number.zendure_last_sent_1 }
                            data: { value: 0 }
                      - if:
                          - condition: template
                            value_template: >
                              {% set last = states('input_number.zendure_last_sent_2')|int(0) %}
                              {% set s = states.sensor.solarflow_2_status_raw %}
                              {% set online = s.state|upper not in ['UNAVAILABLE','UNKNOWN','FAULT','ERROR'] %}
                              {% set fresh = (as_timestamp(now()) - as_timestamp(s.last_reported, default=0)) < 120 %}
                              {{ online and fresh and last > 0 }}
                        then:
                          - action: input_number.set_value
                            target: { entity_id: input_number.zendure_last_sent_2 }
                            data: { value: 0 }

              - wait_template: "{{ is_state('input_boolean.zendure_auto_mode','off') }}"
                timeout: "00:00:05"
                continue_on_timeout: true

              - if:
                  - condition: template
                    value_template: "{{ wait.completed }}"
                then:
                  - parallel:
                      - if:
                          - condition: template
                            value_template: "{{ states('sensor.solarflow_1_status_raw')|upper not in ['UNAVAILABLE','UNKNOWN','FAULT','ERROR'] }}"
                        then:
                          - action: input_text.set_value
                            target: { entity_id: input_text.zendure_ac_mode_u1 }
                            data: { value: "Output mode" }
                          - if:
                              - condition: template
                                value_template: "{{ states('sensor.solarflow_1_ac_mode') != 'Output mode' }}"
                            then:
                              - action: mqtt.publish
                                data: { topic: "Zendure/select/HUB1_SERIAL_NUMBER/acMode/set", payload: "Output mode", qos: 1 }
                              - delay: "00:00:00.500"
                              - action: mqtt.publish
                                data: { topic: "Zendure/select/HUB1_SERIAL_NUMBER/acMode/set", payload: "Output mode", qos: 1 }
                              - delay: "00:00:01"
                          - action: mqtt.publish
                            data: { topic: "Zendure/number/HUB1_SERIAL_NUMBER/outputLimit/set", payload: "0", qos: 1 }
                          - if:
                              - condition: template
                                value_template: >
                                  {% set last = states('input_number.zendure_last_sent_1')|int(0) %}
                                  {% set s = states.sensor.solarflow_1_status_raw %}
                                  {% set online = s.state|upper not in ['UNAVAILABLE','UNKNOWN','FAULT','ERROR'] %}
                                  {% set fresh = (as_timestamp(now()) - as_timestamp(s.last_reported, default=0)) < 120 %}
                                  {{ online and fresh and last > 0 }}
                            then:
                              - action: input_number.set_value
                                target: { entity_id: input_number.zendure_last_sent_1 }
                                data: { value: 0 }
                      - if:
                          - condition: template
                            value_template: "{{ states('sensor.solarflow_2_status_raw')|upper not in ['UNAVAILABLE','UNKNOWN','FAULT','ERROR'] }}"
                        then:
                          - action: input_text.set_value
                            target: { entity_id: input_text.zendure_ac_mode_u2 }
                            data: { value: "Output mode" }
                          - if:
                              - condition: template
                                value_template: "{{ states('sensor.solarflow_2_ac_mode') != 'Output mode' }}"
                            then:
                              - action: mqtt.publish
                                data: { topic: "Zendure/select/HUB2_SERIAL_NUMBER/acMode/set", payload: "Output mode", qos: 1 }
                              - delay: "00:00:00.500"
                              - action: mqtt.publish
                                data: { topic: "Zendure/select/HUB2_SERIAL_NUMBER/acMode/set", payload: "Output mode", qos: 1 }
                              - delay: "00:00:01"
                          - action: mqtt.publish
                            data: { topic: "Zendure/number/HUB2_SERIAL_NUMBER/outputLimit/set", payload: "0", qos: 1 }
                          - if:
                              - condition: template
                                value_template: >
                                  {% set last = states('input_number.zendure_last_sent_2')|int(0) %}
                                  {% set s = states.sensor.solarflow_2_status_raw %}
                                  {% set online = s.state|upper not in ['UNAVAILABLE','UNKNOWN','FAULT','ERROR'] %}
                                  {% set fresh = (as_timestamp(now()) - as_timestamp(s.last_reported, default=0)) < 120 %}
                                  {{ online and fresh and last > 0 }}
                            then:
                              - action: input_number.set_value
                                target: { entity_id: input_number.zendure_last_sent_2 }
                                data: { value: 0 }
                  - stop: "Auto-Mode switched OFF during Boot/Online Sequence. Full Safety Reconnect applied."

              - parallel:
                - if:
                    - condition: template
                      value_template: "{{ states('sensor.solarflow_1_status_raw')|upper not in ['UNAVAILABLE', 'UNKNOWN', 'FAULT', 'ERROR'] }}"
                  then:
                    - action: mqtt.publish
                      data: { topic: "Zendure/switch/HUB1_SERIAL_NUMBER/smartMode/set", payload: "ON", qos: 1 }
                - if:
                    - condition: template
                      value_template: "{{ states('sensor.solarflow_2_status_raw')|upper not in ['UNAVAILABLE', 'UNKNOWN', 'FAULT', 'ERROR'] }}"
                  then:
                    - action: mqtt.publish
                      data: { topic: "Zendure/switch/HUB2_SERIAL_NUMBER/smartMode/set", payload: "ON", qos: 1 }
              - delay: "00:00:02"
              - parallel:
                - if:
                    - condition: template
                      value_template: "{{ states('sensor.solarflow_1_status_raw')|upper not in ['UNAVAILABLE', 'UNKNOWN', 'FAULT', 'ERROR'] }}"
                  then:
                    - action: mqtt.publish
                      data: { topic: "Zendure/switch/HUB1_SERIAL_NUMBER/smartMode/set", payload: "ON", qos: 1 }
                - if:
                    - condition: template
                      value_template: "{{ states('sensor.solarflow_2_status_raw')|upper not in ['UNAVAILABLE', 'UNKNOWN', 'FAULT', 'ERROR'] }}"
                  then:
                    - action: mqtt.publish
                      data: { topic: "Zendure/switch/HUB2_SERIAL_NUMBER/smartMode/set", payload: "ON", qos: 1 }

              - wait_template: "{{ is_state('input_boolean.zendure_auto_mode','off') }}"
                timeout: "00:00:02"
                continue_on_timeout: true

              - if:
                  - condition: template
                    value_template: "{{ wait.completed }}"
                then:
                  - parallel:
                      - if:
                          - condition: template
                            value_template: "{{ states('sensor.solarflow_1_status_raw')|upper not in ['UNAVAILABLE','UNKNOWN','FAULT','ERROR'] }}"
                        then:
                          - action: input_text.set_value
                            target: { entity_id: input_text.zendure_ac_mode_u1 }
                            data: { value: "Output mode" }
                          - if:
                              - condition: template
                                value_template: "{{ states('sensor.solarflow_1_ac_mode') != 'Output mode' }}"
                            then:
                              - action: mqtt.publish
                                data: { topic: "Zendure/select/HUB1_SERIAL_NUMBER/acMode/set", payload: "Output mode", qos: 1 }
                              - delay: "00:00:00.500"
                              - action: mqtt.publish
                                data: { topic: "Zendure/select/HUB1_SERIAL_NUMBER/acMode/set", payload: "Output mode", qos: 1 }
                              - delay: "00:00:01"
                          - action: mqtt.publish
                            data: { topic: "Zendure/number/HUB1_SERIAL_NUMBER/outputLimit/set", payload: "0", qos: 1 }
                          - if:
                              - condition: template
                                value_template: >
                                  {% set last = states('input_number.zendure_last_sent_1')|int(0) %}
                                  {% set s = states.sensor.solarflow_1_status_raw %}
                                  {% set online = s.state|upper not in ['UNAVAILABLE','UNKNOWN','FAULT','ERROR'] %}
                                  {% set fresh = (as_timestamp(now()) - as_timestamp(s.last_reported, default=0)) < 120 %}
                                  {{ online and fresh and last > 0 }}
                            then:
                              - action: input_number.set_value
                                target: { entity_id: input_number.zendure_last_sent_1 }
                                data: { value: 0 }
                      - if:
                          - condition: template
                            value_template: "{{ states('sensor.solarflow_2_status_raw')|upper not in ['UNAVAILABLE','UNKNOWN','FAULT','ERROR'] }}"
                        then:
                          - action: input_text.set_value
                            target: { entity_id: input_text.zendure_ac_mode_u2 }
                            data: { value: "Output mode" }
                          - if:
                              - condition: template
                                value_template: "{{ states('sensor.solarflow_2_ac_mode') != 'Output mode' }}"
                            then:
                              - action: mqtt.publish
                                data: { topic: "Zendure/select/HUB2_SERIAL_NUMBER/acMode/set", payload: "Output mode", qos: 1 }
                              - delay: "00:00:00.500"
                              - action: mqtt.publish
                                data: { topic: "Zendure/select/HUB2_SERIAL_NUMBER/acMode/set", payload: "Output mode", qos: 1 }
                              - delay: "00:00:01"
                          - action: mqtt.publish
                            data: { topic: "Zendure/number/HUB2_SERIAL_NUMBER/outputLimit/set", payload: "0", qos: 1 }
                          - if:
                              - condition: template
                                value_template: >
                                  {% set last = states('input_number.zendure_last_sent_2')|int(0) %}
                                  {% set s = states.sensor.solarflow_2_status_raw %}
                                  {% set online = s.state|upper not in ['UNAVAILABLE','UNKNOWN','FAULT','ERROR'] %}
                                  {% set fresh = (as_timestamp(now()) - as_timestamp(s.last_reported, default=0)) < 120 %}
                                  {{ online and fresh and last > 0 }}
                            then:
                              - action: input_number.set_value
                                target: { entity_id: input_number.zendure_last_sent_2 }
                                data: { value: 0 }
                  - stop: "Auto-Mode switched OFF during Boot/Online Sequence. Full Safety Reconnect applied."

              - parallel:
                - if:
                    - condition: template
                      value_template: "{{ states('sensor.solarflow_1_status_raw')|upper not in ['UNAVAILABLE', 'UNKNOWN', 'FAULT', 'ERROR'] }}"
                  then:
                    - action: mqtt.publish
                      data: { topic: "Zendure/switch/HUB1_SERIAL_NUMBER/smartMode/set", payload: "ON", qos: 1 }
                - if:
                    - condition: template
                      value_template: "{{ states('sensor.solarflow_2_status_raw')|upper not in ['UNAVAILABLE', 'UNKNOWN', 'FAULT', 'ERROR'] }}"
                  then:
                    - action: mqtt.publish
                      data: { topic: "Zendure/switch/HUB2_SERIAL_NUMBER/smartMode/set", payload: "ON", qos: 1 }

              - if:
                  - condition: template
                    value_template: "{{ is_state('input_boolean.zendure_auto_mode','off') }}"
                then:
                  - parallel:
                      - if:
                          - condition: template
                            value_template: "{{ states('sensor.solarflow_1_status_raw')|upper not in ['UNAVAILABLE','UNKNOWN','FAULT','ERROR'] }}"
                        then:
                          - action: input_text.set_value
                            target: { entity_id: input_text.zendure_ac_mode_u1 }
                            data: { value: "Output mode" }
                          - if:
                              - condition: template
                                value_template: "{{ states('sensor.solarflow_1_ac_mode') != 'Output mode' }}"
                            then:
                              - action: mqtt.publish
                                data: { topic: "Zendure/select/HUB1_SERIAL_NUMBER/acMode/set", payload: "Output mode", qos: 1 }
                              - delay: "00:00:00.500"
                              - action: mqtt.publish
                                data: { topic: "Zendure/select/HUB1_SERIAL_NUMBER/acMode/set", payload: "Output mode", qos: 1 }
                              - delay: "00:00:01"
                          - action: mqtt.publish
                            data: { topic: "Zendure/number/HUB1_SERIAL_NUMBER/outputLimit/set", payload: "0", qos: 1 }
                          - if:
                              - condition: template
                                value_template: >
                                  {% set last = states('input_number.zendure_last_sent_1')|int(0) %}
                                  {% set s = states.sensor.solarflow_1_status_raw %}
                                  {% set online = s.state|upper not in ['UNAVAILABLE','UNKNOWN','FAULT','ERROR'] %}
                                  {% set fresh = (as_timestamp(now()) - as_timestamp(s.last_reported, default=0)) < 120 %}
                                  {{ online and fresh and last != 0 }}
                            then:
                              - action: input_number.set_value
                                target: { entity_id: input_number.zendure_last_sent_1 }
                                data: { value: 0 }

                      - if:
                          - condition: template
                            value_template: "{{ states('sensor.solarflow_2_status_raw')|upper not in ['UNAVAILABLE','UNKNOWN','FAULT','ERROR'] }}"
                        then:
                          - action: input_text.set_value
                            target: { entity_id: input_text.zendure_ac_mode_u2 }
                            data: { value: "Output mode" }
                          - if:
                              - condition: template
                                value_template: "{{ states('sensor.solarflow_2_ac_mode') != 'Output mode' }}"
                            then:
                              - action: mqtt.publish
                                data: { topic: "Zendure/select/HUB2_SERIAL_NUMBER/acMode/set", payload: "Output mode", qos: 1 }
                              - delay: "00:00:00.500"
                              - action: mqtt.publish
                                data: { topic: "Zendure/select/HUB2_SERIAL_NUMBER/acMode/set", payload: "Output mode", qos: 1 }
                              - delay: "00:00:01"
                          - action: mqtt.publish
                            data: { topic: "Zendure/number/HUB2_SERIAL_NUMBER/outputLimit/set", payload: "0", qos: 1 }
                          - if:
                              - condition: template
                                value_template: >
                                  {% set last = states('input_number.zendure_last_sent_2')|int(0) %}
                                  {% set s = states.sensor.solarflow_2_status_raw %}
                                  {% set online = s.state|upper not in ['UNAVAILABLE','UNKNOWN','FAULT','ERROR'] %}
                                  {% set fresh = (as_timestamp(now()) - as_timestamp(s.last_reported, default=0)) < 120 %}
                                  {{ online and fresh and last != 0 }}
                            then:
                              - action: input_number.set_value
                                target: { entity_id: input_number.zendure_last_sent_2 }
                                data: { value: 0 }
                  - stop: "Auto-Mode OFF: Safety Reconnect Hard-Stop applied."

      - if:
          - condition: template
            value_template: >
              {% set tid = trigger.id | default('') %}
              {{ is_state('input_boolean.zendure_auto_mode','off')
                 and tid not in ['auto_off','device_online_u1','device_online_u2','boot_check'] }}
        then:
          - stop: "Auto-Mode OFF: Trigger ignoriert (Strict Hands-Off)."

      - variables:
          online1: "{{ states('sensor.solarflow_1_status_raw')|upper not in ['UNAVAILABLE', 'UNKNOWN', 'FAULT', 'ERROR'] }}"
          online2: "{{ states('sensor.solarflow_2_status_raw')|upper not in ['UNAVAILABLE', 'UNKNOWN', 'FAULT', 'ERROR'] }}"
          min_soc: 5
          t1: "{{ states('sensor.solarflow_1_batt_max_temp') | float(states('sensor.solarflow_1_temp')|float(0)) }}"
          t2: "{{ states('sensor.solarflow_2_batt_max_temp') | float(states('sensor.solarflow_2_temp')|float(0)) }}"
          soc1: "{{ states('sensor.solarflow_1_battery_level') | float(0) }}"
          soc2: "{{ states('sensor.solarflow_2_battery_level') | float(0) }}"
          soc1_valid: "{{ is_number(states('sensor.solarflow_1_battery_level')) }}"
          soc2_valid: "{{ is_number(states('sensor.solarflow_2_battery_level')) }}"

          cl1: "{% if t1 < 5 %} 100 {% elif t1 < 10 %} 300 {% else %} 800 {% endif %}"
          cl2: "{% if t2 < 5 %} 100 {% elif t2 < 10 %} 300 {% else %} 800 {% endif %}"
          sl1: "{% if soc1 > 97 %} 100 {% elif soc1 >= 90 %} 200 {% else %} 800 {% endif %}"
          sl2: "{% if soc2 > 97 %} 100 {% elif soc2 >= 90 %} 200 {% else %} 800 {% endif %}"
          ss1: "{% if soc1 < 12 %} 300 {% else %} 800 {% endif %}"
          ss2: "{% if soc2 < 12 %} 300 {% else %} 800 {% endif %}"

          charge_limit_u1: "{{ [cl1|int, sl1|int, ss1|int]|min }}"
          charge_limit_u2: "{{ [cl2|int, sl2|int, ss2|int]|min }}"

          curr_min_soc_1: "{{ states('sensor.solarflow_1_setting_minsoc') | int(-1) }}"
          curr_charge_1: "{{ states('sensor.solarflow_1_setting_chargelimit') | int(-1) }}"
          curr_min_soc_2: "{{ states('sensor.solarflow_2_setting_minsoc') | int(-1) }}"
          curr_charge_2: "{{ states('sensor.solarflow_2_setting_chargelimit') | int(-1) }}"

      - if:
          - condition: state
            entity_id: input_boolean.zendure_auto_mode
            state: "on"
        then:
          - parallel:
            - if:
                - condition: template
                  value_template: "{{ online1 and (curr_min_soc_1 != min_soc|int or curr_charge_1 != charge_limit_u1|int) }}"
              then:
                - action: mqtt.publish
                  data: { topic: "Zendure/number/HUB1_SERIAL_NUMBER/minSoc/set", payload: "{{ min_soc }}", qos: 1 }
                - action: mqtt.publish
                  data: { topic: "Zendure/number/HUB1_SERIAL_NUMBER/chargeMaxLimit/set", payload: "{{ charge_limit_u1 }}", qos: 1 }
            - if:
                - condition: template
                  value_template: "{{ online2 and (curr_min_soc_2 != min_soc|int or curr_charge_2 != charge_limit_u2|int) }}"
              then:
                - action: mqtt.publish
                  data: { topic: "Zendure/number/HUB2_SERIAL_NUMBER/minSoc/set", payload: "{{ min_soc }}", qos: 1 }
                - action: mqtt.publish
                  data: { topic: "Zendure/number/HUB2_SERIAL_NUMBER/chargeMaxLimit/set", payload: "{{ charge_limit_u2 }}", qos: 1 }


  # --- 6.6a SAG CONFIRM U1 ---
  - alias: "Zendure: Sag Confirm U1"
    id: "zendure_sag_confirm_u1"
    mode: single
    max_exceeded: silent
    triggers:
      - trigger: state
        entity_id: sensor.solarflow_1_cell_min_vol
        to: null
    conditions:
      - condition: state
        entity_id: input_boolean.zendure_auto_mode
        state: "on"
    actions:
      - variables:
          v_first: "{{ trigger.to_state.state | float(99) }}"
          soc_first: "{{ states('sensor.solarflow_1_battery_level') | float(0) }}"
          online1: "{{ states('sensor.solarflow_1_status_raw')|upper not in ['UNAVAILABLE','UNKNOWN','FAULT','ERROR'] }}"
      - if:
          - condition: template
            value_template: >
              {{ online1
                 and is_state('input_boolean.zendure_calib_mode_u1', 'off')
                 and is_state('input_boolean.zendure_emergency_u1','off')
                 and soc_first > 5
                 and v_first > 2.5
                 and v_first < 3.15 }}
        then:
          - wait_for_trigger:
              - trigger: state
                entity_id: sensor.solarflow_1_cell_min_vol
                to: null
            timeout: "00:02:00"
            continue_on_timeout: false
          - variables:
              v_confirm: "{{ wait.trigger.to_state.state | float(99) if wait.trigger is not none else 99 }}"
              imb_confirm: "{{ states('sensor.solarflow_1_cell_imbalance') | float(0) }}"
              soc_confirm: "{{ states('sensor.solarflow_1_battery_level') | float(0) }}"
              solar_total: "{{ states('sensor.solarflow_total_solar_input') | float(0) }}"
              s1_solar: "{{ states('sensor.solarflow_1_solar_input') | float(0) if online1 else 0 }}"
              relieved_u1: >
                {{ states('input_number.zendure_last_sent_1')|int(999) == 0
                   or states('sensor.solarflow_1_output_limit')|int(999) == 0 }}
              limit_calib_u1: >
                {% set t1 = states('sensor.solarflow_1_batt_max_temp') | float(states('sensor.solarflow_1_temp')|float(0)) %}
                {% set soc1 = states('sensor.solarflow_1_battery_level') | float(0) %}
                {% set cl1 = 100 if t1 < 5 else (300 if t1 < 10 else 800) %}
                {% set sl1 = 100 if soc1 > 97 else (200 if soc1 >= 90 else 800) %}
                {{ [cl1|int, sl1|int]|min }}
              limit_emerg_u1: >
                {% set t1 = states('sensor.solarflow_1_batt_max_temp') | float(states('sensor.solarflow_1_temp')|float(0)) %}
                {% set soc1 = states('sensor.solarflow_1_battery_level') | float(0) %}
                {% set cl1 = 100 if t1 < 5 else (300 if t1 < 10 else 800) %}
                {% set ss1 = 300 if soc1 < 12 else 800 %}
                {{ [300, cl1|int, ss1|int]|min }}
              confirmed: >
                {{ is_state('input_boolean.zendure_auto_mode','on')
                   and states('sensor.solarflow_1_status_raw')|upper not in ['UNAVAILABLE','UNKNOWN','FAULT','ERROR']
                   and is_state('input_boolean.zendure_calib_mode_u1','off')
                   and is_state('input_boolean.zendure_emergency_u1','off')
                   and soc_confirm > 5
                   and v_confirm > 2.5
                   and relieved_u1
                   and (
                     v_confirm <= 3.13
                     or (v_confirm < 3.15 and imb_confirm >= 0.04)
                   ) }}
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ confirmed and solar_total >= 150 }}"
                sequence:
                  - action: input_boolean.turn_on
                    target:
                      entity_id: input_boolean.zendure_calib_mode_u1
                  - if:
                      - condition: template
                        value_template: "{{ s1_solar >= 50 }}"
                    then:
                      - action: input_text.set_value
                        target: { entity_id: input_text.zendure_ac_mode_u1 }
                        data: { value: "Output mode" }
                      - action: mqtt.publish
                        data: { topic: "Zendure/select/HUB1_SERIAL_NUMBER/acMode/set", payload: "Output mode", qos: 1 }
                      - delay: "00:00:00.500"
                      - action: mqtt.publish
                        data: { topic: "Zendure/select/HUB1_SERIAL_NUMBER/acMode/set", payload: "Output mode", qos: 1 }
                      - delay: "00:00:01"
                      - action: mqtt.publish
                        data: { topic: "Zendure/number/HUB1_SERIAL_NUMBER/outputLimit/set", payload: "0", qos: 1 }
                    else:
                      - action: input_text.set_value
                        target: { entity_id: input_text.zendure_ac_mode_u1 }
                        data: { value: "Input mode" }
                      - action: mqtt.publish
                        data: { topic: "Zendure/select/HUB1_SERIAL_NUMBER/acMode/set", payload: "Input mode", qos: 1 }
                      - delay: "00:00:00.500"
                      - action: mqtt.publish
                        data: { topic: "Zendure/select/HUB1_SERIAL_NUMBER/acMode/set", payload: "Input mode", qos: 1 }
                      - delay: "00:00:01"
                      - action: mqtt.publish
                        data: { topic: "Zendure/number/HUB1_SERIAL_NUMBER/outputLimit/set", payload: "0", qos: 1 }
                      - action: mqtt.publish
                        data: { topic: "Zendure/number/HUB1_SERIAL_NUMBER/inputLimit/set", payload: "{{ limit_calib_u1 }}", qos: 1 }
                  - action: input_number.set_value
                    target: { entity_id: input_number.zendure_last_sent_1 }
                    data: { value: -2 }
                  - action: notify.send_message
                    target:
                      entity_id: notify.telegram_bot_YOUR_TELEGRAM_SERVICE
                    data:
                      message: >
                        📉 *Sicherheits-Kalibrierung U1 (Tag)*
                        Unterspannung auf frischem Spannungs-Update bestätigt
                        ({{ v_confirm | round(3) }} V, Δ {{ imb_confirm | round(3) }} V).
                        Akku wird sofort mit Solar re-kalibriert.
              - conditions:
                  - condition: template
                    value_template: >
                      {{ confirmed
                         and solar_total < 150
                         and (as_timestamp(states('input_datetime.zendure_last_full_charge_1'), default=0) | int(0)) > 86400 }}
                sequence:
                  - action: input_datetime.set_datetime
                    target:
                      entity_id: input_datetime.zendure_last_full_charge_1
                    data:
                      timestamp: 0
                  - action: input_boolean.turn_on
                    target: { entity_id: input_boolean.zendure_emergency_u1 }
                  - action: input_text.set_value
                    target: { entity_id: input_text.zendure_ac_mode_u1 }
                    data: { value: "Input mode" }
                  - action: mqtt.publish
                    data: { topic: "Zendure/select/HUB1_SERIAL_NUMBER/acMode/set", payload: "Input mode", qos: 1 }
                  - delay: "00:00:00.500"
                  - action: mqtt.publish
                    data: { topic: "Zendure/select/HUB1_SERIAL_NUMBER/acMode/set", payload: "Input mode", qos: 1 }
                  - delay: "00:00:01"
                  - action: mqtt.publish
                    data: { topic: "Zendure/number/HUB1_SERIAL_NUMBER/outputLimit/set", payload: "0", qos: 1 }
                  - action: mqtt.publish
                    data: { topic: "Zendure/number/HUB1_SERIAL_NUMBER/inputLimit/set", payload: "{{ limit_emerg_u1 }}", qos: 1 }
                  - action: input_number.set_value
                    target: { entity_id: input_number.zendure_last_sent_1 }
                    data: { value: -2 }
                  - action: notify.send_message
                    target:
                      entity_id: notify.telegram_bot_YOUR_TELEGRAM_SERVICE
                    data:
                      message: >
                        📉 *Spannungseinbruch U1 (Nacht)*
                        Unterspannung auf frischem Spannungs-Update bestätigt
                        ({{ v_confirm | round(3) }} V, Δ {{ imb_confirm | round(3) }} V).
                        Notstrom Automatik übernimmt nun. Kalibrierung für morgen 13:00 Uhr vorgemerkt.

