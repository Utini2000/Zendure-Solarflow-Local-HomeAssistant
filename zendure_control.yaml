                    data:
                      message: >
                        📉 *Sicherheits-Kalibrierung U2 (Tag)*
                        Unterspannung auf frischem Spannungs-Update bestätigt
                        ({{ v_confirm | round(3) }} V, Δ {{ imb_confirm | round(3) }} V).
                        Akku wird sofort mit Solar re-kalibriert.
              - conditions:
                  - condition: template
                    value_template: >
                      {{ confirmed
                         and solar_total < 150
                         and (as_timestamp(states('input_datetime.zendure_last_full_charge_2'), default=0) | int(0)) > 86400 }}
                sequence:
                  - action: input_datetime.set_datetime
                    target:
                      entity_id: input_datetime.zendure_last_full_charge_2
                    data:
                      timestamp: 0
                  - action: input_boolean.turn_on
                    target: { entity_id: input_boolean.zendure_emergency_u2 }
                  - action: input_text.set_value
                    target: { entity_id: input_text.zendure_ac_mode_u2 }
                    data: { value: "Input mode" }
                  - action: mqtt.publish
                    data: { topic: "Zendure/select/HUB2_SERIAL_NUMBER/acMode/set", payload: "Input mode", qos: 1 }
                  - delay: "00:00:00.500"
                  - action: mqtt.publish
                    data: { topic: "Zendure/select/HUB2_SERIAL_NUMBER/acMode/set", payload: "Input mode", qos: 1 }
                  - delay: "00:00:01"
                  - action: mqtt.publish
                    data: { topic: "Zendure/number/HUB2_SERIAL_NUMBER/outputLimit/set", payload: "0", qos: 1 }
                  - action: mqtt.publish
                    data: { topic: "Zendure/number/HUB2_SERIAL_NUMBER/inputLimit/set", payload: "{{ limit_emerg_u2 }}", qos: 1 }
                  - action: input_number.set_value
                    target: { entity_id: input_number.zendure_last_sent_2 }
                    data: { value: -2 }
                  - action: notify.send_message
                    target:
                      entity_id: notify.telegram_bot_YOUR_TELEGRAM_SERVICE
                    data:
                      message: >
                        📉 *Spannungseinbruch U2 (Nacht)*
                        Unterspannung auf frischem Spannungs-Update bestätigt
                        ({{ v_confirm | round(3) }} V, Δ {{ imb_confirm | round(3) }} V).
                        Notstrom Automatik übernimmt nun. Kalibrierung für morgen 13:00 Uhr vorgemerkt.

  # --- 6.6c CALIBRATION MANAGER (Top-Balancing) ---
  - alias: "Zendure: Smart Calibration Manager"
    id: "zendure_calibration_manager"
    mode: queued
    triggers:
      - trigger: time
        at: "13:00:00"
        id: "check_time"
      - trigger: numeric_state
        entity_id: sensor.solarflow_1_battery_level
        above: 99
        for: "00:05:00"
        id: "stop_u1"
      - trigger: numeric_state
        entity_id: sensor.solarflow_2_battery_level
        above: 99
        for: "00:05:00"
        id: "stop_u2"
      - trigger: template
        id: "stop_u1_abort"
        value_template: >
          {{ is_state('input_boolean.zendure_calib_mode_u1', 'on')
             and (states('sensor.solarflow_1_temp')|float(10) < 0
                  or is_state('sensor.solarflow_1_heizung', 'Aktiv')
                  or states('sensor.solarflow_1_status_raw')|upper in ['UNAVAILABLE','UNKNOWN','FAULT','ERROR']) }}
        for: "00:05:00"
      - trigger: template
        id: "stop_u2_abort"
        value_template: >
          {{ is_state('input_boolean.zendure_calib_mode_u2', 'on')
             and (states('sensor.solarflow_2_temp')|float(10) < 0
                  or is_state('sensor.solarflow_2_heizung', 'Aktiv')
                  or states('sensor.solarflow_2_status_raw')|upper in ['UNAVAILABLE','UNKNOWN','FAULT','ERROR']) }}
        for: "00:05:00"
    conditions:
      - condition: state
        entity_id: input_boolean.zendure_auto_mode
        state: "on"
    actions:
      - if:
          - condition: state
            entity_id: input_boolean.zendure_auto_mode
            state: "off"
        then:
          - stop: "Auto Mode OFF. Calibration aborted."

      - variables:
          last_u1: "{{ as_timestamp(states('input_datetime.zendure_last_full_charge_1'), default=0) }}"
          last_u2: "{{ as_timestamp(states('input_datetime.zendure_last_full_charge_2'), default=0) }}"
          days_cfg: "{{ states('input_number.zendure_conf_calib_days') | int(14) }}"
          days_u1: "{{ ((as_timestamp(now()) - last_u1) / 86400) | int(0) }}"
          days_u2: "{{ ((as_timestamp(now()) - last_u2) / 86400) | int(0) }}"

      - if:
          - condition: template
            value_template: "{{ trigger.id == 'stop_u1' }}"
        then:
          - action: input_datetime.set_datetime
            target: { entity_id: input_datetime.zendure_last_full_charge_1 }
            data: { timestamp: "{{ as_timestamp(now()) }}" }

      - if:
          - condition: template
            value_template: "{{ trigger.id == 'stop_u2' }}"
        then:
          - action: input_datetime.set_datetime
            target: { entity_id: input_datetime.zendure_last_full_charge_2 }
            data: { timestamp: "{{ as_timestamp(now()) }}" }

      # --- START LOGIK UNIT 1 ---
      - if:
          - condition: template
            value_template: >
              {% set s = states.sensor.solarflow_1_status_raw %}
              {% set fresh = s is not none and s.state|upper not in ['UNAVAILABLE','UNKNOWN','FAULT','ERROR'] and (as_timestamp(now()) - as_timestamp(s.last_reported, 0)) < 120 %}
              {% set vol = states('sensor.solarflow_1_cell_min_vol')|float(3.3) %}
              {% set temp = states('sensor.solarflow_1_batt_max_temp')|float(0) %}
              {% set plausible = vol > 0 and temp < 80 %}

              {{ trigger.id == 'check_time' and days_u1 >= days_cfg
                 and is_state('input_boolean.zendure_calib_mode_u1', 'off')
                 and is_state('input_boolean.zendure_emergency_u1','off')
                 and fresh and plausible
                 and states('sensor.solarflow_1_temp')|float(10) >= 0
                 and not is_state('sensor.solarflow_1_heizung', 'Aktiv') }}
        then:
          - variables:
              s1_solar: "{{ states('sensor.solarflow_1_solar_input') | float(0) }}"
              limit_calib_u1: >
                {% set t1 = states('sensor.solarflow_1_batt_max_temp') | float(states('sensor.solarflow_1_temp')|float(0)) %}
                {% set soc1 = states('sensor.solarflow_1_battery_level') | float(0) %}
                {% set cl1 = 100 if t1 < 5 else (300 if t1 < 10 else 800) %}
                {% set sl1 = 100 if soc1 > 97 else (200 if soc1 >= 90 else 800) %}
                {{ [cl1|int, sl1|int]|min }}
          - action: input_boolean.turn_on
            target: { entity_id: input_boolean.zendure_calib_mode_u1 }
          - if:
              - condition: template
                value_template: "{{ s1_solar >= 50 }}"
            then:
              - action: input_text.set_value
                target: { entity_id: input_text.zendure_ac_mode_u1 }
                data: { value: "Output mode" }
              - action: mqtt.publish
                data: { topic: "Zendure/select/HUB1_SERIAL_NUMBER/acMode/set", payload: "Output mode", qos: 1 }
              - delay: "00:00:00.500"
              - action: mqtt.publish
                data: { topic: "Zendure/select/HUB1_SERIAL_NUMBER/acMode/set", payload: "Output mode", qos: 1 }
              - delay: "00:00:01"
              - action: mqtt.publish
                data: { topic: "Zendure/number/HUB1_SERIAL_NUMBER/outputLimit/set", payload: "0", qos: 1 }
            else:
              - action: input_text.set_value
                target: { entity_id: input_text.zendure_ac_mode_u1 }
                data: { value: "Input mode" }
              - action: mqtt.publish
                data: { topic: "Zendure/select/HUB1_SERIAL_NUMBER/acMode/set", payload: "Input mode", qos: 1 }
              - delay: "00:00:00.500"
              - action: mqtt.publish
                data: { topic: "Zendure/select/HUB1_SERIAL_NUMBER/acMode/set", payload: "Input mode", qos: 1 }
              - delay: "00:00:01"
              - action: mqtt.publish
                data: { topic: "Zendure/number/HUB1_SERIAL_NUMBER/outputLimit/set", payload: "0", qos: 1 }
              - action: mqtt.publish
                data: { topic: "Zendure/number/HUB1_SERIAL_NUMBER/inputLimit/set", payload: "{{ limit_calib_u1 }}", qos: 1 }
          - action: input_number.set_value
            target: { entity_id: input_number.zendure_last_sent_1 }
            data: { value: -2 }
          - action: notify.send_message
            target:
              entity_id: notify.telegram_bot_YOUR_TELEGRAM_SERVICE
            data:
              message: >
                {% if (as_timestamp(states('input_datetime.zendure_last_full_charge_1'), default=0) | int(0)) < 86400 %}
                  📅 *Top-Kalibrierung U1 gestartet*\nSonder-Kalibrierung (Nach Spannungsabsturz in der Nacht)
                {% else %}
                  📅 *Top-Kalibrierung U1 gestartet*\nRegulärer Zyklus nach {{ days_u1 }} Tagen.
                {% endif %}

      # --- START LOGIK UNIT 2 ---
      - if:
          - condition: template
            value_template: >
              {% set s = states.sensor.solarflow_2_status_raw %}
              {% set fresh = s is not none and s.state|upper not in ['UNAVAILABLE','UNKNOWN','FAULT','ERROR'] and (as_timestamp(now()) - as_timestamp(s.last_reported, 0)) < 120 %}
              {% set vol = states('sensor.solarflow_2_cell_min_vol')|float(3.3) %}
              {% set temp = states('sensor.solarflow_2_batt_max_temp')|float(0) %}
              {% set plausible = vol > 0 and temp < 80 %}

              {{ trigger.id == 'check_time' and days_u2 >= days_cfg
                 and is_state('input_boolean.zendure_calib_mode_u2', 'off')
                 and is_state('input_boolean.zendure_emergency_u2','off')
                 and fresh and plausible
                 and states('sensor.solarflow_2_temp')|float(10) >= 0
                 and not is_state('sensor.solarflow_2_heizung', 'Aktiv') }}
        then:
          - variables:
              s2_solar: "{{ states('sensor.solarflow_2_solar_input') | float(0) }}"
              limit_calib_u2: >
                {% set t2 = states('sensor.solarflow_2_batt_max_temp') | float(states('sensor.solarflow_2_temp')|float(0)) %}
                {% set soc2 = states('sensor.solarflow_2_battery_level') | float(0) %}
                {% set cl2 = 100 if t2 < 5 else (300 if t2 < 10 else 800) %}
                {% set sl2 = 100 if soc2 > 97 else (200 if soc2 >= 90 else 800) %}
                {{ [cl2|int, sl2|int]|min }}
          - action: input_boolean.turn_on
            target: { entity_id: input_boolean.zendure_calib_mode_u2 }
          - if:
              - condition: template
                value_template: "{{ s2_solar >= 50 }}"
            then:
              - action: input_text.set_value
                target: { entity_id: input_text.zendure_ac_mode_u2 }
                data: { value: "Output mode" }
              - action: mqtt.publish
                data: { topic: "Zendure/select/HUB2_SERIAL_NUMBER/acMode/set", payload: "Output mode", qos: 1 }
              - delay: "00:00:00.500"
              - action: mqtt.publish
                data: { topic: "Zendure/select/HUB2_SERIAL_NUMBER/acMode/set", payload: "Output mode", qos: 1 }
              - delay: "00:00:01"
              - action: mqtt.publish
                data: { topic: "Zendure/number/HUB2_SERIAL_NUMBER/outputLimit/set", payload: "0", qos: 1 }
            else:
              - action: input_text.set_value
                target: { entity_id: input_text.zendure_ac_mode_u2 }
                data: { value: "Input mode" }
              - action: mqtt.publish
                data: { topic: "Zendure/select/HUB2_SERIAL_NUMBER/acMode/set", payload: "Input mode", qos: 1 }
              - delay: "00:00:00.500"
              - action: mqtt.publish
                data: { topic: "Zendure/select/HUB2_SERIAL_NUMBER/acMode/set", payload: "Input mode", qos: 1 }
              - delay: "00:00:01"
              - action: mqtt.publish
                data: { topic: "Zendure/number/HUB2_SERIAL_NUMBER/outputLimit/set", payload: "0", qos: 1 }
              - action: mqtt.publish
                data: { topic: "Zendure/number/HUB2_SERIAL_NUMBER/inputLimit/set", payload: "{{ limit_calib_u2 }}", qos: 1 }
          - action: input_number.set_value
            target: { entity_id: input_number.zendure_last_sent_2 }
            data: { value: -2 }
          - action: notify.send_message
            target:
              entity_id: notify.telegram_bot_YOUR_TELEGRAM_SERVICE
            data:
              message: >
                {% if (as_timestamp(states('input_datetime.zendure_last_full_charge_2'), default=0) | int(0)) < 86400 %}
                  📅 *Top-Kalibrierung U2 gestartet*\nSonder-Kalibrierung (Nach Spannungsabsturz in der Nacht)
                {% else %}
                  📅 *Top-Kalibrierung U2 gestartet*\nRegulärer Zyklus nach {{ days_u2 }} Tagen.
                {% endif %}

      # --- BEENDEN LOGIK ---
      - if:
          - condition: template
            value_template: "{{ trigger.id in ['stop_u1', 'stop_u1_abort'] and is_state('input_boolean.zendure_calib_mode_u1','on') }}"
        then:
          - action: input_boolean.turn_off
            target: { entity_id: input_boolean.zendure_calib_mode_u1 }
          - action: input_text.set_value
            target: { entity_id: input_text.zendure_ac_mode_u1 }
            data: { value: "Output mode" }
          - action: mqtt.publish
            data: { topic: "Zendure/select/HUB1_SERIAL_NUMBER/acMode/set", payload: "Output mode", qos: 1 }
          - delay: "00:00:00.500"
          - action: mqtt.publish
            data: { topic: "Zendure/select/HUB1_SERIAL_NUMBER/acMode/set", payload: "Output mode", qos: 1 }
          - delay: "00:00:01"
          - action: mqtt.publish
            data: { topic: "Zendure/number/HUB1_SERIAL_NUMBER/outputLimit/set", payload: "0", qos: 1 }
          - action: input_number.set_value
            target: { entity_id: input_number.zendure_last_sent_1 }
            data: { value: 0 }
          - action: notify.send_message
            target:
              entity_id: notify.telegram_bot_YOUR_TELEGRAM_SERVICE
            data:
              message: >
                {% if trigger.id == 'stop_u1' %}
                  ✅ *Kalibrierung U1*\nErfolgreich beendet (100%). Zellen balanciert.
                {% else %}
                  ⚠️ *Kalibrierung U1 abgebrochen*\nTemperatur < 0 °C oder Sensorfehler.
                {% endif %}

      - if:
          - condition: template
            value_template: "{{ trigger.id in ['stop_u2', 'stop_u2_abort'] and is_state('input_boolean.zendure_calib_mode_u2','on') }}"
        then:
          - action: input_boolean.turn_off
            target: { entity_id: input_boolean.zendure_calib_mode_u2 }
          - action: input_text.set_value
            target: { entity_id: input_text.zendure_ac_mode_u2 }
            data: { value: "Output mode" }
          - action: mqtt.publish
            data: { topic: "Zendure/select/HUB2_SERIAL_NUMBER/acMode/set", payload: "Output mode", qos: 1 }
          - delay: "00:00:00.500"
          - action: mqtt.publish
            data: { topic: "Zendure/select/HUB2_SERIAL_NUMBER/acMode/set", payload: "Output mode", qos: 1 }
          - delay: "00:00:01"
          - action: mqtt.publish
            data: { topic: "Zendure/number/HUB2_SERIAL_NUMBER/outputLimit/set", payload: "0", qos: 1 }
          - action: input_number.set_value
            target: { entity_id: input_number.zendure_last_sent_2 }
            data: { value: 0 }
          - action: notify.send_message
            target:
              entity_id: notify.telegram_bot_YOUR_TELEGRAM_SERVICE
            data:
              message: >
                {% if trigger.id == 'stop_u2' %}
                  ✅ *Kalibrierung U2*\nErfolgreich beendet (100%). Zellen balanciert.
                {% else %}
                  ⚠️ *Kalibrierung U2 abgebrochen*\nTemperatur < 0 °C oder Sensorfehler.
                {% endif %}

  # --- 6.7 HEALTH REPORTER ---
  - alias: "Zendure: Weekly Health Report"
    id: "zendure_weekly_report"
    triggers:
      - trigger: time
        at: "18:00:00"
    conditions:
      - condition: time
        weekday: [fri]
    actions:
      - variables:
          last_u1: "{{ as_timestamp(states('input_datetime.zendure_last_full_charge_1'), default=0) }}"
          last_u2: "{{ as_timestamp(states('input_datetime.zendure_last_full_charge_2'), default=0) }}"
          days_u1: "{{ ((as_timestamp(now()) - last_u1) / 86400) | int(0) }}"
          days_u2: "{{ ((as_timestamp(now()) - last_u2) / 86400) | int(0) }}"
          imb1_raw: "{{ states('sensor.solarflow_1_cell_imbalance') }}"
          imb2_raw: "{{ states('sensor.solarflow_2_cell_imbalance') }}"
      - action: notify.send_message
        target:
          entity_id: notify.telegram_bot_YOUR_TELEGRAM_SERVICE
        data:
          message: |
            ℹ️ *Zendure Wochenbericht*
            Unit 1: {{ days_u1 }} Tage ({{ imb1_raw }} V)
            Unit 2: {{ days_u2 }} Tage ({{ imb2_raw }} V)

  # --- 6.8b AUTO-EMERGENCY MANAGER (PER-UNIT) ---
  - alias: "Zendure: Auto-Emergency Manager (Per-Unit)"
    id: "zendure_auto_emergency_manager_dual"
    mode: parallel
    triggers:
      # U1 START
      - trigger: template
        id: "start_u1"
        value_template: >
          {% set s = states.sensor.solarflow_1_status_raw %}
          {% set fresh = s is not none and s.state|upper not in ['UNAVAILABLE','UNKNOWN','FAULT','ERROR'] and (as_timestamp(now()) - as_timestamp(s.last_reported, 0)) < 120 %}
          {% set vol = states('sensor.solarflow_1_cell_min_vol')|float(3.3) %}
          {% set soc = states('sensor.solarflow_1_battery_level')|float(100) %}
          {% set plausible = vol > 0 and states('sensor.solarflow_1_temp')|float(0) < 80 %}

          {{ fresh and plausible
             and is_state('input_boolean.zendure_emergency_u1', 'off')
             and states('sensor.solarflow_total_solar_input')|float(0) < 150
             and (soc < states('input_number.zendure_conf_soc_emerg_start')|float(15) or vol <= 3.12)
             and states('sensor.solarflow_1_temp')|float(10) >= 0
             and not is_state('sensor.solarflow_1_heizung', 'Aktiv') }}
        for: "00:05:00"

      # U1 STOP
      - trigger: template
        id: "stop_u1"
        value_template: >
          {{ is_state('input_boolean.zendure_emergency_u1', 'on')
             and (
               (states('sensor.solarflow_1_battery_level')|float(0) >= states('input_number.zendure_conf_soc_emerg_stop')|float(25)
                and states('sensor.solarflow_1_cell_min_vol')|float(0) >= 3.25)
               or states('sensor.solarflow_total_solar_input')|float(0) > 200
               or states('sensor.solarflow_1_status_raw')|upper in ['UNAVAILABLE','UNKNOWN','FAULT','ERROR']
               or states('sensor.solarflow_1_temp')|float(10) < 0
               or is_state('sensor.solarflow_1_heizung', 'Aktiv')
             ) }}
        for: "00:05:00"

      # U2 START
      - trigger: template
        id: "start_u2"
        value_template: >
          {% set s = states.sensor.solarflow_2_status_raw %}
          {% set fresh = s is not none and s.state|upper not in ['UNAVAILABLE','UNKNOWN','FAULT','ERROR'] and (as_timestamp(now()) - as_timestamp(s.last_reported, 0)) < 120 %}
          {% set vol = states('sensor.solarflow_2_cell_min_vol')|float(3.3) %}
          {% set soc = states('sensor.solarflow_2_battery_level')|float(100) %}
          {% set plausible = vol > 0 and states('sensor.solarflow_2_temp')|float(0) < 80 %}

          {{ fresh and plausible
             and is_state('input_boolean.zendure_emergency_u2', 'off')
             and states('sensor.solarflow_total_solar_input')|float(0) < 150
             and (soc < states('input_number.zendure_conf_soc_emerg_start')|float(15) or vol <= 3.12)
             and states('sensor.solarflow_2_temp')|float(10) >= 0
             and not is_state('sensor.solarflow_2_heizung', 'Aktiv') }}
        for: "00:05:00"

      # U2 STOP
      - trigger: template
        id: "stop_u2"
        value_template: >
          {{ is_state('input_boolean.zendure_emergency_u2', 'on')
             and (
               (states('sensor.solarflow_2_battery_level')|float(0) >= states('input_number.zendure_conf_soc_emerg_stop')|float(25)
                and states('sensor.solarflow_2_cell_min_vol')|float(0) >= 3.25)
               or states('sensor.solarflow_total_solar_input')|float(0) > 200
               or states('sensor.solarflow_2_status_raw')|upper in ['UNAVAILABLE','UNKNOWN','FAULT','ERROR']
               or states('sensor.solarflow_2_temp')|float(10) < 0
               or is_state('sensor.solarflow_2_heizung', 'Aktiv')
             ) }}
        for: "00:05:00"

    conditions:
      - condition: state
        entity_id: input_boolean.zendure_auto_mode
        state: "on"
    actions:
      - variables:
          t1: "{{ states('sensor.solarflow_1_batt_max_temp') | float(states('sensor.solarflow_1_temp')|float(0)) }}"
          t2: "{{ states('sensor.solarflow_2_batt_max_temp') | float(states('sensor.solarflow_2_temp')|float(0)) }}"
          soc1: "{{ states('sensor.solarflow_1_battery_level') | float(0) }}"
          soc2: "{{ states('sensor.solarflow_2_battery_level') | float(0) }}"
          cl1: "{% if t1 < 5 %} 100 {% elif t1 < 10 %} 300 {% else %} 800 {% endif %}"
          cl2: "{% if t2 < 5 %} 100 {% elif t2 < 10 %} 300 {% else %} 800 {% endif %}"
          ss1: "{% if soc1 < 12 %} 300 {% else %} 800 {% endif %}"
          ss2: "{% if soc2 < 12 %} 300 {% else %} 800 {% endif %}"
          limit_emerg_u1: "{{ [300, cl1|int, ss1|int]|min }}"
          limit_emerg_u2: "{{ [300, cl2|int, ss2|int]|min }}"

      - choose:
          - conditions:
              - condition: template
                value_template: "{{ trigger.id == 'start_u1' }}"
            sequence:
              - action: input_boolean.turn_on
                target: { entity_id: input_boolean.zendure_emergency_u1 }
              - action: input_text.set_value
                target: { entity_id: input_text.zendure_ac_mode_u1 }
                data: { value: "Input mode" }
              - action: mqtt.publish
                data: { topic: "Zendure/select/HUB1_SERIAL_NUMBER/acMode/set", payload: "Input mode", qos: 1 }
              - delay: "00:00:00.500"
              - action: mqtt.publish
                data: { topic: "Zendure/select/HUB1_SERIAL_NUMBER/acMode/set", payload: "Input mode", qos: 1 }
              - delay: "00:00:01"
              - action: mqtt.publish
                data: { topic: "Zendure/number/HUB1_SERIAL_NUMBER/outputLimit/set", payload: "0", qos: 1 }
              - action: mqtt.publish
                data: { topic: "Zendure/number/HUB1_SERIAL_NUMBER/inputLimit/set", payload: "{{ limit_emerg_u1 }}", qos: 1 }
              - action: input_number.set_value
                target: { entity_id: input_number.zendure_last_sent_1 }
                data: { value: -2 }
              - action: notify.send_message
                target:
                  entity_id: notify.telegram_bot_YOUR_TELEGRAM_SERVICE
                data:
                  message: "🔋 *Zendure Notladung (Unit 1)*\nGestartet (SoC < Limit oder Spannung <= 3.20V)."

          - conditions:
              - condition: template
                value_template: "{{ trigger.id == 'stop_u1' }}"
            sequence:
              - action: input_boolean.turn_off
                target: { entity_id: input_boolean.zendure_emergency_u1 }
              - action: input_text.set_value
                target: { entity_id: input_text.zendure_ac_mode_u1 }
                data: { value: "Output mode" }
              - action: mqtt.publish
                data: { topic: "Zendure/select/HUB1_SERIAL_NUMBER/acMode/set", payload: "Output mode", qos: 1 }
              - delay: "00:00:00.500"
              - action: mqtt.publish
                data: { topic: "Zendure/select/HUB1_SERIAL_NUMBER/acMode/set", payload: "Output mode", qos: 1 }
              - delay: "00:00:01"
              - action: mqtt.publish
                data: { topic: "Zendure/number/HUB1_SERIAL_NUMBER/outputLimit/set", payload: "0", qos: 1 }
              - action: input_number.set_value
                target: { entity_id: input_number.zendure_last_sent_1 }
                data: { value: 0 }
              - action: notify.send_message
                target:
                  entity_id: notify.telegram_bot_YOUR_TELEGRAM_SERVICE
                data:
                  message: >
                    {% if states('sensor.solarflow_1_temp')|float(10) < 0 or is_state('sensor.solarflow_1_heizung', 'Aktiv') %}
                      ⚠️ *Zendure Notladung (Unit 1) abgebrochen*\nTemperatur < 0 °C oder Heizung aktiv.
                    {% else %}
                      ✅ *Zendure Notladung (Unit 1)*\nBeendet (Werte stabilisiert).
                    {% endif %}

          - conditions:
              - condition: template
                value_template: "{{ trigger.id == 'start_u2' }}"
            sequence:
              - action: input_boolean.turn_on
                target: { entity_id: input_boolean.zendure_emergency_u2 }
              - action: input_text.set_value
                target: { entity_id: input_text.zendure_ac_mode_u2 }
                data: { value: "Input mode" }
              - action: mqtt.publish
                data: { topic: "Zendure/select/HUB2_SERIAL_NUMBER/acMode/set", payload: "Input mode", qos: 1 }
              - delay: "00:00:00.500"
              - action: mqtt.publish
                data: { topic: "Zendure/select/HUB2_SERIAL_NUMBER/acMode/set", payload: "Input mode", qos: 1 }
              - delay: "00:00:01"
              - action: mqtt.publish
                data: { topic: "Zendure/number/HUB2_SERIAL_NUMBER/outputLimit/set", payload: "0", qos: 1 }
              - action: mqtt.publish
                data: { topic: "Zendure/number/HUB2_SERIAL_NUMBER/inputLimit/set", payload: "{{ limit_emerg_u2 }}", qos: 1 }
              - action: input_number.set_value
                target: { entity_id: input_number.zendure_last_sent_2 }
                data: { value: -2 }
              - action: notify.send_message
                target:
                  entity_id: notify.telegram_bot_YOUR_TELEGRAM_SERVICE
                data:
                  message: "🔋 *Zendure Notladung (Unit 2)*\nGestartet (SoC < Limit oder Spannung <= 3.20V)."

          - conditions:
              - condition: template
                value_template: "{{ trigger.id == 'stop_u2' }}"
            sequence:
              - action: input_boolean.turn_off
                target: { entity_id: input_boolean.zendure_emergency_u2 }
              - action: input_text.set_value
                target: { entity_id: input_text.zendure_ac_mode_u2 }
                data: { value: "Output mode" }
              - action: mqtt.publish
                data: { topic: "Zendure/select/HUB2_SERIAL_NUMBER/acMode/set", payload: "Output mode", qos: 1 }
              - delay: "00:00:00.500"
              - action: mqtt.publish
                data: { topic: "Zendure/select/HUB2_SERIAL_NUMBER/acMode/set", payload: "Output mode", qos: 1 }
              - delay: "00:00:01"
              - action: mqtt.publish
                data: { topic: "Zendure/number/HUB2_SERIAL_NUMBER/outputLimit/set", payload: "0", qos: 1 }
              - action: input_number.set_value
                target: { entity_id: input_number.zendure_last_sent_2 }
                data: { value: 0 }
              - action: notify.send_message
                target:
                  entity_id: notify.telegram_bot_YOUR_TELEGRAM_SERVICE
                data:
                  message: >
                    {% if states('sensor.solarflow_2_temp')|float(10) < 0 or is_state('sensor.solarflow_2_heizung', 'Aktiv') %}
                      ⚠️ *Zendure Notladung (Unit 2) abgebrochen*\nTemperatur < 0 °C oder Heizung aktiv.
                    {% else %}
                      ✅ *Zendure Notladung (Unit 2)*\nBeendet (Werte stabilisiert).
                    {% endif %}


  # --- 6.9 SEASON MANAGER ---
  - alias: "Zendure: Season Manager"
    id: "zendure_season_manager_dual"
    triggers:
      - trigger: time
        at: "04:00:00"
      - trigger: homeassistant
        event: start
    actions:
      - choose:
          # WINTER (Oktober - März)
          - conditions:
              - condition: template
                value_template: "{{ now().month >= 10 or now().month < 4 }}"
            sequence:
              - action: input_number.set_value
                target: { entity_id: input_number.zendure_conf_soc_off }
                data: { value: 20 }
              - action: input_number.set_value
                target: { entity_id: input_number.zendure_conf_soc_bypass }
                data: { value: 25 }
              - action: input_number.set_value
                target: { entity_id: input_number.zendure_conf_soc_emerg_start }
                data: { value: 15 }
              - action: input_number.set_value
                target: { entity_id: input_number.zendure_conf_soc_emerg_stop }
                data: { value: 25 }
              - action: input_number.set_value
                target: { entity_id: input_number.zendure_conf_calib_days }
                data: { value: 14 }

          # SOMMER (April - September)
          - conditions:
              - condition: template
                value_template: "{{ now().month >= 4 and now().month < 10 }}"
            sequence:
              - action: input_number.set_value
                target: { entity_id: input_number.zendure_conf_soc_off }
                data: { value: 10 }
              - action: input_number.set_value
                target: { entity_id: input_number.zendure_conf_soc_bypass }
                data: { value: 15 }
              - action: input_number.set_value
                target: { entity_id: input_number.zendure_conf_soc_emerg_start }
                data: { value: 7 }
              - action: input_number.set_value
                target: { entity_id: input_number.zendure_conf_soc_emerg_stop }
                data: { value: 9 }
              - action: input_number.set_value
                target: { entity_id: input_number.zendure_conf_calib_days }
                data: { value: 14 }

      - action: input_number.set_value
        target: { entity_id: input_number.zendure_conf_grid_bias }
        data: { value: 10 }
      - action: input_number.set_value
        target: { entity_id: input_number.zendure_conf_hysteresis }
        data: { value: 10 }
      - action: input_number.set_value
        target: { entity_id: input_number.zendure_conf_min_change }
        data: { value: 5 }

      - delay: "00:00:05"
      - parallel:
        - if:
            - condition: template
              value_template: "{{ states('sensor.solarflow_1_status_raw')|upper not in ['UNAVAILABLE', 'UNKNOWN', 'FAULT', 'ERROR'] }}"
          then:
            - action: mqtt.publish
              data: { topic: "Zendure/switch/HUB1_SERIAL_NUMBER/smartMode/set", payload: "ON", qos: 1 }
        - if:
            - condition: template
              value_template: "{{ states('sensor.solarflow_2_status_raw')|upper not in ['UNAVAILABLE', 'UNKNOWN', 'FAULT', 'ERROR'] }}"
          then:
            - action: mqtt.publish
              data: { topic: "Zendure/switch/HUB2_SERIAL_NUMBER/smartMode/set", payload: "ON", qos: 1 }
      - delay: "00:00:02"
      - parallel:
        - if:
            - condition: template
              value_template: "{{ states('sensor.solarflow_1_status_raw')|upper not in ['UNAVAILABLE', 'UNKNOWN', 'FAULT', 'ERROR'] }}"
          then:
            - action: mqtt.publish
              data: { topic: "Zendure/switch/HUB1_SERIAL_NUMBER/smartMode/set", payload: "ON", qos: 1 }
        - if:
            - condition: template
              value_template: "{{ states('sensor.solarflow_2_status_raw')|upper not in ['UNAVAILABLE', 'UNKNOWN', 'FAULT', 'ERROR'] }}"
          then:
            - action: mqtt.publish
              data: { topic: "Zendure/switch/HUB2_SERIAL_NUMBER/smartMode/set", payload: "ON", qos: 1 }

  # --- 6.10 MONITORING ---
  - alias: "Zendure: Monitoring"
    id: "zendure_monitoring_dual"
    triggers:
      - trigger: template
        id: "shelly_fail"
        value_template: "{{ not is_number(states('sensor.shellypro3em_SHELLY_ID_total_active_power')) }}"
        for: "00:00:30"
      - trigger: template
        id: "shelly_ok"
        value_template: "{{ is_number(states('sensor.shellypro3em_SHELLY_ID_total_active_power')) }}"
        for: "00:01:00"

      - trigger: state
        entity_id: sensor.solarflow_1_status_raw
        to: "unavailable"
        for: "00:03:00"
        id: "u1_offline"
      - trigger: state
        entity_id: sensor.solarflow_2_status_raw
        to: "unavailable"
        for: "00:03:00"
        id: "u2_offline"

      - trigger: template
        id: "u1_fault"
        value_template: "{{ states('sensor.solarflow_1_status_raw')|upper in ['FAULT', 'ERROR'] }}"
        for: "00:03:00"
      - trigger: template
        id: "u2_fault"
        value_template: "{{ states('sensor.solarflow_2_status_raw')|upper in ['FAULT', 'ERROR'] }}"
        for: "00:03:00"

    actions:
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ trigger.id == 'shelly_fail' }}"
            sequence:
              - action: persistent_notification.create
                data: { title: "⚠️ Zendure Failsafe", message: "Netzdaten fehlen (Shelly offline). Grundlast aktiv.", notification_id: "sf_failsafe" }
          - conditions:
              - condition: template
                value_template: "{{ trigger.id == 'shelly_ok' }}"
            sequence:
              - action: persistent_notification.dismiss
                data: { notification_id: "sf_failsafe" }

          - conditions:
              - condition: template
                value_template: "{{ trigger.id == 'u1_offline' }}"
            sequence:
              - action: notify.send_message
                target:
                  entity_id: notify.telegram_bot_YOUR_TELEGRAM_SERVICE
                data:
                  message: "⚠️ *Zendure Warnung*\nUnit 1 ist offline/nicht erreichbar."
          - conditions:
              - condition: template
                value_template: "{{ trigger.id == 'u2_offline' }}"
            sequence:
              - action: notify.send_message
                target:
                  entity_id: notify.telegram_bot_YOUR_TELEGRAM_SERVICE
                data:
                  message: "⚠️ *Zendure Warnung*\nUnit 2 ist offline/nicht erreichbar."

          - conditions:
              - condition: template
                value_template: "{{ trigger.id == 'u1_fault' }}"
            sequence:
              - action: notify.send_message
                target:
                  entity_id: notify.telegram_bot_YOUR_TELEGRAM_SERVICE
                data:
                  message: "❌ *Zendure Fehler*\nUnit 1 meldet Fehlerstatus (FAULT/ERROR)!"
          - conditions:
              - condition: template
                value_template: "{{ trigger.id == 'u2_fault' }}"
            sequence:
              - action: notify.send_message
                target:
                  entity_id: notify.telegram_bot_YOUR_TELEGRAM_SERVICE
                data:
                  message: "❌ *Zendure Fehler*\nUnit 2 meldet Fehlerstatus (FAULT/ERROR)!"

# --- 6.11 PROGNOSE: ÜBERFÜLLUNG ---
  - alias: "Zendure Info: Intelligente Tagesprognose (10 Uhr)"
    id: "zendure_info_smart_forecast"
    description: >-
      Berechnet, ob und wann der Akku voll wird, und gibt passgenaue
      Verbrauchs-Empfehlungen.
    mode: single
    triggers:
      - trigger: time
        at: "10:00:00"
    variables:
      total_capacity_wh: 3840
      target_soc: 95
      base_load_w: 180

      soc: "{{ states('sensor.solarflow_system_battery_level') | float(-1) }}"
      soc_valid: "{{ soc >= 0 }}"

      missing_wh: >
        {% if soc_valid %}
          {{ [(((target_soc - soc) / 100) * total_capacity_wh), 0] | max }}
        {% else %}
          0
        {% endif %}

      forecast_left_kwh: "{{ states('sensor.energy_production_today_remaining') | float(0) }}"
      forecast_left_wh: "{{ (forecast_left_kwh * 1000) | round(0) }}"

      now_ts: "{{ as_timestamp(now()) }}"
      sunset_ts: >-
        {{ as_timestamp(state_attr('sun.sun', 'next_setting'), default=now_ts + 8*3600) }}

      hours_to_sunset: "{{ [((sunset_ts - now_ts) / 3600), 0.1] | max }}"
      eff_sun_h: "{{ [hours_to_sunset * 0.7, 0.1] | max }}"

      avg_pv_power_w: "{{ (forecast_left_wh / eff_sun_h) | float(0) }}"
      net_avg_charge_w: "{{ [ (avg_pv_power_w - base_load_w), 0 ] | max }}"

      peak_ts: >-
        {{ as_timestamp(states('sensor.power_highest_peak_time_today'), default=now_ts + 4*3600) }}
      peak_ts_safe: "{{ [peak_ts, now_ts] | max }}"
      peak_time: "{{ peak_ts_safe | timestamp_custom('%H:%M') }}"

      hours_to_peak: "{{ [((peak_ts_safe - now_ts) / 3600), 0] | max }}"
      net_to_peak_wh: "{{ (net_avg_charge_w * hours_to_peak) | round(0) }}"

      full_before_peak: "{{ (missing_wh > 0) and (net_to_peak_wh >= missing_wh) }}"

      hours_to_full: >
        {% if net_avg_charge_w > 50 %}
          {{ missing_wh / net_avg_charge_w }}
        {% else %}
          99
        {% endif %}

      will_fill_today: >-
        {% if hours_to_full < 99 %}
          {{ forecast_left_wh > (missing_wh + (hours_to_full * base_load_w)) }}
        {% else %}
          false
        {% endif %}

      full_time: >
        {% if (hours_to_full | float(99)) < 8 %}
          {{ (now_ts + ((hours_to_full | float) * 3600)) | timestamp_custom('%H:%M') }}
        {% else %}
          später am Nachmittag
        {% endif %}

    conditions:
      - condition: template
        value_template: "{{ soc_valid and will_fill_today }}"
      - condition: numeric_state
        entity_id: sensor.solarflow_total_solar_input
        above: 50
      - condition: or
        conditions:
          - condition: state
            entity_id: person.britta
            state: "home"
          - condition: state
            entity_id: person.patrick
            state: "home"

    actions:
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ full_before_peak }}"
            sequence:
              - action: notify.send_message
                target:
                  entity_id: notify.telegram_bot_YOUR_TELEGRAM_SERVICE
                data:
                  message: >
                    Der PV Speicher ({{ soc | round(0) }}%) wird heute um **{{ full_time }} Uhr** voll sein.
                    👉 **Großgeräte am besten um {{ full_time }} Uhr starten**.

                    (Leistungs Peak ist um ca. {{ peak_time }} Uhr.)
          - conditions:
              - condition: template
                value_template: "{{ not full_before_peak }}"
            sequence:
              - action: notify.send_message
                target:
                  entity_id: notify.telegram_bot_YOUR_TELEGRAM_SERVICE
                data:
                  message: >
                    Die PV Energie reicht, um den Akku ({{ soc | round(0) }}%) heute bis {{ target_soc }}% zu laden.
                    👉 **Großgeräte am besten um {{ peak_time }} Uhr starten.**


# --- 6.12 TEMPERATURE WARNING ---
  - alias: "Zendure: Übertemperatur Warnung"
    id: "zendure_temp_warning"
    mode: parallel
    triggers:
      - trigger: numeric_state
        entity_id: sensor.solarflow_1_temp
        above: 45
        for: "00:05:00"
        id: "hub1"
      - trigger: numeric_state
        entity_id: sensor.solarflow_2_temp
        above: 45
        for: "00:05:00"
        id: "hub2"
    actions:
      - action: notify.send_message
        target:
          entity_id: notify.telegram_bot_YOUR_TELEGRAM_SERVICE
        data:
          message: >
            🔥 *Zendure Temperatur-Warnung!*

            {% if trigger.id == 'hub1' %}
            Unit 1 wird extrem warm ({{ states('sensor.solarflow_1_temp') }} °C).
            {% elif trigger.id == 'hub2' %}
            Unit 2 wird extrem warm ({{ states('sensor.solarflow_2_temp') }} °C).
            {% endif %}

            Das System hat 45°C überschritten. Bitte prüfen, ob das Derating ab 48°C ausreichend greift oder ob die Belüftung verbessert werden muss.

# --- 6.13 AUTO-NOTSTROM (USV) ---
  - alias: "Zendure: Auto-Notstrom (UPS Ausfall)"
    id: "zendure_auto_notstrom_usv"
    description: "Aktiviert Zendure Off-Grid via direktem MQTT-Publish (Bypass HA-Availability)."
    mode: single
    triggers:
      - trigger: state
        entity_id: sensor.ups_status
      - trigger: time_pattern
        minutes: "/5"
      - trigger: homeassistant
        event: start
        id: "boot"
    actions:
      - if:
          - condition: template
            value_template: "{{ trigger.id == 'boot' }}"
        then:
          - wait_template: >
              {{ 'online' in states('sensor.ups_status')|lower or
                 'battery' in states('sensor.ups_status')|lower or
                 'ob' in states('sensor.ups_status')|lower or
                 'ol' in states('sensor.ups_status')|lower }}
            timeout: "00:00:30"
            continue_on_timeout: false

      - choose:
          # ==========================================
          # FALL 1: STROMAUSFALL (On Battery / OB)
          # ==========================================
          - conditions:
              - condition: template
                value_template: >
                  {% set ups = states('sensor.ups_status') | lower %}
                  {% set d1 = states('select.eea1nen9n380978_gridoffmode') %}
                  {% set d2 = states('select.eea1nen9n380024_gridoffmode') %}
                  {{ ('on battery' in ups or 'ob' in ups or 'discharging' in ups) and
                     (d1 == 'off' or d2 == 'off') }}
            sequence:
              - action: mqtt.publish
                data:
                  topic: "Zendure/select/HUB1_SERIAL_NUMBER/gridOffMode/set"
                  payload: "Normal mode"
                  qos: 1
              - action: mqtt.publish
                data:
                  topic: "Zendure/select/HUB2_SERIAL_NUMBER/gridOffMode/set"
                  payload: "Normal mode"
                  qos: 1
              - action: notify.send_message
                target:
                  entity_id: notify.telegram_bot_YOUR_TELEGRAM_SERVICE
                data:
                  message: >
                    🚨 *ACHTUNG: STROMAUSFALL!*
                    Die USV meldet Netzverlust (On Battery).
                    🔌 Die Zendure Notstrom-Steckdosen wurden automatisch via MQTT **AKTIVIERT**.

          # ==========================================
          # FALL 2: STROM ZURÜCK (Online / OL)
          # ==========================================
          - conditions:
              - condition: template
                value_template: >
                  {% set ups = states('sensor.ups_status') | lower %}
                  {% set d1 = states('select.eea1nen9n380978_gridoffmode') %}
                  {% set d2 = states('select.eea1nen9n380024_gridoffmode') %}
                  {{ ('online' in ups or 'ol' in ups) and
                     (d1 == 'Normal mode' or d2 == 'Normal mode') }}
            sequence:
              - action: mqtt.publish
                data:
                  topic: "Zendure/select/HUB1_SERIAL_NUMBER/gridOffMode/set"
                  payload: "OFF"
                  qos: 1
              - action: mqtt.publish
                data:
                  topic: "Zendure/select/HUB2_SERIAL_NUMBER/gridOffMode/set"
                  payload: "OFF"
                  qos: 1
              - action: notify.send_message
                target:
                  entity_id: notify.telegram_bot_YOUR_TELEGRAM_SERVICE
                data:
                  message: >
                    ✅ *STROM WIEDER DA!*
                    Die USV meldet Netzrückkehr (Online).
                    🔌 Die Zendure Notstrom-Steckdosen wurden via MQTT **DEAKTIVIERT**.

# --- 6.14 AC MODE RECONCILE WATCHDOG ---
  - alias: "Zendure: AC Mode Reconcile Watchdog"
    id: "zendure_ac_mode_reconcile_watchdog"
    mode: parallel
    triggers:
      - trigger: time_pattern
        minutes: "/5"
    conditions:
      - condition: state
        entity_id: input_boolean.zendure_auto_mode
        state: "on"
    actions:
      - parallel:
          - if:
              - condition: template
                value_template: >
                  {% set ac1 = states.sensor.solarflow_1_ac_mode %}
                  {% set fresh1 = ac1 is not none and (as_timestamp(now()) - as_timestamp(ac1.last_reported, 0)) < 120 %}
                  {{ states('sensor.solarflow_1_status_raw')|upper not in ['UNAVAILABLE', 'UNKNOWN', 'FAULT', 'ERROR']
                     and fresh1
                     and ac1.state in ['Input mode', 'Output mode']
                     and states('input_text.zendure_ac_mode_u1') in ['Input mode', 'Output mode']
                     and ac1.state != states('input_text.zendure_ac_mode_u1') }}
            then:
              - action: mqtt.publish
                data:
                  topic: "Zendure/select/HUB1_SERIAL_NUMBER/acMode/set"
                  payload: "{{ states('input_text.zendure_ac_mode_u1') }}"
                  qos: 1
              - delay: "00:00:00.500"
              - action: mqtt.publish
                data:
                  topic: "Zendure/select/HUB1_SERIAL_NUMBER/acMode/set"
                  payload: "{{ states('input_text.zendure_ac_mode_u1') }}"
                  qos: 1
          - if:
              - condition: template
                value_template: >
                  {% set ac2 = states.sensor.solarflow_2_ac_mode %}
                  {% set fresh2 = ac2 is not none and (as_timestamp(now()) - as_timestamp(ac2.last_reported, 0)) < 120 %}
                  {{ states('sensor.solarflow_2_status_raw')|upper not in ['UNAVAILABLE', 'UNKNOWN', 'FAULT', 'ERROR']
                     and fresh2
                     and ac2.state in ['Input mode', 'Output mode']
                     and states('input_text.zendure_ac_mode_u2') in ['Input mode', 'Output mode']
                     and ac2.state != states('input_text.zendure_ac_mode_u2') }}
            then:
              - action: mqtt.publish
                data:
                  topic: "Zendure/select/HUB2_SERIAL_NUMBER/acMode/set"
                  payload: "{{ states('input_text.zendure_ac_mode_u2') }}"
                  qos: 1
              - delay: "00:00:00.500"
              - action: mqtt.publish
                data:
                  topic: "Zendure/select/HUB2_SERIAL_NUMBER/acMode/set"
                  payload: "{{ states('input_text.zendure_ac_mode_u2') }}"
                  qos: 1
