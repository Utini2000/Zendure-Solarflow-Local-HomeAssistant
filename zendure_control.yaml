      icon: mdi:arrow-split-vertical
      value_template: >
        {% if value == 'yes' %} Aktiv
        {% else %} Inaktiv {% endif %}

    - name: "SolarFlow 2 BMS Leistung"
      unique_id: solarflow_2_bms_power
