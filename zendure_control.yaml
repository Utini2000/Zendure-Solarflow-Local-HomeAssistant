                  force: true
              - action: script.zendure_set_u1_outputlimit_zero
              - action: input_number.set_value
                target: { entity_id: input_number.zendure_last_sent_1 }
                data: { value: 0 }
              - action: notify.send_message
                target:
                  entity_id: !secret telegram_id1
                data:
                  message: >
                    {% set bt = states.sensor.solarflow_1_batt_max_temp %}
                    {% set ht = states.sensor.solarflow_1_temp %}
                    {% set have_temp = (bt is not none and is_number(bt.state)) or (ht is not none and is_number(ht.state)) %}
                    {% set t = states('sensor.solarflow_1_batt_max_temp') | float(states('sensor.solarflow_1_temp') | float(999)) %}
                    {% set temp_mode_ok_u1 = have_temp and t >= 0 and t <= 52 and not is_state('sensor.solarflow_1_heizung', 'Aktiv') %}
                    {% if not temp_mode_ok_u1 %}
                      ⚠️ *Zendure Notladung (Unit 1) abgebrochen*\nTemperatur nicht operativ.
                    {% else %}
                      ✅ *Zendure Notladung (Unit 1)*\nBeendet (Werte stabilisiert).
                    {% endif %}

